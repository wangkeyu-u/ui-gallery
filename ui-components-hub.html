<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UI 组件总库 · 全网组件库交叉索引</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧩</text></svg>" />
<style>
  :root{
    --bg:#0a0b14; --bg2:#10121f; --panel:rgba(255,255,255,.04);
    --panel2:rgba(255,255,255,.06); --border:rgba(255,255,255,.10);
    --txt:#e8eaf2; --muted:#8b90a8; --faint:#5b607a;
    --cyan:#22d3ee; --violet:#a78bfa; --pink:#f472b6; --green:#34d399; --amber:#fbbf24;
    --grad:linear-gradient(135deg,#22d3ee,#a78bfa 55%,#f472b6);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:radial-gradient(1200px 800px at 12% -10%,#1a1d3a 0%,transparent 55%),
               radial-gradient(1000px 700px at 100% 0%,#2a1740 0%,transparent 50%),
               var(--bg);
    color:var(--txt); line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1320px;margin:0 auto;padding:28px 22px 80px}
  /* header */
  header{display:flex;flex-direction:column;gap:14px;margin-bottom:26px}
  .title{font-size:34px;font-weight:800;letter-spacing:.5px;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:14.5px;max-width:720px}
  .stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:10px 16px;min-width:104px}
  .stat b{font-size:22px;display:block;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .stat span{font-size:11.5px;color:var(--muted);letter-spacing:.5px}
  /* controls */
  .controls{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg) 70%,transparent);
    padding:14px 0 14px;margin-bottom:8px;backdrop-filter:blur(6px)}
  .topbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .search{flex:1;min-width:240px;display:flex;align-items:center;gap:8px;
    background:var(--panel2);border:1px solid var(--border);border-radius:12px;padding:11px 14px}
  .search input{flex:1;background:none;border:0;outline:0;color:var(--txt);font-size:14.5px}
  .search input::placeholder{color:var(--faint)}
  .seg{display:flex;background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .seg button{background:none;border:0;color:var(--muted);padding:11px 16px;font-size:13.5px;cursor:pointer;font-weight:600}
  .seg button.active{background:var(--grad);color:#0a0b14}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .chip{background:var(--panel);border:1px solid var(--border);border-radius:999px;
    padding:7px 14px;font-size:13px;color:var(--muted);cursor:pointer;transition:.15s;user-select:none}
  .chip:hover{border-color:var(--cyan);color:var(--txt)}
  .chip.active{background:var(--grad);color:#0a0b14;border-color:transparent;font-weight:700}
  .chip .n{opacity:.7;font-size:11px;margin-left:4px}
  .ctxbar{display:flex;justify-content:space-between;align-items:center;margin:18px 2px 12px;flex-wrap:wrap;gap:8px}
  .ctxbar .lbl{color:var(--muted);font-size:13px}
  .ctxbar .lbl b{color:var(--txt)}
  .clear{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;
    padding:5px 12px;font-size:12.5px;cursor:pointer}
  .clear:hover{color:var(--txt);border-color:var(--cyan)}
  /* gallery */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px;
    cursor:pointer;transition:.18s;position:relative;overflow:hidden}
  .card:hover{transform:translateY(-3px);border-color:rgba(167,139,250,.5);
    box-shadow:0 12px 40px -16px rgba(120,90,255,.5)}
  .card .row1{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .card h3{font-size:18px;font-weight:750}
  .card .vendor{font-size:12px;color:var(--muted);margin-top:2px}
  .fw{display:inline-flex;gap:5px;flex-wrap:wrap}
  .ftag{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px;letter-spacing:.3px}
  .fw-react{background:rgba(97,218,251,.16);color:#7dd3fc}
  .fw-vue{background:rgba(104,211,145,.16);color:#86efac}
  .fw-angular{background:rgba(240,98,146,.16);color:#f9a8c4}
  .fw-svelte{background:rgba(247,165,90,.18);color:#fdba74}
  .fw-solid{background:rgba(77,171,247,.16);color:#93c5fd}
  .fw-wc{background:rgba(167,139,250,.16);color:#c4b5fd}
  .fw-css{background:rgba(251,191,36,.16);color:#fcd34d}
  .fw-multi{background:rgba(244,114,182,.16);color:#f9a8d4}
  .meta{display:flex;gap:14px;margin:12px 0;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .meta b{color:var(--txt);font-weight:650}
  .desc{font-size:13px;color:var(--muted);min-height:38px}
  .ccount{display:inline-block;margin-top:8px;font-size:11.5px;color:var(--cyan);
    background:rgba(34,211,238,.10);border:1px solid rgba(34,211,238,.25);padding:3px 9px;border-radius:8px}
  .links{display:flex;gap:8px;margin-top:12px}
  .links a{flex:1;text-align:center;font-size:12.5px;font-weight:600;padding:8px;border-radius:9px;
    border:1px solid var(--border);background:var(--panel2);transition:.15s}
  .links a:hover{border-color:var(--cyan);color:var(--cyan)}
  /* component index */
  .cat-block{margin-bottom:26px}
  .cat-h{display:flex;align-items:center;gap:10px;margin:6px 0 14px;
    font-size:16px;font-weight:700;color:var(--txt)}
  .cat-h .dot{width:10px;height:10px;border-radius:3px}
  .ctype-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
  .ctype{display:flex;align-items:center;justify-content:space-between;gap:8px;
    background:var(--panel);border:1px solid var(--border);border-radius:11px;padding:11px 14px;cursor:pointer;transition:.15s}
  .ctype:hover{border-color:var(--violet);background:var(--panel2)}
  .ctype .nm{font-size:13.5px;font-weight:600}
  .ctype .nm small{display:block;color:var(--faint);font-weight:400;font-size:11px}
  .ctype .cnt{font-size:12px;font-weight:700;color:var(--cyan);
    background:rgba(34,211,238,.10);border-radius:8px;padding:3px 9px;white-space:nowrap}
  .empty{text-align:center;color:var(--muted);padding:60px 0;font-size:14px}
  /* modal */
  .mask{position:fixed;inset:0;background:rgba(4,5,12,.78);backdrop-filter:blur(5px);
    display:none;align-items:flex-start;justify-content:center;padding:48px 18px;z-index:50;overflow:auto}
  .mask.on{display:flex}
  .modal{width:min(720px,100%);background:var(--bg2);border:1px solid var(--border);
    border-radius:18px;padding:26px;animation:pop .22s ease}
  @keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .modal .x{position:absolute;top:18px;right:22px;cursor:pointer;color:var(--muted);font-size:22px;line-height:1}
  .modal h2{font-size:24px}
  .modal .m-vendor{color:var(--muted);font-size:13px;margin-top:4px}
  .m-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:18px 0}
  .m-meta div{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .m-meta span{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
  .m-meta b{font-size:14px}
  .m-sec-title{font-size:13px;color:var(--muted);margin:16px 0 10px;letter-spacing:.5px;text-transform:uppercase}
  .comp-chips{display:flex;gap:7px;flex-wrap:wrap}
  .comp-chips span{font-size:12px;padding:5px 11px;border-radius:8px;
    background:var(--panel2);border:1px solid var(--border);color:var(--txt)}
  .m-links{display:flex;gap:10px;margin-top:22px}
  .m-links a{flex:1;text-align:center;padding:12px;border-radius:11px;font-weight:700;font-size:14px;
    background:var(--grad);color:#0a0b14}
  .m-links a.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--border)}
  footer{margin-top:50px;text-align:center;color:var(--faint);font-size:12px;line-height:1.8}
  footer b{color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">🧩 UI 组件总库</div>
    <div class="sub">收录全网主流 UI 组件库与设计系统，可按框架筛选、按组件类型做全局交叉索引。
      点击任意组件类型，即可看到<b style="color:var(--txt)">所有提供它的库</b>。数据内嵌于本页，双击即可离线使用。</div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="controls">
    <div class="topbar">
      <label class="search">
        🔍 <input id="q" placeholder="搜索库名 / 厂商 / 框架 / 组件（如 table、modal、datepicker）…" />
      </label>
      <div class="seg">
        <button data-view="gallery" class="active">📚 总库画廊</button>
        <button data-view="index">🧭 组件索引</button>
      </div>
    </div>
    <div class="chips" id="fwChips"></div>
  </div>

  <div class="ctxbar">
    <div class="lbl" id="ctxLbl"></div>
    <button class="clear" id="clearBtn" style="display:none">✕ 清除筛选</button>
  </div>

  <div id="view"></div>

  <footer>
    <div>共收录 <b id="f-total">0</b> 个 UI 组件库 / 设计系统，覆盖 React · Vue · Angular · Svelte · Solid · Web Components · 纯 CSS 等生态。</div>
    <div>Stars / 版本等数据为近似值，仅供参考；链接均指向官方文档与开源仓库。本页为离线自包含文件，不依赖任何外部服务。</div>
  </footer>
</div>

<div class="mask" id="mask">
  <div class="modal" id="modal" style="position:relative"></div>
</div>

/* ============================ 分类推断 ============================ */
const CATS = [
  { id:"layout",   name:"布局 Layout",          color:"#22d3ee", keys:["grid","container","flex","divider","space","layout","box","stack","panel","columns","section","hero","footer","xy grid","spinner","loading","skeleton","placeholder","empty"] },
  { id:"nav",      name:"导航 Navigation",      color:"#a78bfa", keys:["menu","nav","tab","breadcrumb","pagination","steps","stepper","dropdown","drawer","sidenav","topappbar","navigationbar","navigationrail","navbar","wizard","signpost"] },
  { id:"display",  name:"数据展示 Data Display", color:"#34d399", keys:["table","list","card","avatar","badge","tag","chip","tooltip","popover","accordion","carousel","tree","calendar","image","statistic","description","timeline","stat","gallery","listbox","treeview","avatar","tree select","organizationchart","datagrid","datalist","grid list","imagelist","toplist","swipe","parallax"] },
  { id:"input",    name:"数据录入 Data Entry",  color:"#fbbf24", keys:["button","input","select","checkbox","radio","switch","slider","datepicker","form","upload","rate","rating","inputnumber","numericinput","autocomplete","cascader","colorpicker","combobox","toggle","textfield","field","range","pininput","numberfield","searchfield","file","fileupload","filepicker","fileuploader","date","time","picker","textinput","text area","textarea","checkbox","phone","segmented","chips","taginput"] },
  { id:"feedback", name:"反馈 Feedback",        color:"#f472b6", keys:["modal","dialog","drawer","alert","message","toast","snackbar","notification","progress","spinner","result","banner","flash","noticebar","infinitepanel","loading","confirm","activityindicator","offcanvas","slideovers","sheet","actionsheet","popup","contextmenu","hovercard","disclosure"] },
  { id:"advanced", name:"高级 Advanced",        color:"#60a5fa", keys:["transfer","segmented","anchor","affix","backtop","watermark","mentions","command","commandpalette","collapsible","splitter","step","orderlist","picklist","combobox","chart","tree","treeview","expansion","tabview","splitpanel","navigationmenu","menubar","toggle","sticky","scrollarea"] },
  { id:"media",    name:"媒体 Media",           color:"#fb923c", keys:["chart","video","audio","qrcode","image","carousel","editor","codemirror","richtext"] },
];
function catOf(name){
  const n = name.toLowerCase();
  for(const c of CATS){ if(c.keys.some(k=>n.includes(k))) return c.id; }
  return "other";
}
const CAT_NAME = Object.fromEntries(CATS.map(c=>[c.id,c.name]));
const CAT_COLOR = Object.fromEntries(CATS.map(c=>[c.id,c.color]));

/* 规范化组件名用于跨库匹配 */
function norm(s){ return s.toLowerCase().replace(/[\s_/()-]/g,"").replace("date picker","datepicker"); }

/* ============================ 状态 ============================ */
let state = { view:"gallery", q:"", fw:null, comp:null };

/* ============================ 渲染 ============================ */
const $ = s=>document.querySelector(s);
const view = $("#view");

function fwColor(fw){
  const m={React:"fw-react",Vue:"fw-vue",Angular:"fw-angular",Svelte:"fw-svelte",Solid:"fw-solid","Web Components":"fw-wc",CSS:"fw-css",Multi:"fw-multi"};
  return m[fw]||"fw-multi";
}

function fwList(){
  const set=new Set(); LIBRARIES.forEach(l=>l.fw.forEach(f=>set.add(f)));
  const order=["React","Vue","Angular","Svelte","Solid","Web Components","CSS","Multi"];
  return order.filter(f=>set.has(f));
}

function renderFwChips(){
  const wrap=$("#fwChips"); const list=fwList();
  let html=`<div class="chip ${!state.fw?'active':''}" data-fw="">全部框架 <span class="n">${LIBRARIES.length}</span></div>`;
  list.forEach(f=>{
    const cnt=LIBRARIES.filter(l=>l.fw.includes(f)).length;
    html+=`<div class="chip ${state.fw===f?'active':''}" data-fw="${f}">${f} <span class="n">${cnt}</span></div>`;
  });
  wrap.innerHTML=html;
  wrap.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ state.fw=c.dataset.fw||null; renderFwChips(); render(); });
}

function filtered(){
  const q=state.q.trim().toLowerCase();
  return LIBRARIES.filter(l=>{
    if(state.fw && !l.fw.includes(state.fw)) return false;
    if(state.comp){
      const set=new Set(l.components.map(norm));
      if(!set.has(state.comp)) return false;
    }
    if(q){
      const hay=(l.name+" "+l.vendor+" "+l.fw.join(" ")+" "+l.components.join(" ")+" "+l.theme).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderStats(){
  const total=LIBRARIES.length;
  const fws=new Set(); LIBRARIES.forEach(l=>l.fw.forEach(f=>fws.add(f)));
  const compSet=new Set(); LIBRARIES.forEach(l=>l.components.forEach(c=>compSet.add(norm(c))));
  const allComps=LIBRARIES.reduce((a,l)=>a+l.components.length,0);
  $("#stats").innerHTML=`
    <div class="stat"><b>${total}</b><span>组件库</span></div>
    <div class="stat"><b>${fws.size}</b><span>框架生态</span></div>
    <div class="stat"><b>${compSet.size}</b><span>独立组件类型</span></div>
    <div class="stat"><b>${allComps.toLocaleString()}</b><span>组件实例</span></div>`;
  $("#f-total").textContent=total;
}

function renderGallery(list){
  if(!list.length){ view.innerHTML=`<div class="empty">没有匹配的组件库，试试别的筛选条件。</div>`; return; }
  view.innerHTML=`<div class="grid">${list.map(l=>cardHTML(l)).join("")}</div>`;
  view.querySelectorAll(".card").forEach(el=>el.onclick=()=>openModal(el.dataset.id));
}
function cardHTML(l){
  const compCount=l.components.length;
  return `<div class="card" data-id="${l.id}">
    <div class="row1">
      <div><h3>${l.name}</h3><div class="vendor">${l.vendor}</div></div>
      <div class="fw">${l.fw.map(f=>`<span class="ftag ${fwColor(f)}">${f}</span>`).join("")}</div>
    </div>
    <div class="meta">
      <div>版本 <b>${l.version}</b></div>
      <div>⭐ <b>${l.stars}</b></div>
      <div>许可 <b>${l.license}</b></div>
    </div>
    <div class="desc">${l.desc}</div>
    <span class="ccount">${compCount} 个组件 · ${l.theme}</span>
    <div class="links">
      <a href="${l.docs}" target="_blank" rel="noopener" onclick="event.stopPropagation()">📘 文档</a>
      <a href="${l.repo}" target="_blank" rel="noopener" onclick="event.stopPropagation()">⭐ 源码</a>
    </div>
  </div>`;
}

/* 组件索引视图 */
function buildCompIndex(){
  const map=new Map(); // normName -> {name, cat, libs:Set}
  LIBRARIES.forEach(l=>{
    l.components.forEach(c=>{
      const key=norm(c);
      if(!map.has(key)) map.set(key,{name:c,cat:catOf(c),libs:new Set()});
      map.get(key).libs.add(l.id);
    });
  });
  // 分组
  const groups={};
  CATS.forEach(c=>groups[c.id]=[]);
  groups.other=[];
  [...map.entries()].forEach(([key,o])=>{ o.key=key; groups[o.cat].push(o); });
  Object.values(groups).forEach(arr=>arr.sort((a,b)=>b.libs.size-a.libs.size));
  return groups;
}

function renderIndex(){
  const groups=buildCompIndex();
  let html="";
  CATS.concat([{id:"other",name:"其他 Other",color:"#8b90a8"}]).forEach(c=>{
    const arr=groups[c.id]; if(!arr.length) return;
    html+=`<div class="cat-block"><div class="cat-h"><span class="dot" style="background:${c.color}"></span>${c.name} <span style="color:var(--faint);font-weight:400;font-size:13px">(${arr.length})</span></div>`;
    html+=`<div class="ctype-grid">`;
    arr.forEach(o=>{
      html+=`<div class="ctype" data-comp="${o.key}">
        <div class="nm">${o.name}<small>${CAT_NAME[o.cat]}</small></div>
        <div class="cnt">${o.libs.size} 库</div></div>`;
    });
    html+=`</div></div>`;
  });
  view.innerHTML=html;
  view.querySelectorAll(".ctype").forEach(el=>el.onclick=()=>{
    state.comp=el.dataset.comp; state.view="gallery";
    document.querySelectorAll(".seg button").forEach(b=>b.classList.toggle("active",b.dataset.view==="gallery"));
    render();
  });
}

/* 详情弹窗 */
function openModal(id){
  const l=LIBRARIES.find(x=>x.id===id); if(!l) return;
  // 按分类聚合组件
  const byCat={};
  l.components.forEach(c=>{ const k=catOf(c); (byCat[k]=byCat[k]||[]).push(c); });
  let compHTML="";
  CATS.concat([{id:"other",name:"其他"}]).forEach(c=>{
    if(!byCat[c.id]) return;
    compHTML+=`<div class="m-sec-title" style="color:${CAT_COLOR[c.id]||'var(--muted)'}">${c.name}</div><div class="comp-chips">${byCat[c.id].map(x=>`<span>${x}</span>`).join("")}</div>`;
  });
  $("#modal").innerHTML=`
    <span class="x" id="mx">✕</span>
    <div class="fw" style="margin-bottom:8px">${l.fw.map(f=>`<span class="ftag ${fwColor(f)}">${f}</span>`).join("")}</div>
    <h2>${l.name}</h2>
    <div class="m-vendor">${l.vendor} · ${l.theme}</div>
    <div class="m-meta">
      <div><span>版本</span><b>${l.version}</b></div>
      <div><span>GitHub Stars</span><b>${l.stars}</b></div>
      <div><span>开源许可</span><b>${l.license}</b></div>
      <div><span>组件数量</span><b>${l.components.length}</b></div>
    </div>
    <div class="m-sec-title">组件清单（按分类）</div>
    ${compHTML}
    <div class="m-links">
      <a href="${l.docs}" target="_blank" rel="noopener">📘 官方文档</a>
      <a class="ghost" href="${l.repo}" target="_blank" rel="noopener">⭐ 开源源码</a>
    </div>`;
  $("#mx").onclick=closeModal;
  $("#mask").classList.add("on");
}
function closeModal(){ $("#mask").classList.remove("on"); }
$("#mask").onclick=e=>{ if(e.target.id==="mask") closeModal(); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

/* 主渲染 */
function render(){
  const list=filtered();
  // ctx label
  const parts=[];
  if(state.fw) parts.push(`框架=<b>${state.fw}</b>`);
  if(state.comp){
    const o=[...new Map(LIBRARIES.flatMap(l=>l.components.map(c=>[norm(c),c]))).entries()].find(([k])=>k===state.comp);
    parts.push(`组件=<b>${o?o[1]:state.comp}</b>`);
  }
  if(state.q) parts.push(`搜索=<b>${state.q}</b>`);
  const lbl=parts.length?`筛选：${parts.join(" · ")} ｜ 命中 <b>${list.length}</b> 个库`:`共 <b>${list.length}</b> 个组件库`;
  $("#ctxLbl").innerHTML=lbl;
  $("#clearBtn").style.display=parts.length?"inline-block":"none";

  if(state.view==="index") renderIndex();
  else renderGallery(list);
}

/* 事件 */
$("#q").addEventListener("input",e=>{ state.q=e.target.value; render(); });
document.querySelectorAll(".seg button").forEach(b=>b.onclick=()=>{
  state.view=b.dataset.view;
  document.querySelectorAll(".seg button").forEach(x=>x.classList.toggle("active",x===b));
  render();
});
$("#clearBtn").onclick=()=>{ state.fw=null; state.comp=null; state.q=""; $("#q").value=""; renderFwChips(); render(); };

/* init */
renderStats();
renderFwChips();
render();
</script>
</body>
</html>
