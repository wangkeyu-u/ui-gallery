.item{position:relative;background:var(--panel);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:.16s}
.item:hover{transform:translateY(-3px);border-color:rgba(167,139,250,.5);box-shadow:0 12px 40px -16px rgba(120,90,255,.5)}

const SEL_KEY = 'uihub-sel-v2';
let sel = new Set(JSON.parse(localStorage.getItem(SEL_KEY)||'[]'));
let state = { fw:null, kind:'all', theme:null, onlySel:false };
const $=s=>document.querySelector(s);
const view=$('#view');
const FW={React:'fw-react',Vue:'fw-vue',Angular:'fw-angular',Svelte:'fw-svelte',Solid:'fw-solid','Web Components':'fw-wc',CSS:'fw-css',Multi:'fw-multi',Qwik:'fw-qwik'};
function fwColor(f){return FW[f]||'fw-multi';}
function kinds(){const s=new Set();ITEMS.forEach(i=>s.add(i.kind||'item'));return [...s];}
function fwList(){const s=new Set();ITEMS.forEach(i=>(i.fw||[]).forEach(f=>s.add(f)));return [...s];}
function themeList(){const s=new Set();ITEMS.forEach(i=>{if(i.theme)s.add(i.theme);});return [...s].sort();}

function fwGroup(f){
  const map={'React':'前端框架','Vue':'前端框架','Angular':'前端框架','Svelte':'前端框架','Solid':'前端框架','Qwik':'前端框架','Web Components':'组件技术','CSS':'样式方案','Multi':'多框架'};
  return map[f]||'其他';
}
function themeGroup(t){
  if(/3D|WebGL/.test(t))return '3D / WebGL';
  if(/Tailwind/.test(t))return 'Tailwind';
  if(/Bootstrap/.test(t))return 'Bootstrap';
  if(/Material/.test(t))return 'Material';
  if(/企业|行业|IBM|Carbon|华为|政府|公共|金融|医疗|教育|交通|SAP|Oracle|Adobe|Salesforce|Workday|Zendesk|Atlassian|HubSpot|Vercel|BBC|Uber|汽车|房产|品牌|通信|营销|后台|客服|HR|数据/.test(t))return '企业 / 行业';
  if(/Headless|无样式|a11y|表单|可访问|可定制|跨框架/.test(t))return '无样式 / Headless';
  if(/原子化|CSS|Utility|编译器|令牌|变量|样式方案|栅格|Flexbox|语义化/.test(t))return 'CSS / 原子化';
  if(/作品集|落地页|机构|创意|广告|品牌|时尚|音乐|工作室|建站|模板|营销|互动|体验/.test(t))return '作品集 / 创意';
  if(/移动端|H5|跨端|原生|滴滴|混合应用|iOS|Android/.test(t))return '移动端';
  return '其他';
}

// kind 段：全部 / 组件库 / 获奖项目（用中文显示）
const KIND_LABEL={item:'组件库',proj:'获奖项目'};
function renderKindSeg(){
  const wrap=$('#kindSeg');
  let h='<button data-kind="all" class="'+(state.kind==='all'?'active':'')+'">全部</button>';
  kinds().forEach(k=>{h+='<button data-kind="'+k+'" class="'+(state.kind===k?'active':'')+'">'+(KIND_LABEL[k]||k)+'</button>';});
  wrap.innerHTML=h;
  wrap.querySelectorAll('button').forEach(b=>b.onclick=()=>{state.kind=b.dataset.kind;renderKindSeg();render();});
}
function renderFw(){
  const list=fwList();
  const groups={};
  list.forEach(f=>{const g=fwGroup(f);if(!groups[g])groups[g]=[];groups[g].push(f);});
  const order=['前端框架','组件技术','样式方案','多框架','其他'];
  let h='<option value="">框架：全部</option>';
  order.forEach(g=>{
    if(!groups[g])return;
    h+='<optgroup label="'+g+'">';
    groups[g].forEach(f=>{const c=ITEMS.filter(i=>(i.fw||[]).includes(f)).length;h+='<option value="'+f+'"'+(state.fw===f?' selected':'')+'>'+f+' ('+c+')</option>';});
    h+='</optgroup>';
  });
  const sel=$('#fwSel');sel.innerHTML=h;sel.onchange=e=>{state.fw=e.target.value||null;render();};
}
function renderThemes(){
  const list=themeList();
  const groups={};
  list.forEach(t=>{const g=themeGroup(t);if(!groups[g])groups[g]=[];groups[g].push(t);});
  const order=['3D / WebGL','Tailwind','Bootstrap','Material','企业 / 行业','无样式 / Headless','CSS / 原子化','作品集 / 创意','移动端','其他'];
  let h='<option value="">主题：全部</option>';
  order.forEach(g=>{
    if(!groups[g])return;
    h+='<optgroup label="'+g+'">';
    groups[g].forEach(t=>{const c=ITEMS.filter(i=>i.theme===t).length;h+='<option value="'+t+'"'+(state.theme===t?' selected':'')+'>'+t+' ('+c+')</option>';});
    h+='</optgroup>';
  });
  const sel=$('#themeSel');sel.innerHTML=h;sel.onchange=e=>{state.theme=e.target.value||null;render();};
}
function filtered(){
  return ITEMS.filter(i=>{
   if(state.kind!=='all'&&(i.kind||'item')!==state.kind)return false;
   if(state.fw&&!(i.fw||[]).includes(state.fw))return false;
   if(state.theme&&i.theme!==state.theme)return false;
   if(state.onlySel&&!sel.has(i.id))return false;
   return true;});
}
function save(){localStorage.setItem(SEL_KEY,JSON.stringify([...sel]));}
function toggle(id){if(sel.has(id))sel.delete(id);else sel.add(id);save();renderBar();render();}
function renderBar(){const n=sel.size;$('#selN').textContent=n;$('#bar').classList.toggle('on',n>0);}
function renderStats(){
  const fws=new Set(),ths=new Set();
  ITEMS.forEach(i=>{(i.fw||[]).forEach(f=>fws.add(f));if(i.theme)ths.add(i.theme);});
  const libs=ITEMS.filter(i=>i.kind!=='proj').length, projs=ITEMS.filter(i=>i.kind==='proj').length;
  $('#stats').innerHTML='<div class="stat"><b>'+ITEMS.length+'</b><span>预览项</span></div>'+
    '<div class="stat"><b>'+libs+'</b><span>组件库</span></div>'+
    '<div class="stat"><b>'+projs+'</b><span>获奖项目</span></div>'+
    '<div class="stat"><b>'+fws.size+'</b><span>框架生态</span></div>'+
    '<div class="stat"><b>'+ths.size+'</b><span>主题</span></div>';
  $('#f-total').textContent=ITEMS.length;
}
function render(){
 const list=filtered();
 const parts=[];if(state.kind!=='all')parts.push('类型=<b>'+(KIND_LABEL[state.kind]||state.kind)+'</b>');
 if(state.fw)parts.push('框架=<b>'+state.fw+'</b>');if(state.theme)parts.push('主题=<b>'+state.theme+'</b>');
 if(state.onlySel)parts.push('仅看已选');
 $('#ctxLbl').innerHTML=(parts.length?parts.join(' · ')+' ｜ ':'')+'命中 <b>'+list.length+'</b> 项';
 $('#clearBtn').style.display=parts.length?'inline-block':'none';
 if(!list.length){view.innerHTML='<div class="empty">没有匹配项。</div>';return;}

 const libs=list.filter(i=>i.kind!=='proj');
 const projs=list.filter(i=>i.kind==='proj');

 if(state.kind==='all'){
   let h='';
   h+='<section class="sec"><div class="sec-h"><span class="sec-ic">📦</span><h2>UI 组件库与设计系统</h2><span class="sec-n">'+libs.length+'</span><span class="sec-tip">复制即用 · 覆盖 React / Vue / Angular / Svelte / Solid / Web Components / CSS / 大厂设计系统</span></div>'+(libs.length?'<div class="grid">'+libs.map(cardHtml).join('')+'</div>':'<div class="empty">无</div>')+'</section>';
   h+='<section class="sec"><div class="sec-h"><span class="sec-ic">🏆</span><h2>世界级获奖项目</h2><span class="sec-n">'+projs.length+'</span><span class="sec-tip">Awwwards / FWA / CSSDA 等获奖网站，含可运行源码与真实预览</span></div>'+(projs.length?'<div class="grid">'+projs.map(cardHtml).join('')+'</div>':'<div class="empty">无</div>')+'</section>';
   view.innerHTML=h;
 } else {
   const only=state.kind==='proj'?projs:libs;
   view.innerHTML='<div class="grid">'+only.map(cardHtml).join('')+'</div>';
 }
 view.querySelectorAll('.item').forEach(el=>el.onclick=()=>toggle(el.dataset.id));
}

function cardHtml(i){
   const selc=sel.has(i.id);
   const isProj=i.kind==='proj';
   const fwTags=(i.fw||[]).map(f=>'<span class="ftag '+fwColor(f)+'">'+f+'</span>').join('');
   let sub,extra='';
   if(isProj){
     sub=(i.agency||'')+' · '+(i.year||'');
     extra='<div class="award">★ '+i.award+'</div>';
   } else {
     sub=(i.vendor||'')+' · '+(i.theme||'');
   }
   const chipsArr=isProj?(i.tech||[]):(i.chips||[]);
   const chipsHtml=chipsArr.slice(0,6).map(c=>'<span class="ctag">'+c+'</span>').join('');
   return '<div class="item '+(selc?'sel':'')+'" data-id="'+i.id+'">'+
     '<span class="kind '+(isProj?'proj':'')+'">'+(isProj?'★ 获奖':'库')+'</span>'+
     '<span class="pick">'+(selc?'✓':'+')+'</span>'+
     '<img src="'+i.img+'" alt="'+i.name+'">'+
     '<div class="body"><h3>'+i.name+'</h3>'+
     '<div class="vendor">'+sub.trim()+'</div>'+
     extra+
     (chipsHtml?'<div class="chips2">'+chipsHtml+'</div>':'')+
     (fwTags?'<div class="fw">'+fwTags+'</div>':'')+
     '</div>'+
     '<a class="open" href="'+i.link+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ 打开</a>'+
   '</div>';
}
$('#clearBtn').onclick=()=>{state.fw=null;state.theme=null;state.kind='all';state.onlySel=false;$('#fwSel').value='';$('#themeSel').value='';renderKindSeg();renderFw();renderThemes();render();};
$('#onlySel').onclick=()=>{state.onlySel=!state.onlySel;render();};
$('#clearSel').onclick=()=>{sel.clear();save();renderBar();render();};
$('#copySel').onclick=async()=>{const rows=ITEMS.filter(i=>sel.has(i.id)).map(i=>i.name+' — '+i.link);try{await navigator.clipboard.writeText(rows.join('\n'));$('#copySel').textContent='✓ 已复制';setTimeout(()=>$('#copySel').textContent='📋 复制已选',1500);}catch(e){alert(rows.join('\n'));}};
renderStats();renderKindSeg();renderFw();renderThemes();render();renderBar();
</script></body></html>
