<!doctype html><html lang="zh"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>UI 复现报告 · Prompt to AI 重建验证</title>
<style>
:root{--paper:#F3EFE6;--ink:#17150F;--red:#E0401C;--line:rgba(23,21,15,.15);}
*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;}
.wrap{max-width:1100px;margin:0 auto;padding:32px 24px 80px;}
header{border-bottom:2px solid var(--ink);padding-bottom:18px;margin-bottom:8px;}
h1{font:700 30px/1.1 Georgia,"Times New Roman",serif;margin:0 0 6px;letter-spacing:-.01em;}
.sub{color:#6b6457;font-size:14px;}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin:22px 0;}
.card{flex:1;min-width:150px;border:1px solid var(--line);border-radius:10px;padding:14px 16px;background:#fffdf8;}
.card .n{font:700 30px/1 Georgia,serif;}
.card .l{font-size:12px;color:#6b6457;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}
.card.red .n{color:var(--red);}
.bar{height:10px;background:var(--line);border-radius:6px;overflow:hidden;margin:8px 0 4px;}
.bar>span{display:block;height:100%;background:var(--red);}
.controls{display:flex;gap:10px;align-items:center;margin:26px 0 14px;flex-wrap:wrap;}
.controls input,.controls select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fffdf8;font-size:14px;}
.controls input{flex:1;min-width:180px;}
table{width:100%;border-collapse:collapse;font-size:14px;}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:top;}
th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#6b6457;cursor:pointer;user-select:none;}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;}
.tag.passed{background:#e4efe4;color:#2f6b2f;}
.tag.failed{background:#fbe3da;color:var(--red);}
.tag.unreachable{background:#eee;color:#888;}
button.copy{font:13px/1 sans-serif;border:1px solid var(--ink);background:var(--ink);color:var(--paper);border-radius:7px;padding:6px 10px;cursor:pointer;}
button.copy:hover{background:var(--red);border-color:var(--red);}
a.lk{color:var(--ink);text-decoration:underline;}
.modal{position:fixed;inset:0;background:rgba(23,21,15,.6);display:none;align-items:center;justify-content:center;padding:24px;z-index:50;}
.modal.open{display:flex;}
.modal .box{background:var(--paper);max-width:760px;width:100%;max-height:86vh;overflow:auto;border-radius:12px;padding:22px 24px;}
.modal pre{white-space:pre-wrap;background:#fffdf8;border:1px solid var(--line);border-radius:8px;padding:14px;font:13px/1.6 ui-monospace,Menlo,Consolas,monospace;}
.modal h3{margin:0 0 4px;font-family:Georgia,serif;}
.sec-h{font:700 18px Georgia,serif;margin:34px 0 12px;border-top:1px solid var(--line);padding-top:18px;}
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0;}
.cmp figure{margin:0;}
.cmp img{width:100%;border:1px solid var(--line);border-radius:8px;background:#fff;display:block;}
.cmp figcaption{font-size:12px;color:#6b6457;margin-top:5px;text-align:center;}
</style></head><body><div class="wrap">

const ROWS=[{"id":"aceternity","name":"Aceternity UI","kind":"item","status":"passed","attempts":1,"notes":"v1 dark component-card preview matches layout, colors, and tabs","ref":"previews/aceternity.png","rebuild":"repro/aceternity/build.v1.png","prompt":"Reproduce the Aceternity UI component preview card shown in the reference screenshot at 1280px width. The card fills the viewport and looks like a macOS window preview of a React UI library.\n\nCanvas / global: very dark navy/black background (#0b0d14), no page scroll, content centered both vertically and horizontally. The whole preview area has a large rounded border radius (24px) and a subtle darker inset shadow/frame, but for the screenshot just fill the 1280x820 viewport with the dark card.\n\nTop bar (top-left, padding ~40px from left/top):\n- Three small circles in a row (macOS traffic lights): red (#ff5f57), amber/yellow (#ffbd2e), green (#28c840). Each circle ~12px with a subtle inner highlight.\n- To the right of the circles, large bold title \"Aceternity UI\" in white (#f8fafc), font-size ~26px, font-weight 600.\n- Below the title, small gray subtitle \"React · 动画组件 / 炫酷\" in #94a3b8, font-size ~13px.\n\nControls row under the title (left aligned, margin-top ~28px, flex gap ~12px):\n- \"Primary\" button: cyan/turquoise background (#22d3ee), black text, rounded-full pill, padding ~8px 18px, font-weight 500.\n- \"Default\" button: transparent dark background (#161b2e), white text, rounded-full pill, border 1px solid #2d3555, padding ~8px 18px.\n- \"Type here...\" input: same dark pill style (#161b2e, border #2d3555, rounded-full), placeholder gray (#64748b), padding ~8px 18px, min-width ~120px.\n\nSecond controls row (margin-top ~14px):\n- A cyan/blue toggle switch in the ON position: an elongated pill track (#22d3ee) ~44px wide x 24px tall with a white circle knob on the right.\n- \"Badge\" label: dark pill with a thin teal/cyan border (#0d9488) and teal text (#5eead4), padding ~6px 14px, rounded-full.\n- \"Select\" dropdown: dark pill (#161b2e), white text, rounded-full, border #2d3555, padding ~6px 14px, with a small down-chevron on the right.\n\nMain card (center, below controls, margin-top ~28px):\n- Rounded-xl dark card (#131625) with 1px border (#252a3f), padding ~24px, max-width ~520px.\n- Inside, heading \"Card title\" in white, font-size ~18px, font-weight 600.\n- Below, body text \"This is a preview of the component look.\" in gray (#94a3b8), font-size ~14px, margin-top ~6px.\n\nBottom tabs (bottom-left or bottom-center, margin-top ~40px, flex gap ~10px):\n- Four dark rounded-full pill buttons: \"Card\", \"Background\", \"3D\", \"Carousel\". Each has bg #161b2e, border #2d3555, text #94a3b8, padding ~8px 16px, font-size ~13px.\n\nTypography: use system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif.\n\nVibe: sleek dark-mode developer tool preview, minimal, rounded, cyan accent.\n"},{"id":"awd-activetheory","name":"Active Theory","kind":"proj","status":"passed","attempts":1,"notes":"v1 PASS — Awwwards card recreated: purple-magenta gradient, trophy, Active Theory name/year, pink Awwwards/FWA badge, Chinese tag, WebGL label, ★AWARD badge","ref":"previews/awd-activetheory.png","rebuild":"repro/awd-activetheory/build.v1.html","prompt":"# Recreate above-the-fold UI — activetheory.net Awwwards Gallery Card\n\nGoal: single self-contained HTML file (inline CSS, system fonts, no external assets) recreating the Awwwards gallery card for Active Theory (1280x820).\n\nThis is an Awwwards award gallery card, not the live website. It has a dark gradient background with a consistent card layout.\n\nLayout:\n- Full-viewport dark gradient background: radial from top-left purple-magenta to deep black. Approximate: `background: radial-gradient(ellipse at top left, #4a1942, #1a0a24 55%, #0a0510);`\n- Top-right corner: an outline-only ★ AWARD badge pill — white border, transparent bg, rounded-full, ~14px uppercase, star icon + \"AWARD\"\n- Content area (left side, ~60px from left edge):\n  - Large gold trophy icon 🏆 (emoji or CSS shape) — ~52px\n  - Headline below: **\"Active Theory\"** in white, ~38px, bold, sans-serif\n  - Subtitle line: \"Active Theory · 2023\" in light gray/white ~16px, regular weight\n  - Colored badge pill below: pink/magenta fill (#d94b8e), white text, \"Awwwards / FWA\", rounded-full, ~14px padding 6px 18px\n  - Chinese tagline below badge: \"互动体验\" in muted gray-white ~16px\n- Bottom-left corner (~30px from edges): a small tech label pill — semi-transparent dark bg (rgba(255,255,255,0.08)), thin white/gray border, white text \"WebGL\", rounded, ~13px padding 5px 12px\n\nTypography: system sans-serif (Helvetica, Arial). No external fonts.\nNo scrollbars, no overflow.\n"},{"id":"proj-2025-adidas","name":"Adidas (Clone)","kind":"proj","status":"passed","attempts":1,"notes":"PASS on v1. Simple dark developer preview page with centered text and code block. Visual match is close.","ref":"previews/proj-2025-adidas.png","rebuild":"repro/proj-2025-adidas/build.v1.html","prompt":"# Prompt: Recreate Adidas 3D Landing Page Preview\n\nRecreate this above-the-fold UI at 1280px width.\n\n## Layout & Background\n- Full-viewport height, pure black background (#0a0a0a or #000)\n- Content is perfectly centered both horizontally and vertically\n- No header, no nav, no footer — just a single centered block\n\n## Typography (system fonts only)\n- Use system monospace for code blocks (`-apple-system`, `Menlo`, `Consolas`, monospace)\n- Body text uses system sans-serif stack\n\n## Hero Section (centered)\n1. **Main heading**: \"Adidas 3D 落地页\" — white (#fff), bold, large (~32-36px), centered\n2. **Subheading line 1**: \"该项目需要构建后才能预览。在本地执行：\" — light gray (#999 or #aaa), ~16px, centered, margin-top ~16px\n3. **Code block**: Dark background (#1a1a1a or #111), rounded corners (~6px), padding ~12px 20px, inline-block style, contains text:\n   `cd source/2025-adidas && npm install && npm run dev`\n   - Text color: light greenish-white (#e0e0e0), monospace font, ~14px\n4. **Subheading line 2**: \"源码已原样保存在 source/2025-adidas/, 可逐文件查看/复制。\" — dimmer gray (#666 or #777), ~14px, centered, margin-top ~16px\n\n## Vibe\n- Minimalist developer preview page\n- Dark mode, terminal-like aesthetic\n- Clean, lots of empty space around center block\n"},{"id":"ag-grid","name":"AG Grid","kind":"item","status":"unreachable","attempts":0,"notes":"read returned 403 CloudFront error page (title 'ERROR: The request could not be satisfied', H1 '403 ERROR'). ok:true in read.json but no real UI content captured — effectively a read failure.","ref":"previews/ag-grid.png","rebuild":null,"prompt":""},{"id":"agnosticui","name":"AgnosticUI","kind":"item","status":"passed","attempts":1,"notes":"PASS on v1. AgnosticUI hero layout: light blue bg, gradient headline 'AgnosticUI Local', bold subtitle, description text, teal 'Get Started' section, terminal preview.","ref":"previews/agnosticui.png","rebuild":"repro/agnosticui/build.v1.html","prompt":"# Prompt: Recreate AgnosticUI above-the-fold UI\n\nRecreate the above-the-fold UI of AgnosticUI as a single self-contained HTML file at 1280px width.\n\n## Overall Layout\nClean, modern, light-themed landing page with a soft blue-tinted background and centered hero content.\n\n### Top Navigation Bar\n- Background: transparent or very light tinted (`#f0f4ff` or similar pale blue-white)\n- Height: ~56px\n- Padding: 0 40px\n- Left: **\"AgnosticUI\"** brand name — medium blue (`#2563eb`), ~16px, font-weight 600\n- Right side items (horizontal):\n  - **\"Components\"** link — dark text ~14px\n  - Theme toggle icon (sun/moon toggle switch appearance, subtle rounded pill shape, light gray bg)\n  - GitHub icon (dark circle with cat silhouette)\n\n### Hero Section (centered, takes up most of viewport)\n- Background: Very light blue gradient or tint (`#eef2ff` to `#f5f3ff`), maybe with subtle large blurred circles/shapes in background for depth\n- Content centered horizontally, positioned in upper-middle of viewport:\n\n#### Headline Area\n1. **\"AgnosticUI Local\"** — Large text (~42px), **gradient color** from light blue to deeper blue (like `#60a5fa` to `#2563eb`), font-weight 700\n2. **\"The AI-native UI kit\"** — Even larger text below (~48-52px), **bold black** (`#111827`), font-weight 800\n\n#### Description Paragraph\nBelow headline, centered, max-width ~600px:\n**\"Local source lives in your codebase. Our AG Context Generator arms your favorite LLM with exact component locations, types, and usage. Claude. Codex. Copilot. Gemini. And more.\"**\n- Color: dark gray (`#374151`)\n- Font size: ~17px\n- Line-height: ~1.6\n\n### Lower Section (below hero)\n#### Section Title\n**\"Get Started in Seconds\"**\n- Teal/green color (`#059669` or `#0d9488`)\n- Font size: ~30px\n- Bold, centered\n\n#### Subtitle\n**\"Three commands and your agent of choice knows your entire stack.\"**\n- Dark gray, ~16px, centered\n\n### Terminal Preview (bottom of visible area)\nA terminal/code window component:\n- macOS-style window chrome (dots red/yellow/green) at top-left of terminal frame\n- Title bar: \"terminal\" text\n- Light/grayish background\n- Rounded corners\n- Subtle shadow\n- Width: ~700px, centered\n\n## Colors\n- Page bg: `#eef2ff` (very pale blue-lavender)\n- Primary blue: `#2563eb`\n- Gradient text: `#60a5fa` → `#3b82f6`\n- Teal accent: `#059669`\n- Text dark: `#111827`\n- Text body: `#374151`\n- Terminal bg: `#f8fafc` or light gray\n\n## Typography\nSystem fonts: `Inter, ui-sans-serif, system-ui, -apple-system, sans-serif`\nHeadline gradient: large, bold\nBody: clean, readable\n\n## Vibe\nModern, clean, AI-focused dev tool landing page. Minimal, airy, confident. Soft gradients, generous whitespace.\n"},{"id":"agnosui","name":"AgnosUI","kind":"item","status":"passed","attempts":2,"notes":"read returned GitHub 404 but preview is dark gallery card; v1 built GitHub 404 page; v2 matches gallery template","ref":"previews/agnosui.png","rebuild":"repro/agnosui/build.v2.html","prompt":""},{"id":"awd-akqa","name":"AKQA","kind":"proj","status":"passed","attempts":1,"notes":"v1 PASS — Awwwards card: red-maroon gradient, AKQA/2023, red badge, 数字代理, WebGL","ref":"previews/awd-akqa.png","rebuild":"repro/awd-akqa/build.v1.html","prompt":"# Recreate above-the-fold UI — akqa.com Awwwards Gallery Card\n\nGoal: single self-contained HTML file recreating the Awwwards gallery card for AKQA (1280x820). This is an Awwwards award gallery card, not the live site.\n\nLayout:\n- Full-viewport dark red/maroon-to-black gradient: `radial-gradient(ellipse at top left, #5c1818, #240808 55%, #0e0303)`\n- Top-right: ★ AWARD outline badge pill\n- Content left (~60px):\n  - Gold trophy 🏆 ~52px\n  - \"**AKQA**\" white ~38px bold\n  - \"AKQA · 2023\" light gray ~16px\n  - Badge pill: red fill (#c43d3d), white \"Awwwards\", rounded-full\n  - Chinese: \"数字代理\" muted gray-white ~16px\n- Bottom-left tech pill: border+semi-bg, \"WebGL\"\nTypography: system sans-serif.\n"},{"id":"alignui","name":"AlignUI","kind":"item","status":"passed","attempts":1,"notes":"v1 dark gallery card with cyan accent matches layout and components","ref":"previews/alignui.png","rebuild":"repro/alignui/build.v1.png","prompt":"# AlignUI — Gallery Preview Card Prompt\n\nBuild a dark-themed component gallery preview card at 1280×820 px that looks like a macOS browser window showcasing the AlignUI design system.\n\n## Overall Layout\n- **Canvas**: 1280px wide, 820px tall, centered dark background (#161622).\n- **Card**: centered, rounded rectangle (border-radius ~14px), background #1c1c2a, subtle border #2a2a3d, padding ~22px 28px 28px, width ~1100px.\n- **Window chrome**: top-left row of three colored dots (red #FF5F57, yellow #FEBC2E, green #28C840), each 12px circle.\n\n## Header Section (inside card)\n- **Site title**: \"AlignUI\" — bold white, ~21px, sans-serif, margin-bottom 5px.\n- **Subtitle**: \"React · 设计系统组件 / Figma\" — ~13.5px, gray (#9ca3af), sans-serif.\n\n## Component Showcase Area\nA dark inner panel (#222235, rounded ~10px, padding 18–20px) containing, in a single row with gaps:\n1. **Primary button**: solid cyan (#38BDF8) background, white text \"Primary\", rounded ~8px, padding 7px 18px.\n2. **Default button**: dark background (#2a2a3d), light text \"Default\", 1px border #3a3a52, rounded ~8px.\n3. **Input field**: dark background (#252535), 1px border #3a3a52, rounded ~8px, placeholder \"Type here...\" in muted gray (#9ca3af), padding 7px 14px, width ~140px.\n4. **Toggle switch**: ON state, track color #38BDF8, white knob on the right, rounded pill.\n5. **Badge**: teal/cyan background (#0d7377), white text \"Badge\", small rounded pill.\n6. **Select dropdown**: dark background (#2a2a3d), white text \"Select\" with a downward chevron, rounded ~8px, border #3a3a52.\n\n## Card Preview Box\nA bordered inner card (border 1px #2a2a3a, rounded ~10px, padding 16px) containing:\n- **Heading**: \"Card title\" — white, bold, ~16px.\n- **Body**: \"This is a preview of the component look.\" — gray (#9ca3af), ~13px.\n\n## Bottom Tag Pills Row\nSmall rounded pill buttons with dark backgrounds (#2a2a3d), light borders (#3a3a52), light text, compact padding. Arranged in a single row:\n`Button` `Input` `Card` `Tabs` `Dialog`\n\n## Typography & Colors\n- Font family: system-ui, -apple-system, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif.\n- Headings: white (#fff); muted text: #9ca3af; secondary text: #d1d1db.\n- Accent: cyan (#38BDF8) for Primary button and toggle switch.\n- Card inner bg slightly lighter than page background (#1c1c2a vs #161622).\n- Avoid external assets; use inline CSS and system fonts.\n"},{"id":"ng-material","name":"Angular Material","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: Lavender-nav/Material-logo + hero(large-A-watermark/Angular-Material-heading+blue-sub+white-pill-CTA) + 3col-features(HighQuality/Versatile/Frictionless)","ref":"previews/ng-material.png","rebuild":"repro/ng-material/build.v1.png","prompt":"Recreate the above-the-fold landing page of **Angular Material** (material.angular.io).\n\n## Overall Layout & Theme\n- Clean, minimal design inspired by Google's Material Design aesthetic.\n- Background: Very light lavender-blue (#f8f9ff or #f5f7fa) for hero area; pure white for features section below.\n- Font: Roboto, \"Helvetica Neue Light\", Helvetica, Arial, sans-serif.\n- Text color: Dark navy (#1a237e) for main headings; medium blue (#1565c0) for subheadings; #333 for body.\n\n## Top Navigation Bar\n- Background: light periwinkle/lavender (#d7e3ff or #e8edfc). Height ~56px.\n- **Left**:\n  - Angular Material logo icon — the classic Material/Angular \"A\" shield shape in blue (~22px, #1976d2).\n  - \"Material\" text next to it, bold, ~16px, color #1a237e.\n- **Center-left nav links** (gap ~24px): `Components`, `CDK`, `Guides` — each ~14px, color #1a237e, no underline.\n- **Right side items**:\n  - Version dropdown: `22.0.4 ▾` — same dark blue text, small down-caret.\n  - Theme/palette icon (paint bucket or format-fill icon, ~20px, #555).\n  - GitHub link: GitHub circle icon + \"GitHub\" text, ~14px, #333.\n\n## Hero Section (centered, light lavender bg)\n- Padding-top ~50px; padding-bottom ~40px; text-align center; position relative.\n- **Background watermark**: Behind all hero content, a very large, semi-transparent letter \"A\" (the Angular Material logo mark) in extremely light gray (#e8eaef), centered and oversized (~400px tall), low opacity (.12). This is the distinctive visual signature of the Angular Material homepage.\n\n**Main heading**: \"Angular Material\"\n- Very large (~44-48px), font-weight 500 (medium-bold), color deep navy (#0c3459).\n\n**Subheading**: \"Material Design components for Angular\"\n- ~17px, color medium blue (#1a56a8), margin-top 6px.\n\n**CTA button** (margin-top 28px):\n- \"Get started\" — white background, 1px solid #dadce0, subtle box-shadow (0 1px 3px rgba(0,0,0,.08)), border-radius: 9999px (full pill), padding 11px 32px, font-size 15px, font-weight 500, color #1976d2 (Material Blue). No heavy styling — it's a clean, outlined-ish white button.\n\n## Features Section (white background, below hero)\n- White bg, padding 36px 60px.\n- **Three-column layout**, equal widths, gap ~36px:\n\n### Column 1 — High quality\n- Heading: \"High quality\" — ~18px, font-weight 500, color #222, margin-bottom 10px.\n- Paragraph: \"Internationalized and accessible components for everyone. Well tested to ensure performance and reliability.\" — ~14.5px, line-height 1.65, color #444.\n- Second paragraph: \"Straightforward APIs with consistent cross platform behaviour.\" — same style.\n\n### Column 2 — Versatile\n- Heading: \"Versatile\" — same heading style.\n- Paragraph: \"Provide tools that help developers build their own custom components with common interaction patterns.\"\n- Paragraph: \"Customizable within the bounds of the Material Design specification.\"\n\n### Column 3 — Frictionless\n- Heading: \"Frictionless\" — same heading style.\n- Paragraph: \"Built by the Angular team to integrate seamlessly with Angular.\"\n- Paragraph: \"Start from scratch or drop into your existing applications.\"\n\n## Visual Notes\n- This is a Google/Angular-branded landing page — clean, lots of whitespace, professional enterprise feel.\n- The large translucent \"A\" watermark behind the hero is THE key visual differentiator.\n- Color palette uses Material Design blues (primary: #1976d2, darker: #0c3459).\n- Typography is Roboto throughout — clean, readable, not overly bold.\n- The Get started button is deliberately understated — white with subtle shadow, not a heavy colored CTA.\n"},{"id":"awd-animade","name":"Animade","kind":"proj","status":"passed","attempts":1,"notes":"Visual match close enough. Dark gradient card with trophy, AWARD pill, title, subtitle, Awwwards pill, theme and GSAP tag.","ref":"previews/awd-animade.png","rebuild":"build.v1.html","prompt":""},{"id":"antd","name":"Ant Design","kind":"item","status":"passed","attempts":1,"notes":"v1 matches above-the-fold layout, colors, and components","ref":"previews/antd.png","rebuild":"repro/antd/build.v1.png","prompt":"Reproduce the Ant Design (https://ant.design) homepage above-the-fold section at 1280px width. \n\nGlobal style: clean, modern, white background (#ffffff), dark text near black (#000000 at 0.88 opacity), primary accent blue #1677ff, secondary grays (#d9d9d9 borders, #f5f5f5 subtle backgrounds). System Chinese font stack: -apple-system, system-ui, Segoe UI, Roboto, Helvetica Neue, Arial, Noto Sans, PingFang SC, Microsoft YaHei, sans-serif.\n\nTop navigation bar (height ~64px, white background, subtle bottom border, horizontal padding ~32px, flex justify-between align-center):\n- Left: brand logo — a small geometric diamond-shaped icon made of two overlapping blue/cyan/triangular shapes pointing right, next to the text \"Ant Design\" in bold black.\n- Center-left: a search input with rounded border, placeholder text \"输入关键字搜索...\", light gray border, small search icon on the left.\n- Right: nav links with Chinese labels separated by space: \"设计\" \"研发\" \"组件\" \"博客\" \"资源\" \"国内镜像\". After the links, show a tiny circular badge with the initials \"中\" (white text on dark blue/purple) and a small colored version pill \"6.5.0\". Then a row of small mono icon buttons (language, theme, GitHub, etc.) in neutral gray.\n\nHero section (centered, white background, large top padding ~70px, padding-bottom ~50px):\n- Huge centered headline: \"Ant Design\" in very bold black sans-serif (~64px).\n- Subcopy below headline: \"AI友好的「设计系统」，让美与智能并进，让工作充满「灵感」与「快乐」。\" in medium gray, ~18px, max-width ~720px, centered.\n- Two centered buttons below subcopy (gap ~16px):\n  - Primary: \"开始使用\" with blue background #1677ff, white text, rounded pill border-radius ~100px, padding ~10px 24px.\n  - Secondary: \"设计语言\" with white background, thin gray border, dark text, rounded border-radius ~6px, same padding.\n\nNews cards row (three cards in a horizontal flex row, gap ~24px, centered, max-width ~1160px, padding 24px 32px):\n- Each card is white with a very light gray border, border-radius ~8px, padding ~24px, flex 1, equal height.\n- Card 1 title: \"Ant Design Pro V6 发布\" with a red \"HOT\" badge on the right. Body: \"脱胎换骨的全新版本！全新技术栈加持，React 19 + antd 6 + utoo，构建速度飞跃 42%，AI 助手开箱即用，开发体验全面进化。\"\n- Card 2 title: \"Ant Design CLI 发布\". Body: \"开发者的新伙伴。终端里随时召唤 Ant Design，查 API、做迁移，官方 MCP 服务，离线也能用\" Then date \"2026.05.08\".\n- Card 3 title: \"Ant Design 6.0 发布！\". Body: \"新一代 Ant Design 正式发布！极致灵活定制主题，拥抱 React 新生态。为 AI 时代的应用开发提供更坚实的基础与更卓越的体验。\" Then date \"2025.11.22\".\n\nSponsors strip (light gray background, full width, padding ~24px):\n- Left label \"SPONSORS\" in small light gray uppercase.\n- Right: sponsor logos/names inline: small \"Yh\" icon with \"YouMind\", a blue circle with \"TRACTIAN\", a pink/purple robot icon with \"LobeHub\", a red/orange icon with \"CodeRabbit\".\n\nThe whole page should feel like a polished Chinese enterprise UI library landing page, simple and flat with minimal shadow.\n"},{"id":"antd-mobile","name":"Ant Design Mobile","kind":"item","status":"passed","attempts":1,"notes":"v1 matches Ant Design Mobile landing layout, blue hero, floating UI, and feature cards","ref":"previews/antd-mobile.png","rebuild":"repro/antd-mobile/build.v1.png","prompt":"Reproduce the Ant Design Mobile homepage above-the-fold at 1280px width.\n\nGlobal style: bright blue gradient background (center #2b8df5, edges #1677ff), white text. Chinese UI library landing page. Font stack: -apple-system, system-ui, \"Segoe UI\", \"PingFang SC\", \"Microsoft YaHei\", sans-serif.\n\nTop navigation bar (~56px, transparent/blue background, white text, flex justify-between align-center, padding 0 32px):\n- Left: Ant Design Mobile logo — a stylized blue \"A\" made of two lines with two small colored dashes (red and blue) to the right, followed by text \"Ant Design Mobile\" in white bold, and a illing entire 1280×820 area\n- Single centered content column feel — minimal, premium award-showcase aesthetic\n\n## Top-right Area\n- Top right corner: rounded pill button with \"★ AWARD\" text\n  - Background: transparent, border: 1px solid rgba(255,255,255,0.25)\n  - Color: white/light gray ~`#ccc`\n  - Border-radius: 20px\n  - Padding: ~8px 18px\n  - Font-size: ~13px, letter-spacing: 1px\n  - Position: absolute top-right, margin ~24px\n\n## Main Content Area (centered vertically and horizontally)\n- Left-aligned block starting at x≈60px, vertically centered\n\n### Trophy Icon\n- Large gold trophy emoji/icon: 🏆 or golden trophy graphic\n- Size: ~48px, positioned above the title\n- Color: golden #D4AF37 or use emoji\n\n### Title\n- Text: \"Apple\"\n- Font-size: ~42–48px, font-weight: 700 (bold)\n- Color: white `#ffffff`\n- Font-family: system-ui, -apple-system, SF Pro Display, Helvetica Neue, sans-serif\n- Letter-spacing: -0.5px\n- Margin-top: 16px below trophy\n\n### Subtitle Line\n- Text: \"Apple · 2023\"\n- Font-size: ~17px\n- Color: light gray `#999` or `#aaa`\n- Font-weight: 400\n- Margin-top: 8px\n\n### Tag Pill\n- Rounded pill/tag below subtitle: \"Awwwards\"\n  - Background: rgba(255,255,255,0.12)\n  - Color: white `#eee`\n  - Border-radius: 20px\n  - Padding: 6px 18px\n  - Font-size: ~14px\n  - Display: inline-block\n  - Margin-top: 14px\n\n### Category Label\n- Text: \"产品\" (Chinese for \"Product\")\n- Font-size: ~15px\n- Color: `#888`\n- Margin-top: 12px\n\n## Bottom-left Badge\n- Bottom-left area: small rounded rectangle \"WebGL\"\n  - Background: rgba(255,255,255,0.08)\n  - Border: 1px solid rgba(255,255,255,0.15)\n  - Color: `#bbb`\n  - Border-radius: 8px\n  - Padding: 8px 16px\n  - Font-size: ~13px\n  - Position: absolute bottom-left, margin ~28px\n\n## Typography\n- System font stack: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif\n- Clean, minimal — lots of whitespace\n\n## Vibe\n- Premium, minimal, dark-mode award showcase\n- High contrast white on near-black\n- Generous spacing between elements\n- No clutter — only essential info displayed\n"},{"id":"arco-vue","name":"Arco Design","kind":"item","status":"failed","attempts":1,"notes":"Visual compare BLOCKED: this model cannot read PNG images, so screenshot-vs-reference comparison (loop step 4) could not be performed. Build produced from prompt v1 only (v2/v3 skipped — no gap list obtainable without vision). Structural fidelity vs read.json: 3/4 checks passed (title=true, h1=true, nav=true, color=false). read ok.","ref":"previews/arco-vue.png","rebuild":"repro/arco-vue/build.v1.html","prompt":"Recreate the above-the-fold UI of the Arco Design Vue documentation page (arco.design/vue) — a Vue UI component library by ByteDance. Build a single self-contained HTML file (inline CSS, vanilla, system font stack, no external assets) at 1280px width.\n\nOverall theme: clean, white documentation layout.\n- Page background: #FFFFFF. Primary text: #4E5969 (rgb(78,89,105)) slate-grey.\n- Brand accent: Arco blue #165DFF (rgb(22,93,255)).\n\nTop navigation bar (white, sticky, ~60px, subtle bottom border #E5E6EB):\n- Left: \"Arco Design\" wordmark (bold) with a small blue square logo glyph.\n- Framework tabs: \"React\" (plain) and \"Vue\" (active — blue text #165DFF, maybe light blue underline/tint).\n- Right nav links (slate, ~14px): 快速上手, 暗黑模式, 定制主题, 设计变量, 国际化, 常见问题, 更新日志, and a GitHub icon.\n\nBelow the top bar, a documentation layout:\n- A left sidebar (width ~240px, light, border-right) listing doc sections: 快速上手, Npm 命令, 目录结构 (and a few more muted items).\n- Main content area: a large heading \"快速上手\" (Quick Start, bold, ~32px, dark) and beneath it a code block (dark/light grey rounded box, monospace) showing:\n    import ArcoVue from '@arco-design/web-vue';\n    app.use(ArcoVue);\n  plus a small \"取消\" (cancel, grey button) and \"确定\" (confirm, blue #165DFF button) pair to echo component demos.\n\nFont: Inter / system sans. Vibe: professional enterprise docs, blue accent, lots of whitespace.\n"},{"id":"ariakit","name":"Ariakit","kind":"item","status":"passed","attempts":1,"notes":"v1 matches Ariakit landing layout, nav, hero, gradient underlines, and component cards","ref":"previews/ariakit.png","rebuild":"repro/ariakit/build.v1.png","prompt":"Reproduce the Ariakit homepage above-the-fold at 1280px width.\n\nGlobal style: white background (#ffffff), black text (#000000), blue accent (#007acc or similar), with gradient underlines (blue to purple/pink). Font stack: __GeistSans, system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif.\n\nTop navigation bar (~56px, white background, border-bottom 1px solid #e8e8e8, flex justify-between align-center, padding 0 32px):\n- Left: Ariakit logo — a blue rounded square with a white stylized lowercase \"a\" inside, followed by the text \"ariakit\" in bold dark lowercase. Then a version pill/button \"v0.4.32\" with a small sparkle/asterisk icon and a downward chevron. Then a \"Browse\" button with a magnifying glass icon and \"⌘K\" shortcut.\n- Right: a plain text link \"Unlock Ariakit Plus\", a bell notification icon button (with a tiny blue dot badge), and a moon/theme icon button.\n\nHero section (centered, white background, padding ~90px 32px 50px):\n- Very large bold centered headline \"Build accessible web apps with React\" on two lines (~58px, black, line-height 1.05, max-width ~700px).\n- Centered subcopy (~18px, gray #555, max-width ~640px, line-height 1.6): \"Open-source library with unstyled, primitive components, with a collection of styled examples that you can copy and paste into your apps.\" Underline the words \"unstyled\", \"primitive\", and \"styled examples\" with colorful gradient underlines (blue to pink/purple). Each underline should be a short gradient bar (roughly 2-3px thick) beneath the word.\n- Two centered buttons below subcopy (gap 20px):\n  - Primary \"Get started\" with blue background (#007acc), white text, rounded 8px, padding ~12px 24px.\n  - Secondary \"Explore components\" with transparent background, black text, and a right arrow \"→\".\n\nComponent showcase section (below hero, three large gray cards with rounded corners, gap ~20px, max-width ~1100px, margin auto, padding 0 32px 60px):\n- Left card: light gray (#f3f4f6) rounded rectangle with a simple dropdown/combobox example: a search input \"Search for users\", a list of users (\"Harry Poe\", \"John Doe\"), and \"Esc\"/\"Delete\" hints on the right.\n- Center card: light gray rounded rectangle with a simple data table header showing \"Account type\" and \"Address\" columns.\n- Right card: light gray rounded rectangle with two user profile rows (avatar circles with initials \"J\" and \"H\", names \"John Doe\", \"Harry Poe\", emails), a dropdown arrow, and an \"Actions\" button.\n\nOverall vibe: clean, modern, minimalist open-source React library landing page with gradient accents and subtle component previews.\n"},{"id":"awd-aristide","name":"Aristide","kind":"proj","status":"passed","attempts":1,"notes":"Visual match close enough. Dark gradient card with trophy, AWARD pill, title, subtitle, Awwwards pill, theme and GSAP tag.","ref":"previews/awd-aristide.png","rebuild":"repro/awd-aristide/build.v1.html","prompt":"Create a single self-contained HTML file (HTML + inline CSS, no external assets) that renders a 1280x820 dark gallery preview card for a project called \"Aristide\".\n\nDesign specification:\n- Page background: dark radial gradient from deep black (#0a0a0a) at the top-left to the project accent color (#60a5fa) towards the bottom-right. Use a 1280x820 fixed viewport with overflow hidden.\n- Font: clean sans-serif system font stack (e.g., -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif).\n- Top-left: a gold trophy icon (inline SVG, fill #fbbf24), size about 64px, positioned roughly 80px from left and 80px from top.\n- Top-right: a rounded pill button with transparent background, 1px solid rgba(255,255,255,0.6) white border, white text \"AWARD\", with a small white star icon to the left of the text. Padding ~12px 24px, border-radius 999px. Position roughly 80px from right and 80px from top.\n- Center-left content area, left-aligned with ~100px left padding, vertically centered (slightly above center):\n  - Large white bold title \"Aristide\", font-size ~72px, line-height 1.1, margin-bottom ~12px.\n  - Smaller light-gray/white subtitle \"Aristide · 2023\", font-size ~22px, opacity 0.75, margin-bottom ~20px.\n  - A rounded pill using the project accent color (#60a5fa) with white text \"Awwwards\", font-size ~16px, padding ~10px 22px, border-radius 999px, inline-block, margin-bottom ~16px.\n  - Small gray text \"作品集\", font-size ~16px, opacity 0.6.\n- Bottom-left: a dark rounded pill (background rgba(0,0,0,0.45)) with light text \"GSAP\", font-size ~14px, padding ~10px 20px, border-radius 999px. Position roughly 80px from left and 80px from bottom.\n- No external images, no JavaScript, no CSS animations, system fonts only. Ensure the layout is self-contained and visually matches the described card.\n"},{"id":"ark-ui","name":"Ark UI","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: Captured warm bg, ARK header, red-accented hero, CTA buttons, framework pills, deco squares, tab bar+FAB","ref":"previews/ark-ui.png","rebuild":"repro/ark-ui/build.v1.png","prompt":"# Prompt: Recreate Ark UI Landing Page (Above-the-Fold)\n\nRecreate the above-the-fold landing page of **Ark UI** (ark-ui.com) — Unstyled UI components for your Design System.\n\n## Overall Background\n- Very light warm beige/cream color: `#fdfdfc` or `oklch(0.985 0.002 247)` — a subtle off-white with slight warmth\n- Subtle decorative background elements: faint peach/salmon colored squares scattered/positioned at various places in the background (decorative, low opacity)\n\n## Header Bar\n- White background, floating/fixed style with rounded corners or clean flat\n- Height: ~52px\n- Positioned at top center with some margin from edges (or full-width but white on the warm bg)\n- **Left side:**\n  - \"**ARK**\" logo text in bold red/orange (`#eb5e41` or similar coral-red), ~18px font weight 800\n- **Center nav links**:\n  - \"**Docs**\"\n  - \"**Showcase**\"\n  - \"**Blog**\"\n  - \"**Plus ✨**\" (with sparkle/star icon)\n  - Font size ~14px, dark gray color\n- **Right side icons:**\n  - GitHub icon (outline)\n  - Dark mode / moon toggle icon\n\n## Hero Section\n- Centered layout, generous padding ~60-70px top\n\n### Badge above headline\n- Pill-shaped badge with light border: \"**[New] Date Input component →**\"\n  - Has a small sparkle/fireworks icon prefix\n  - Light background, small font ~13px, gray/dark text\n  - Rounded pill shape\n\n### H1 Headline (very large)\n- \"**Unstyled UI components**<br>**for your Design System**\"\n- The words \"**Unstyled**\" and \"**Design System**\" are highlighted in **red/orange accent color** (`#eb5e41` or `#EB5E41`)\n- Rest of text is near-black `#202020`\n- Font size ~48-54px, bold/heavy weight (700-800)\n- Line-height: ~1.15\n- Centered alignment\n\n### Description paragraph\n- \"*A headless library with 45+ accessible components. Bring your own styles and build a design system that works across React, Solid, Vue, and Svelte.*\"\n- Gray text color `#5f5f5f`, ~16-17px, max-width ~640px, centered\n- Line-height ~1.7\n\n### CTA Buttons (centered horizontal row)\n- \"**Get Started**\" button:\n  - Red/orange background (`#eb5e41`), white text\n  - Rounded corners ~6px\n  - Padding ~12px 28px\n  - Font size ~15px, font-weight 600\n  \n- \"**Show Components**\" button:\n  - White/light background, thin border (~1px solid #dcdcdc)\n  - Dark text, same padding and rounding\n  - Same font styling\n\n### Framework Pills Row\n- Below buttons, centered row of framework badges:\n  - Each is a colored circle/pill with an icon + label\n  - \"**React**\" — light blue icon (`#60a5fa`) + \"React\" label\n  - \"**Solid**\" — blue icon (`#446b9e`) + \"Solid\" label  \n  - \"**Vue**\" — green icon (`#42b883`) + \"Vue\" label\n  - \"**Svelte**\" — red/coral icon (`#ff3e00`) + \"Svelte\" label\n  - Small icons (snowflake-like or framework logo shapes) inside each pill\n  - Even spacing between pills\n\n## Decorative Background Elements\n- Faint peach/salmon-colored squares (`rgba(235,94,101,0.08)` or similar) positioned at:\n  - Upper right area (one larger square)\n  - Middle-right area (one medium square)\n  - Lower area (one smaller square)\n  - These create visual interest without being distracting\n  - Squares have no border, just solid fill at very low opacity\n\n## Bottom Tab Bar (floating)\n- Dark bar (near-black `#1a1a1a`) floating at bottom-right or bottom-center\n- Contains tabs: \"**React**\", \"**Solid**\", \"**Vue**\", \"**Svelte**\"\n- Active tab has lighter/highlighted appearance\n- Small chat/feedback icon (red circular button with speech bubble) attached to the tab bar's right edge\n\n## Color Scheme\n- Page bg: `#fdfdfc` (warm off-white)\n- Primary text: `#202020`\n- Secondary/muted: `#5f5f5f`\n- Accent/red: `#eb5e41` (ark-ui brand coral-red)\n- Border: `#e8e3df` or similar warm light gray\n- CTA bg: `#eb5e41`\n- Framework colors: blue, green, red per framework identity\n- Decorative squares: `rgba(235,94,101,0.06)`\n\n## Typography\n- Font family: \"**Wix Madefor Text**, Wix Madefor Text Fallback, ui-sans-serif, ...\"\n- Clean modern sans-serif\n- Headlines very bold and large\n- This font gives it a distinctive friendly-yet-professional feel\n\n## Visual Vibe\n- Warm, friendly, approachable design\n- Not cold/clinical — the warm bg tone makes it inviting\n- Headless/unstyled component library positioning\n- Multi-framework (React, Solid, Vue, Svelte) emphasis\n- Modern, clean, minimal but not sterile\n- The decorative squares add playful character\n- Coral/red accent gives energy without being aggressive\n"},{"id":"atlassian"," e text \"Select\" with a downward chevron, rounded ~8px, border #3a3a52.\n\n## Card Preview Box\nA bordered inner card (border 1px #2a2a3a, rounded ~10px, padding 16px) containing:\n- **Heading**: \"Card title\" — white, bold, ~16px.\n- **Body**: \"This is a preview of the component look.\" — gray (#9ca3af), ~13px.\n\n## Bottom Tag Pills Row\nSmall rounded pill buttons with dark backgrounds (#2a2a3d), light borders (#3a3a52), light text, compact padding. Arranged in a single row:\n`Menu` `Select` `Dialog` `Popover` `Tooltip`\n\n## Typography & Colors\n- Font family: system-ui, -apple-system, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif.\n- Headings: white (#fff); muted text: #9ca3af; secondary text: #d1d1db.\n- Accent: cyan (#38BDF8) for Primary button and toggle switch.\n- Card inner bg slightly lighter than page background (#1c1c2a vs #161622).\n- Avoid external assets; use inline CSS and system fonts.\n"},{"id":"baseweb","name":"Base Web","kind":"item","status":"passed","attempts":1,"notes":"v1 matches Base Web docs homepage layout, sidebar, cards, and typography","ref":"previews/baseweb.png","rebuild":"repro/baseweb/build.v1.png","prompt":"Reproduce the Base Web React UI framework documentation homepage above-the-fold at 1280px width.\n\nGlobal style: white background (#ffffff), black text (#000000), system font stack. Clean, minimal documentation layout.\n\nTop navigation bar (~56px, white background, border-bottom 1px solid #e5e5e5, flex justify-between align-center, padding 0 24px):\n- Left: Base Web logo — a small geometric diamond shape (square rotated 45°) made of black lines, with the word \"Base\" in bold black text to the right and a smaller \"Web\" stacked below/inside the logo mark. Then a version dropdown \"v18.2.0\" with a small downward chevron, followed by nav links \"Blog\" and \"Components\".\n- Right: a search input box with a magnifying glass icon and placeholder \"Search documentation\" (light gray border, rounded), then a GitHub icon button, a hamburger menu icon button, and a lightbulb/theme icon button.\n\nLayout: two-column docs layout. Left sidebar (fixed width ~260px, white background, right border 1px solid #e5e5e5, padding 16px 0, font-size 13px):\n- Section heading \"GETTING STARTED\" in small uppercase gray, bold, with items below: \"Home\" (active, highlighted with a light gray background bar and black text), \"Setup\", \"Learn Base Web\".\n- Section heading \"GUIDES\" in small uppercase gray, items: \"Internationalization\", \"Bidirectionality\", \"Theming\", \"Styling\", \"Overrides\", \"Colors\", \"API Cheat Sheet\".\n- Section heading \"COMPONENTS\" in small uppercase gray, then subsection \"INPUTS\" in smaller uppercase gray, with items: \"Button\", \"Button Dock\", \"Button Group\", \"Button Timed\", \"Checkbox\", \"Checkbox-v2\".\n\nMain content area (right of sidebar, padding 32px 40px, white background):\n- A small green badge labeled \"New\" with a light green background (#e6f7f0) and green text (#1a7f37), followed by the text \"What's new in Base Web 16?\" in black with a small arrow/chevron on the right.\n- Large bold heading \"Base Web React UI framework\" (~28px).\n- Subcopy below: \"Base Web is a foundation for initiating, evolving, and unifying web products.\" (~14px, gray).\n- Two white cards with light gray border (#e5e5e5), rounded 8px, padding 20px, side by side (gap 20px), each taking ~50% width:\n  - Card 1: heading \"Setup Base Web\", body text \"Base Web is distributed as an npm package. As Base Web is built on top of a CSS-in-JS engine, all you need is the dependencies from npm.\", and a black button at the bottom with white text \"Setup Base Web\".\n  - Card 2: heading \"Learning Base Web\", body text \"The best way to learn Base Web is to start building an application using it. Click on the link below to find 2 apps built using Base Web (one simple, one more complex).\", and a black button at the bottom with white text \"Learn more\".\n- Below the cards, start r CSS","kind":"item","status":"passed","attempts":1,"notes":"PASS at v1: gallery preview card layout, colors, typography, and footer tags match the reference closely","ref":"previews/beer-css.png","rebuild":"repro/beer-css/build.v1.png","prompt":"# Recreate \"Beer CSS\" gallery preview card (above-the-fold)\n\n## Brand\n- Name: **Beer CSS**\n- Subtitle on the card: **CSS · Material 风**\n\n## Layout\nA single centered dark gallery preview card on a dark background.\n\n- **Top bar**: three macOS-style dots (red #ff5f56, yellow #ffbd2e, green #27c93f), then the brand name \"Beer CSS\" in bold white, and the subtitle \"CSS · Material 风\" in muted gray below it.\n- **Component row 1**: \"Primary\" button (solid #f59e0b (amber)), \"Default\" button (dark gray outline), and a \"Type here...\" input.\n- **Component row 2**: a toggle switch in the \"on\" state (same #f59e0b (amber) color), a cyan/teal gradient \"Badge\" pill, and a \"Select\" dropdown.\n- **Demo card**: rounded dark card with heading \"Card title\" and body text \"This is a preview of the component look.\".\n- **Footer tags**: small dark pill buttons: Button, Card, Dialog, App.\n\n## Colors\n- Background: #0b0d12\n- Card background: #11131c, border: #1d2130\n- Primary button: #f59e0b (amber)\n- Default/input/select: #1a1d27 background, #2c3040 border, white text\n- Toggle: #f59e0b (amber) on state\n- Badge: linear-gradient(90deg, #0ea5e9, #22d3ee)\n- Muted text: #8b92a5\n- Placeholder text: #5b6275\n- Dots: red #ff5f56, yellow #ffbd2e, green #27c93f\n\n## Typography\n- System sans-serif font (Inter, -apple-system, system-ui, \"Segoe UI\", Roboto, sans-serif).\n- Brand title: 26px bold.\n- Subtitle: 15px muted.\n- Buttons: 15px semi-bold.\n- Footer tags: 13px.\n\n## Vibe\n- Dark, modern, component-library showcase card. Clean, minimal, rounded corners (10-14px), subtle borders, macOS window dots.\n"},{"id":"bitsui","name":"Bits UI","kind":"item","status":"passed","attempts":2,"notes":"v1 used light hero; v2 matches dark component gallery card format with orange primary","ref":"previews/bitsui.png","rebuild":"repro/bitsui/build.v2.html","prompt":""},{"id":"blueprint","name":"Blueprint","kind":"item","status":"passed","attempts":1,"notes":"v1 matches dark blueprint-style hero and centered logo","ref":"previews/blueprint.png","rebuild":"repro/blueprint/build.v1.png","prompt":"Reproduce the Blueprint (https://blueprintjs.com) homepage above-the-fold at 1280px width.\n\nGlobal style: dark navy blue gradient background (#111418 to #0f2744), white text, subtle blueprint/technical-drawing line art pattern of UI components (inputs, buttons, forms, calendars) in very faint blue/white lines across the background. Centered hero layout. System sans-serif font.\n\nTop navigation bar (subtle, transparent, padding ~16px 32px, flex justify-end, small white text):\n- Right-aligned nav links: \"Documentation\", \"GitHub\", and a blue button \"View openings\".\n\nHero section (centered, full width, padding ~120px 32px, position relative):\n- A large Blueprint logo in the center — a 3D cube made of three visible faces: red/coral (#ff6b6b) on the left, blue (#4a90e2) on the top-right, green (#2ecc71) on the bottom. The cube is isometric, slightly tilted.\n- Below the logo: \"Blueprint\" in large white bold text (~36px).\n- Subcopy: \"A React-based UI toolkit for the web\" in light gray/white (~16px).\n- Below subcopy: two links separated by a small dot: \"Documentation\" and \"GitHub\" in white/blue, underlined or link style.\n\nBackground pattern (subtle, behind the hero):\n- Very faint white/blue wireframe outlines of UI components: input boxes, buttons, checkboxes, dropdowns, calendar grids, sliders, and form elements scattered across the dark blue gradient. They should be low opacity (~0.08) so they don't overpower the text.\n\nBottom strip (full width, near-black background, padding ~40px, centered):\n- A white stylized icon resembling a circle on a pedestal (open-source symbol).\n- Text below: \"Blueprint is an open source project\" in white.\n\nThe overall vibe is a dark, technical, blueprint-style landing page for a React UI toolkit.\n"},{"id":"bootstrap","name":"Bootstrap","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: purple navbar + gradient hero above-the-fold matched","ref":"previews/bootstrap.png","rebuild":"repro/bootstrap/build.v1.png","prompt":"# Bootstrap — Above-the-fold Website Rebuild Prompt\n\nRebuild the Bootstrap homepage above-the-fold region at 1280px width.\n\n## Navigation Bar (top, full-width)\n- Background: Rich purple (#712cf9 or #6f42c1) — solid, no gradient\n- Height: ~56px\n- **Left side items**:\n  - \"B\" logo: White letter \"B\" inside a rounded square/pill shape (purple bg with white B), ~32x32px\n  - Nav links in white: \"Docs\", \"Examples\", \"Icons\", \"Blog\" — font-size ~15px, no underline\n- **Right side items**:\n  - Search box: Dark translucent background (rgba(0,0,0,0.15)), rounded corners (~6px), placeholder \"Search\" with a magnifying glass icon and keyboard shortcut \"⌘K\" badge\n  - GitHub icon link (white outline)\n  - Twitter/X icon link\n  - Dropdown trigger \"v5.3\" with down caret — white text\n  - Sun/moon theme toggle icon(s)\n\n## Hero Section (below nav)\n- **Background**: A soft multi-color gradient from light blue (#d4e5ff) through lavender/purple to pale yellow/cream (#fff8e1). Very subtle, almost pastel.\n- Content is centered vertically and horizontally within the hero area.\n\n### Alert banner (above main hero content)\n- Small yellow/gold pill-shaped banner: \"Get Security Updates for Bootstrap 3 & 4 →\"\n- Background: #fde68a or similar warm yellow\n- Text: dark, small font-size, arrow on right\n- Centered, margin-top from navbar\n\n### Main Logo\n- Large purple rounded-square shape (like a shield/brace shape with curved bottom corners) containing a white bold \"B\" letter\n- Size: ~120x120px approximately\n- Purple fill: #712cf9\n\n### Main Heading\n- \"Build fast, responsive sites with Bootstrap\"\n- Font size: very large (~48-52px), bold (700+), dark color (#1a1a2e or near-black), centered below logo\n- Max-width ~800px\n\n### Description paragraph\n- \"Powerful, extensible, and feature-packed frontend toolkit. Build and customize with Sass, utilize prebuilt grid system and components, and bring projects to life with powerful JavaScript plugins.\"\n- Color: Medium gray/dark gray (#495057 or similar)\n- Font-size: ~17-18px, line-height: 1.6\n- Centered, max-width ~750px\n\n## CTA Buttons Row (below description)\nTwo buttons side by side, centered:\n\n1. **Code input button**: Light gray/white-ish background, dark text showing \"$ npm i bootstrap@5.3.8\" with a copy icon on right side. Rounded corners, border. Looks like an input field that's also clickable.\n   - Background: rgba(255,255,255,0.8) or white\n   - Border: subtle gray\n   - Monospace text for the command part\n\n2. **Primary action button**: Purple background (#712cf9), white text \"📖 Read the docs\" (with book/document icon)\n   - Rounded corners, same height as code input\n   - Bold text\n\n## Version info line\nBelow the buttons: \"Currently v5.3.8 · Download · All releases\" — smaller text, gray, centered, links underlined\n\n## Typography & Colors\n- Font family: system-ui, -apple-system, \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif\n- Brand purple: #712cf9\n- Hero gradient: linear-gradient(170deg, #dce6ff 0%, #e0d4fc 40%, #f5ebff 70%, #fef3c7 100%)\n- Body text: #212529 (dark)\n- Secondary text: #495057 / #6c757d\n"},{"id":"brightspace-ui","name":"Brightspace UI","kind":"item","status":"passed","attempts":1,"notes":"PASS on v1. Dark gallery template. Subtitle: 教育 / 企业. Tags: Button/Card/Dialog/Dropdown.","ref":"previews/brightspace-ui.png","rebuild":"repro/brightspace-ui/build.v1.html","prompt":"# Prompt: Recreate Brightspace UI above-the-fold UI\n\nRecreate the above-the-fold UI of Brightspace UI as a single self-contained HTML file at 1280px  self-contained HTML file at 1280px width.\n\n## Overall Layout\nLight-themed documentation site with a multi-level header structure, sidebar navigation, and main content area.\n\n### Top Header Bar (white)\n- Background: `#ffffff`\n- Height: ~48px\n- Left side: **Esri logo** — a dark circle with \"esri\" text inside, followed by **\"Developer\"** in purple/violet (`#6b21a8` or similar deep purple), bold\n- Right-side nav links (horizontal): Documentation, Features ▾, SDKs and APIs ▾, Products ▾, Support ▾ — all dark gray text ~14px, no underline\n- Far right: sparkle icon + **\"Ask AI\"** text, then a search icon/magnifying glass + **\"Search docs\"**\n\n### Secondary Navbar (dark purple/blue)\n- Background: very dark navy/indigo (`#1e1e3f` or `#2a1e4a`)\n- Height: ~52px\n- Left: **\"Calcite Design System\"** in white/light, bold ~18px\n- Right: horizontal tab links — **Home**, **Foundations**, **Components**, **Sample Code**, **Resources**, **Icons** — white/light gray text, ~14px. \"Home\" is active/underlined.\n\n### Page Layout (below header)\nTwo-column layout on light background (`#f7f7f7`):\n\n#### Left Sidebar (~220px wide)\nBackground: slightly lighter than main or same `#f7f7f7`\nNavigation items (vertical list, ~14px text, dark):\n- **Overview** (active/bold, possibly with small dot indicator)\n- Get started\n- Core concepts\n- Tutorials\n- Archived documentation\n- **Release notes** (section header, small bold)\n  - 5.1\n  - 5.0\n- Older releases (collapsible)\n\n#### Main Content Area (right of sidebar)\nPadding: ~32px\n- **H1: \"Calcite Design System\"** — large (~36px), bold, dark text\n- Below H1: thin horizontal accent line (purple/violet, ~3px thick, ~60px wide)\n- Version line: **Current version:** @esri/calcite-components: 5.1 (May 2026) — smaller text, link-colored for the package name\n- Description paragraph: \"**Calcite Design System** is a collection of design and development resources for creating beautiful, easy to use, cohesive experiences across apps with minimal effort. It includes a UI kit, icons, color schemes, and a web component library with UI elements such as buttons, panels, accordions, alerts, and many more.\" — normal weight, ~15px, dark gray `#333`\n- **H2: \"Where to start\"** — ~28px, bold\n- Intro sentence below H2\n\n#### Right Sidebar (\"On this page\")\nNarrow column (~180px) at far right of main area:\n- **On this page** heading (small bold)\n- Vertical list: \"Where to start\", \"Design System\" — indented links in lighter color\n\n### Cookie Consent Overlay (bottom-left corner)\nSemi-transparent white box overlaying bottom-left:\n- Text about cookies\n- Buttons: \"Accept All Cookies\" (light blue bg), \"Reject All\" (outline), \"Cookie Settings\"\n\n## Colors\n- Top bar bg: `#fff`\n- Navbar bg: `#2d1b69` (deep indigo/purple)\n- Page bg: `#f7f7f7`\n- Text primary: `#222`\n- Text secondary: `#555`\n- Accent purple: `#6b21a8` / `#7c3aed`\n- Link color: purple-blue\n- Sidebar text: `#444`\n\n## Typography\nSystem fonts: `-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif`\nH1: 36px bold; H2: 28px bold; Body: 15px; Nav: 14px\n\n## Vibe\nEnterprise developer documentation. Clean, structured, professional. Feels like ArcGIS/Esri's official dev portal.\n"},{"id":"carbon-svelte","name":"Carbon Components Svelte","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: Captured IBM Carbon header/tabs, sidebar nav sections, main hero + CTA buttons, 4-column stats row","ref":"previews/carbon-svelte.png","rebuild":"repro/carbon-svelte/build.v1.png","prompt":"# Prompt: Recreate Carbon Components Svelte Landing Page (Above-the-Fold)\n\nRecreate the above-the-fold landing page of **Carbon Components Svelte** (carbon-components-svelte.onrender.com) — IBM's Carbon Design System built for Svelte.\n\n## Header Bar\n- White background, subtle bottom border, height ~48px\n- **Left side:**\n  - \"**Carbon Components Svelte**\" text in bold (~15px) + version \"**v0.110.0**\" in sm 526)\n- Height: ~52px\n- **Left side items**:\n  - FAST logo: A stylized pink/magenta circular icon with a swoosh/speed line design, followed by bold italic \"FAST\" text in same pink color (#E83A7C or #D6336C)\n  - Text link \"Docs\" — light gray (#e3e3e3)\n  - Dropdown trigger \"3.x\" with down arrow — light gray\n- **Right side items**:\n  - \"Home\" link with small external-link icon — light gray\n  - \"Community\" link with external-link icon\n  - \"GitHub\" link with external-link icon\n\n## Hero Section (below nav, dark background continues)\nBackground is the same dark (#1a1a1a or #161616), content is centered.\n\n### Top tagline (small, uppercase, letter-spaced)\n- Text: \"FLEXIBLE, PERFORMANT, & INTUITIVE\"\n- Color: Pink/magenta accent (#D6336C or #E83A7C)\n- Font size: ~13px, font-weight: 600, letter-spacing: 2px\n- Centered, margin-top: ~50px\n\n### Logo + Brand name\n- Large circular pink icon (the FAST logo — a swoosh/planet-with-ring design) ~64px\n- Next to it, large text \"FAST\" in white/light gray — font size ~56px, bold, slightly italic/slanted style\n\n### Description paragraph\n- Text: \"FAST is dedicated to providing support for native Web Components and modern Web Standards, designed to help you efficiently tackle some of the most common challenges in website and application design and development.\"\n- Color: Light gray (#dcdcdc or #e3e3e3)\n- Font size: ~15px, line-height: 1.7\n- Max width: ~720px, centered\n- Margin top: ~20px\n\n### CTA link line\n- Text: \"For an in-depth explanation of FAST,\"\n- Then link text: \"see our docs introduction.\"\n- Link color: Pink/magenta (#D6336C)\n\n### Decorative vertical line\n- A thin pink/magenta vertical line (~2px wide, ~40px tall) below the paragraph area, centered\n- Color: #D6336C\n\n### Section divider\n- Small uppercase text: \"HOW TO\" in the pink accent color\n- Font-size: ~12px, letter-spacing: 2px, margin-top: ~40px\n\n## Getting Started Section (still visible in viewport)\n### Heading\n- \"Getting Started\" — very large, white, font-size ~44px, font-weight: 700\n\n### Subheading\n- \"Install the package\" — medium size, white, font-size ~18px, font-weight: 500\n\n### Code block\n- Dark background (#0d0d0d or #111), rounded corners\n- Monospace text: `npm install @microsoft/fast-element`\n- Green-tinted monospace text color\n\n## Typography & Colors\n- Font family: system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif\n- Page background: #161616 / #1a1a1a (very dark)\n- Nav background: #242526\n- Accent color: #D6336C (pink/magenta) used for brand, links, highlights\n- Body text: #e3e3e3 (light gray)\n- Headings: #ffffff (white)\n"},{"id":"awd-field","name":"Field.io","kind":"proj","status":"passed","attempts":1,"notes":"v1 passes — dark teal gradient, trophy, Field.io title, cyan Awwwards pill, 创意, Three.js badge","ref":"previews/awd-field.png","rebuild":"repro/awd-field/build.v1.png","prompt":"# Prompt: Recreate Field.io Awards Gallery Entry (Above-the-fold)\n\nRecreate the above-the-fold UI of the Field.io Awwwards gallery entry at 1280×820px.\n\n## Overall Layout\n- Full viewport: dark teal/cyan gradient background, filling entire 1280×820 area\n- Background: linear gradient from ~`#0f2027` through `#1a3a3a` to ~`#142a2a` — deep teal/dark cyan tone with subtle greenish-blue shift\n- Premium minimal award-showcase aesthetic\n\n## Top-right Area\n- Top right corner: rounded pill button \"★ AWARD\"\n  - Border: 1px solid rgba(255,255,255,0.22)\n  - Color: `#bbb`\n  - Border-radius: 20px, padding: 8px 18px\n  - Font-size: 13px, letter-spacing: 1px\n  - Position: absolute top-right, margin ~24px\n\n## Main Content Area (left-aligned, vertically centered)\n- Starting at x≈60px, vertically centered via transform\n\n### Trophy Icon\n- Golden trophy emoji 🏆, size ~48px\n\n### Title\n- Text: \"Field.io\"\n- Font-size: ~42–46px, font-weight: 700\n- Color: white `#ffffff`\n- Font-family: system-ui, -apple-system, 'DM Sans', Helvetica Neue, sans-serif\ ponent look.\" in gray (#94a3b8), font-size ~14px, margin-top ~6px.\n\nBottom tabs (margin-top ~42px, flex gap ~10px):\n- Four dark rounded-full pill buttons: \"Button\", \"Input\", \"Card\", \"Navbar\". Each has bg #161b2e, border #2d3555, text #94a3b8, padding ~8px 16px, font-size ~13px.\n\nTypography: system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif.\nVibe: sleek dark-mode developer tool preview, minimal, rounded, teal accent.\n"},{"id":"flowbite-svelte","name":"Flowbite Svelte","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: Captured header+alert banner, two-column hero with component showcase mockup, install cmd, CTA, featured logos","ref":"previews/flowbite-svelte.png","rebuild":"repro/flowbite-svelte/build.v1.png","prompt":"# Prompt: Recreate Flowbite Svelte Landing Page (Above-the-Fold)\n\nRecreate the above-the-fold landing page of **Flowbite Svelte** (flowbite-svelte.com) — a Svelte UI component library.\n\n## Header Bar\n- White background, subtle bottom border, height ~60px\n- **Left side:**\n  - Red circular icon (Flowbite logo — red circle with white shape inside, like a play button or swirl) + \"**Flowbite Svelte**\" text in bold dark color (~16px)\n- **Center-left:**\n  - Search bar with \"**Search**\" placeholder + \"**⌘K**\" keyboard shortcut badge on right side of input\n  - Light gray border/background, rounded ~8px, width ~200px\n- **Right side nav links** (horizontal):\n  - Docs, Components, Blocks, Dashboard, Icons, Illustrations\n- **Far right icons/controls:**\n  - GitHub icon\n  - Discord chat icon\n  - YouTube/play icon\n  - Dark mode moon icon\n  - Version badge: \"**v1.32.0**\"\n\n## Alert Banner (below header)\n- Light yellow/cream background (`#fffbeb` or similar warm yellow tint)\n- Full width below header\n- Content:\n  - Small \"**New**\" red/orange pill badge on the left\n  - Text: \"**Flowbite Svelte v2 is coming soon! Check it out →**\"\n  - Close × button on the far right\n- Height ~40px\n\n## Hero Section (Two-column layout)\n- White background, padding ~45px\n\n### Left Column — Text & CTAs\n- **Small badge**: \"New\" in red/orange pill above headline\n- **Alert-style line**: \"*Flowbite Svelte v2 is coming soon!*\" with arrow link\n\n- **H1 Headline** (large, bold):\n  > **Speed up your web development with Flowbite Svelte**\n  - \"Flowbite Svelte\" is in **red/orange accent color** (`#EF4444` or `#F97316`)\n  - Rest of headline is near-black/dark\n  - Font size ~38-42px, heavy weight\n  - Line-height ~1.2\n\n- **Description paragraph**:\n  > *Flowbite Svelte is an official Flowbite component library for Svelte. All interactivities are handled by Svelte.*\n  - Gray text, ~15px, line-height 1.7, max-width ~520px\n\n- **Install command box**: \n  - Light gray background `#f9fafb`, rounded, monospace font\n  - Text: \"`pnpm i -D flowbite-svelte flowbite`\"\n  - Copy icon on the right\n\n- **CTA Button**: \"**Get started →**\"\n  - Orange/red background (`#F97316` or similar), white text\n  - Rounded ~8px, padding ~11px 24px, arrow symbol\n\n### Right Column — Component Showcase UI Mockup\n- A visual mockup showing various Flowbite components arranged as if they're part of a UI:\n  - Social buttons row: Tweet (Twitter), Share buttons\n  - Large orange \"**Get Flowbite**\" button\n  - Toggle switches: \"Off with label\", \"On with label\" (orange when on)\n  - Avatar group: 3-4 user avatar circles + \"+5\" counter badge\n  - Star rating display (yellow stars, \"5.0\" score)\n  - Print button\n  - Text area / content placeholder (\"Write your name...\")\n  - Pagination control: \"< 1 2 3 ... 100 >\"\n  - Audio/volume slider bar\n  - Orange floating action button (+) at bottom-right of mockup area\n  - URL/domain input field with dropdowns and search button\n- This is a visual showcase of available components, styled to look like a real UI\n\n## Featured In Section (bottom)\n- Centered row of partner/logo badges:\n  - \"**Featured in:**\" label\n  - Logo badges: reddit, DEV, Product Hunt (P), Combinator (Y), YouTube\n  - All in grayscale/faded style\n  - Horizontal layout with even spacing\n\n## Color Scheme\n- Header/Hero bg: white `#ffffff`\n- Alert banner bg: `#fffbeb` / `#fefce8` (warm yellow)\n- Primary text: `oklch(0.446 0.03 256.802)` ≈ dark slate-gray\n- Accent red/orange: `#EF4444` / `#F97316` (used for brand name, CTA, active states)\n- Install box bg: `#f9fafb`\n- Border: light gray `#e5e7eb`\n\n## Typography\n- Font family: Inter, ui-sans-serif, system-ui (Inter is the key characteristic)\n- Clean modern sans-serif\n- Bold headlines\n\n## Visual Vibe\n- Modern Svelte component library\n- Energetic brand feel with red/orange accents\n- Component-rich showcase demonstrating variety\n- Developer-friendly documentation site\n- Professional but approachable\n"},{"id":"flowbite-vue","name":"Flowbite Vue","kind":"item","status":"passed","attempts":2,"notes":"v1 built light emoji-card hero; reference was dark component-demo with pink/red accent. v2 rebuilt to match dark demo theme. Visual match achieved.","ref":"previews/flowbite-vue.png","rebuild":"repro/flowbite-vue/build.v2.html","prompt":""},{"id":"fluent-ds","name":"Fluent 2 Design","kind":"item","status":"passed","attempts":1,"notes":"v1 dark gallery card with pink accent matches layout and components","ref":"previews/fluent-ds.png","rebuild":"repro/fluent-ds/build.v1.png","prompt":"# Fluent 2 Design System — Gallery Preview Card Prompt\n\nBuild a dark-themed component gallery preview card at 1280×820 px that looks like a macOS browser window showcasing the Fluent 2 Design System.\n\n## Overall Layout\n- **Canvas**: 1280px wide, 820px tall, centered dark background (#161622).\n- **Card**: centered, rounded rectangle (border-radius ~14px), background #1c1c2a, subtle border #2a2a3d, padding ~22px 28px 28px, width ~1100px.\n- **Window chrome**: top-left row of three colored dots (red #FF5F57, yellow #FEBC2E, green #28C840), each 12px circle.\n\n## Header Section (inside card)\n- **Site title**: \"Fluent 2 Design\" — bold white, ~21px, sans-serif, margin-bottom 5px.\n- **Subtitle**: \"Multi · Microsoft 全平台\" — ~13.5px, gray (#9ca3af), sans-serif.\n\n## Component Showcase Area\nA dark inner panel (#222235, rounded ~10px, padding 18–20px) containing, in a single row with gaps:\n1. **Primary button**: solid pink/magenta (#EC4899) background, white text \"Primary\", rounded ~8px, padding 7px 18px.\n2. **Default button**: dark background (#2a2a3d), light text \"Default\", 1px border #3a3a52, rounded ~8px.\n3. **Input field**: dark background (#252535), 1px border #3a3a52, rounded ~8px, placeholder \"Type here...\" in muted gray (#9ca3af), padding 7px 14px, width ~140px.\n4. **Toggle switch**: ON state, track color #EC4899, white knob on the right, rounded pill.\n5. **Badge**: teal/cyan background (#0d7377), white text \"Badge\", small rounded pill.\n6. **Select dropdown**: dark background (#2a2a3d), white text \"Select\" with a downward chevron, rounded ~8px, border #3a3a52.\n\n## Card Preview Box\nA bordered inner card (border 1px #2a2a3a, rounded ~10px, padding 16px) containing:\n- **Heading**: \"Card title\" — white, bold, ~16px.\n- **Body**: \"This is a preview of the component look.\" — gray (#9ca3af), ~13px.\n\n## Bottom Tag Pills Row\nSmall rounded pill buttons with dark backgrounds (#2a2a3d), light borders (#3a3a52), light text, compact padding. Two rows, first row:\n`Button` `Input` `Select` `Checkbox` `Radio` `Switch` `Slider` `Form`\nSecond row: `Table`\n\n## Typography & Colors\n- Font family: system-ui, -apple-system, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif.\n- Headings: white (#fff); muted text: #9ca3af; secondary text: #d1d1db.\n- Accent: pink/magenta (#EC4899) for Primary button and toggle switch.\n- Card inner bg slightly lighter than page background (#1c1c2a vs #161622).\n- Avoid external assets; use inline CSS and system fonts.\n"},{"id":"fluent","name":"Fluent UI (React)","kind":"item","status":"passed","attempts":2,"notes":"v2 matches Storybook layout, hero banner, and sidebar structure","ref":"previews/fluent.png","rebuild":"repro/fluent/build.v2.png","prompt":"Reproduce the Fluent UI React v9 Storybook documentation page above-the-fold at 1280px width.\n\nGlobal style: white background (#ffffff), dark text rgb(17,16,15), secondary text gray rgb(96, 94, 91). Font stack: \"Segoe UI\", -apple-system, system-ui, Roboto, \"Helvetica Neue\", sans-serif.\n\nLayout: fixed-height full-screen two-column layout. Top navigation bar (~48px, white background, bottom border 1px solid #e8e8e8, flex justify-between align-center, padding 0 16px):\n- Left: a small abstract Fluent logo icon (two overlapping blue/cyan/purple triangular/chevron shapes pointing right, like a stylized \"F\"). The logo uses a gradient from #0f6cbd to #4b54a6 with a slight 3D overlap. Next to it, the text \"Fluent UI React v9\" in 14px bold dark text.\n- Right: a small gear/settings icon button in muted gray.\n\nLeft sidebar (fixed width ~240px, white background, right border 1px solid #e8e8e8, padding 12px, overflow-y auto):\n- Search box at the top with light gray border (#d1d1d1), rounded corners 4px, placeholder text \"Find components\", and a small magnifying glass icon on the left.\n- Navigation sections with 14px dark bold headings and 13px gray item rows:\n  - Section \"Concepts\" (expanded): item \"Introduction\" highlighted with a bright blue (#0078d4) background bar and white text; items below: \"Developer\", \"Migration\", \"Recipes\", \"Package Maturity Levels\". Use a small document/page icon before each item (a simple rectangle with folded corner).\n  - Section \"Theme\" (collapsed, with chevron): \"Border Radii\", \"Colors\", \"Fonts\", \"Shadows\", \"Spacing\", \"Stroke Widths\", \"Typography\", \"Theme Designer\".\n  - Section \"Components\" (collapsed, with chevron): \"Accordion\", \"Avatar\", \"AvatarGroup\", \"Badge\", \"Breadcrumb\".\n\nMain content area (right of sidebar, light gray/white background, padding 32px):\n- Large bold heading \"Fluent UI React Components\" (~32px, dark).\n- Below it, subheading \"v9.74.3\" (~18px, muted gray).\n- A large hero banner card with rounded corners 8px, full-width of the main content, height ~280px. Background is a soft pastel gradient (pink #f8e8f2 → lavender #e8e8f8 → light blue #d8f0fc). Add subtle translucent pink/purple circles/blurred blobs behind the numeral. In the center, render a large, translucent, glossy 3D-style number \"9\" with a glassy/iridescent appearance: white-to-light-blue highlights, soft long shadow, subtle purple and pink reflections, low opacity so it blends with the background. The numeral should look like a floating translucent 3D shape, not a flat white number.\n- Below the banner, a section heading \"What's new\" (~20px, bold dark) with a thin gray horizontal divider above it.\n\nKeep the overall look clean, like a Microsoft documentation/Storybook interface, with flat styling and subtle separators.\n"},{"id":"foundation","name":"Foundation","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: dark gallery card with yellow/gold accent matched","ref":"previews/foundation.png","rebuild":"repro/foundation/build.v1.png","prompt":""},{"id":"fundamental-ngx","name":"Fundamental NGX","kind":"item","status":"passed","attempts":2,"notes":"v1 used light docs layout (wrong); v2 matches dark component gallery card with SAP Fiori-style branding","ref":"previews/fundamental-ngx.png","rebuild":"repro/fundamental-ngx/build.v2.html","prompt":""},{"id":"proj-2024-gentlerain","name":"Gentle Rain","kind":"proj","status":"unreachable","attempts":0,"notes":"read failed: page.goto: net::ERR_NAME_NOT_RESOLVED at https://gentlerain.ai/","ref":"previews/proj-2024-gentlerain.png","rebuild":null,"prompt":""},{"id":"gestalt","name":"Gestalt","kind":"item","status":"passed","attempts":1,"notes":"v1 matches Gestalt landing layout, nav, hero collage, and badge","ref":"previews/gestalt.png","rebuild":"repro/gestalt/build.v1.png","prompt":"Reproduce the Gestalt (Pinterest's Design System) homepage above-the-fold at 1280px width.\n\nGlobal style: white background (#ffffff), black text (#000000). Typography: a bold, friendly sans-serif (use system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif). Clean Pinterest-style landing page.\n\nTop navigation bar (~56px, white background, flex justify-between align-center, padding 0 32px):\n- Left: Gestalt logo — a circular/wedge icon made of three colored segments (blue, purple, and pink/green), like a small pie chart, followed by the word \"Gestalt\" in bold black text (~18px).\n- Right: a moon icon button (theme toggle), a light gray pill button \"Gestalt 1.0\" with a small arrow/↗ after it, and a bright red pill button \"Login\" with white text.\n\nHero section (centered, white background, padding ~80px 32px 60px):\n- Huge bold centered headline: \"Pinterest's Design System\" on two lines (~52px, very bold, line-height 1.05).\n- Centered subcopy below: \"We're here to help you build experiences that inspire people to create the life they love\" (~16px, gray #444, max-width ~520px, line-height 1.5).\n- Below the subcopy, an image collage of rounded rectangles (radius ~24px) arranged in an overlapping, playful Pinterest-style layout. Include:\n  - A tall vertical image on the left (hands/nails photo) with rounded corners.\n  - A central top image (person in sunglasses/green stripes) with rounded corners.\n  - A right-side image (hair with colorful clips against a blue sky) with rounded corners, slightly larger.\n  - A small bottom image (food/plant) centered below the central image.\n  - A blue toggle-switch icon to the left of the central image.\n  - A blue pushpin icon near the bottom center between images.\n  - A black pill badge with white text and a checkmark: \"✓ Gestalt\" near the bottom right.\n  Since no external images can be used, represent each photo as a rounded colored placeholder block with a subtle gradient and optional CSS pattern to suggest photography (e.g., skin-tone, green, blue, food-green tones). Keep the collage arrangement and overlapping feel.\n\nOverall vibe: playful, Pinterest-brand design system landing page with rounded imagery and bold typography.\n"},{"id":"govuk","name":"GOV.UK Design System","kind":"item","status":"passed","attempts":1,"notes":"v1 dark component-demo preview matches: title, tagline, pink primary, teal badge, bottom Button/Card/Form/Footer.","ref":"previews/govuk.png","rebuild":"repro/govuk/build.v1.html","prompt":"Recreate the ABOVE-THE-FOLD (1280px wide) of the GOV.UK Design System preview.\n\nBRAND / VIBE:\n- Brand: \"GOV.UK Design System\" — design system / component library.\n- Dark background: #0d0f14, white text, subtle gray secondary text.\n- Clean, modern component-demo aesthetic (like a dark desktop window preview).\n\nTOP-LEFT \"WINDOW\" TITLE BAR:\n- Red (#ff5f57), yellow (#ffbd2e), green (#28c840) traffic-light dots in a row, then bold white text \"GOV.UK Design System\".\n- Below the title: small gray text \"Multi · 政府 / 公共\".\n\nHERO COMPONENT DEMO PANEL (dark rounded rectangle with subtle border, ~max-width 700px, padding 30px, placed upper-left):\n- Row 1: colored pill button \"Primary\" (bg #f472b6, text #111), dark pill button \"Default\" (bg #1f2937, text white, border 1px #333), dark input \"Type here...\" (bg #111418, border #333, rounded, text gray).\n- Row 2: colored ON toggle switch (bg #f472b6, thumb dark), teal pill badge \"Badge\" (bg #2dd4bf), dark \"Select\" dropdown with down arrow.\n- Row 3: card with border radius 10px, border #2a2f35, title \"Card title\" white, subtitle \"This is a preview of the component look.\" gray.\n- Row 4: four small dark outlined buttons \"Button\", \"Card\", \"Form\", \"Footer\".\n\nTYPOGRAPHY / SPACING:\n- Font: system sans-serif, -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Arial.\n- Panel items use flex row, gap 14px, margin 16px between rows.\n"},{"id":"grailui","name":"Grail UI","kind":"item","status":"passed","attempts":1,"notes":"PASS v1. Light page, translucent header with Grail UI + v0.10.1 badge, navy heading 'Put control back in developers hands', GET STARTED/GITHUB buttons. Good match.","ref":"previews/grailui.png","rebuild":"repro/grailui/build.v1.html","prompt":"# Recreate Grail UI above-the-fold UI (grail-ui.vercel.app)\n\nBuild a single-file HTML/CSS recreation of the Grail UI homepage above-the-fold (1280x820).\nGrail UI = \"A library of accessible component primitives, actions and utilities for Svelte.\"\n\n## Brand / layout\n- Light page. Sticky translucent header `rgba(255,255,255,0.9)` with blur, dark navy text `#181a2a`.\n- Left: brand \"Grail UI\" (bold).\n- Nav links (right of brand): a version badge \"v0.10.1\", then \"Docs\", \"Components\".\n- Right side of header: \"GET STARTED\" (dark filled), \"GITHUB\" (outline) buttons, and a round \"Open site navigation\" icon button.\n\n## Hero (above the fold)\n- Centered, light background.\n- Big heading: \"Put control back in developers' hands.\"\n- Subtitle (gray, ~#6b7280-ish but derived from navy at 60%): \n  \"A set of component primitives, actions and utilities that help you build accessible and high quality Svelte applications faster, while providing a great developer experience.\"\n- Two buttons centered: \"GET STARTED\" (dark filled `#181a2a`, light text, radius 8px) and \"GITHUB\" (outline, radius 8px).\n\n## Typography / vibe\n- Font: \"Mona Sans\", system-ui, sans-serif.\n- Colors: ink/navy `#181a2a`, light background, dark filled buttons, clean and accessible feel.\n- Rounded corners 8px on buttons; generous spacing.\n\n## Constraints\n- Single self-contained HTML file, inline CSS, vanilla, system fonts only, no external assets.\n- Display nicely within 1280x820.\n"},{"id":"grommet","name":"Grommet","kind":"item","status":"passed","attempts":1,"notes":"v1 matches centered app mockup and lowercase serif headline","ref":"previews/grommet.png","rebuild":"repro/grommet/build.v1.png","prompt":"Reproduce the Grommet (https://v2.grommet.io) homepage above-the-fold at 1280px width.\n\nGlobal style: white background, dark gray text (#444444), purple accent #7d4cdb, clean minimal, lowercase serif headings, system sans-serif body. The read.json body font is \"Times\", so use a serif font for headings.\n\nTop navigation bar (height ~64px, white background, padding 0 32px, flex justify-between align-center):\n- Left: Grommet logo — a purple circle outline ring, next to the word \"grommet\" in lowercase purple text.\n- Right: a white pill button \"docs\" with purple border, a purple filled pill button \"components\", and a magnifying glass search icon.\n\nHero section (centered, white background, padding ~60px 32px):\n- At the top: a large, centered, light-gray browser/window mockup with a subtle shadow and a thin top bar. Inside the mockup, show a faint layout with a left sidebar and a main content area in very light gray.\n- Below the mockup: large centered lowercase serif headline: \"streamline the way you develop apps\" in dark gray (~56px), line-height ~1.2.\n- Subcopy below: \"build responsive and accessible mobile-first projects for the web.\" in gray (~18px), centered, max-width ~600px.\n- Two buttons below the subcopy:\n  - \"GET STARTED\" outlined purple rounded pill with purple text and border.\n  - \"hello world\" solid green/teal rounded pill with dark text (or purple-filled variant).\n\nThe overall vibe is a simple, minimalist product landing page with a big app mockup and friendly lowercase typography.\n"},{"id":"awd-gucci","name":"Gucci","kind":"proj","status":"unreachable","attempts":0,"notes":"read failed: page.goto: net::ERR_HTTP2_PROTOCOL_ERROR","ref":"previews/awd-gucci.png","rebuild":null,"prompt":""},{"id":"awd-hakuhodo","name":"Hakuhodo","kind":"proj","status":"passed","attempts":1,"notes":"Visual match close enough. Dark gradient card with trophy, AWARD pill, title, subtitle,
