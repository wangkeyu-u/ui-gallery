t-canvas.png","rebuild":"repro/hubspot-canvas/build.v2.html","prompt":"# Recreate the above-the-fold UI for HubSpot Canvas as a dark gallery card (1280px)\n\nBrand: **HubSpot Canvas**. Tech/theme tagline: `React · 营销 / 企业`. Component chips: `Button · Card · Form · Modal`.\n\n## Layout\n- Single rounded dark card on #0b0c14 bg. Top border accent light blue.\n- Top-left: macOS dots + brand **HubSpot Canvas** (white, 24px bold).\n- Tagline: `React · 营销 / 企业` (gray, 14px).\n- Controls: **Primary** (light blue #7dd3fc), **Default** (dark gray), input `Type here...`.\n- Second row: light-blue toggle, **Badge** (teal), **Select**.\n- Card panel: title and body text.\n- Bottom chips: `Button`, `Card`, `Form`, `Modal`.\n\n## Colors\n- Background #0b0c14, surface #11121c, border #1f2937, primary light blue #7dd3fc, badge teal #0e7490, default/input #1f2937, text white/gray.\n\n## Typography\nSystem sans-serif; brand 24px bold; tagline 14px; controls 15px; card title 18px; chips 14px.\n\n## Vibe\nDark, minimal, rounded UI gallery card. No images.\n"},{"id":"awd-huge","name":"Huge Inc","kind":"proj","status":"passed","attempts":1,"notes":"v1 PASS — Real site hero: 3-col dark/light/dark split, We/Huge/are text, pink CSS 3D cube, Huge Menu btn, Let's talk","ref":"previews/awd-huge.png","rebuild":"repro/awd-huge/build.v1.html","prompt":"# Recreate above-the-fold UI — hugeinc.com (Real Site Screenshot)\n\nGoal: single self-contained HTML file recreating the above-the-fold of https://www.hugeinc.com (1280x820). This is the actual live site.\n\nBrand & vibe: Huge — A design and technology company. Bold, modern, split-screen aesthetic. Black/dark background with a central white column containing a 3D pink element. Clean typography.\n\nLayout:\n- Three-column split viewport at 1280x820:\n  - Left ~33%: dark/black bg (#1a1a1a or #222), large \"**We**\" in white sans-serif (~80px), vertically centered. Top-left corner: small \"Huge Menu\" pill button (dark red/maroon bg like #a02040 or #8b1a3d, small white text).\n  - Center ~34%: pure **white** background, contains a pink/magenta 3D cube (isometric CSS cube) with \"**Huge**\" text overlaid in black bold font centered on it. The cube should look 3D/isometric.\n  - Right ~33%: dark/black bg matching left, large \"**are**\" in white sans-serif (~80px), vertically centered. Top-right: faint \"**Let's talk**\" text in dim white.\n- Typography: system sans-serif (ui-sans-serif, -apple-system). Bold, clean, minimal.\n- The 3D cube: use CSS transforms for an isometric box effect. Fill color: bright magenta/pink (#ff2e88 or similar). Add subtle shadow/edge lines.\n"},{"id":"awd-immersive-cartier","name":"Immersive Garden — Cartier","kind":"proj","status":"passed","attempts":1,"notes":"PASS on v1. Gold-themed luxury award card with trophy, AWARD badge, title, Awwwards gold tag — matches reference.","ref":"previews/awd-immersive-cartier.png","rebuild":"repro/awd-immersive-cartier/build.v1.html","prompt":"# Prompt: Recreate Immersive Garden — Cartier Award Card\n\nRecreate this above-the-fold UI at 1280px width.\n\n## Layout & Background\n- Dark background (#0a0b0d or similar near-black)\n- Subtle golden/yellow gradient glow at the very top edge (from gold/amber fading into black)\n- Content sits inside a card container with rounded corners (~12-16px), subtle border (~1px solid rgba(212,175,55,0.2))\n\n## Top Area (inside card)\n- **Left**: Golden trophy icon (🏆 style or CSS-drawn) in gold/yellow color (#d4af37 or #c9a84c)\n- **Right**: \"★ AWARD\" badge — pill shape, outlined border in gold/yellow, transparent bg, gold/yellow text, rounded corners (~20px)\n\n## Main Content (below top bar)\n1. **Main heading**: \"Immersive Garden — Cartier\" — pure white (#fff), large bold (~36-42px), clean sans-serif, em-dash between words\n2. **Sub-line**: \"Immersive Garden · 2022\" — gray (#888 or #999), ~15px, margin ~10px below heading\n3. **Award tag**: \"Awwwards\" — pill/tag with GOLD/YELLOW background (#d4af37 or similar), dark/black text inside, rounded corners (~6-8px), padding ~6px 18px, inline-block, margin ~12px below sub-line\n4. **Chinese label**: \"奢侈品\" — gray text (~#777), ~14px, below Awwwards tag\n\n## Bottom Tag\n- \"Three.js\" — small tag pill, dark bg (~#151518), subtle border (~#2a2a30), light gray text, rounded ~6px, positioned lower in card\n\n## Typography & Vibe\n- System sans-serif fonts only\n- Luxury/premium feel from gold accent colors on dark background\n- Minimalist but elegant\n- Award-showcase card aesthetic\n- Golden trophy icon as key visual element\n"},{"id":"awd-immersive-gq","name":"Immersive Garden — GQ&AP","kind":"proj","status":"passed","attempts":1,"notes":"PASS on v1. Site was down (Cloudflare 521); built the error page as shown in reference — matches closely.","ref":"previews/awd-immersive-gq.png","rebuild":"repro/awd-immersive-gq/build.v1.html","prompt":"# Prompt: Recreate Cloudflare 521 Error Page\n\nRecreate this above-the-fold UI at 1280px width.\n\n## Layout & Background\n- Light gray background (#f2f2f2 or #f5f5f5) overall\n- Top section: white/light background area\n- Below that: a lighter gray section separated by subtle divider\n\n## Top Section (white bg)\n1. **Main heading**: \"Web server is down\" — dark gray (#333 or #404040), large (~36-40px), bold, left-aligned with padding ~40px top/left\n2. **Error badge**: Next to heading on same line — \"Error code 521\" — small pill/tag, light gray bg (~#e0e0e0), rounded corners (~4px), small text (~13px)\n3. **Subtext line**: \"Visit cloudflare.com for more information.\" — \"cloudflare.com\" is blue link (#0051c3 or similar), rest is gray text (~#666), ~15px\n4. **Timestamp**: \"2026-07-12 22:33:12 UTC\" — smaller gray text (~#888), ~13px\n\n## Status Icons Row (centered, in white area)\nThree columns showing connection status:\n1. **Left**: Monitor/browser icon (gray outline) with green checkmark circle overlay → Label \"You\", sub-labels \"Browser\" (lighter gray) / \"Working\" (green #2ecc71)\n2. **Center**: Cloud icon (gray) with green checkmark circle overlay → Label \"Kuala Lumpur\", sub-labels \"Cloudflare\" (blue link) / \"Working\" (green)\n3. **Right**: Server/host icon (gray) with red X circle overlay → Label \"www.immersive-garden.com\", sub-labels \"Host\" (lighter gray) / \"Error\" (red #e74c3c)\n\nIcons should be simple geometric shapes rendered in CSS/SVG:\n- Browser = rectangle with small dots (browser chrome)\n- Cloud = fluffy cloud shape\n- Server = rectangle (server box)\n\n## Bottom Section (lighter gray bg, ~#fafafa)\nTwo-column layout below a subtle separator line:\n- **Left column**: \"What happened?\" heading (~20px bold) + paragraph text: \"The web server is not returning a connection. As a result, the web page is not displaying.\"\n- **Right column**: \"What can I do?\" heading + two sections:\n  - \"If you are a visitor of this website:\" → \"Please try again in a few minutes.\"\n  - \"If you are the owner of this website:\" → \"Contact your hosting provider letting them know your web server is not responding. Additional troubleshooting information.\"\n\nText color ~#555, body text ~14px, headings ~18px.\n\n## Typography & Vibe\n- System sans-serif fonts\n- Clean, technical/error-page aesthetic\n- Lots of whitespace\n- Professional, informative tone\n"},{"id":"inkline","name":"Inkline","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: Split-layout(Left:text+heading-teal-accent+CTAs / Right:night-illustration-sky-moon-clouds-mountains-tree-cat) matched","ref":"previews/inkline.png","rebuild":"repro/inkline/build.v1.png","prompt":"Recreate the above-the-fold landing page of **Inkline** (inkline.io).\n\n## Overall Layout & Theme\n- White background for the left/content area; the right side features an illustrated night-sky scene.\n- Font: -apple-system, system-ui, \"Segoe UI\", sans-serif.\n- Text color: near-black (#171b23) for headings; #525c6a for body.\n- Primary accent: teal/cyan (#178f9a or #1a8fa0) for CTAs and highlighted heading text.\n- The page has a distinctive **illustration hero** — the right 50-60% of the viewport shows a stylized night scene.\n\n## Top Navigation Bar\n- Background: pure white. Height ~56px. Border-bottom: 1px solid #e5e7eb. Box shadow subtle.\n- **Left**: \n  - Inkline logo icon — a stylized dark cat/fox silhouette shape (~22px, near-black).\n  - \"Inkline\" text next to it, bold, ~17px, color #000.\n- **Right side items** (gap ~22px):\n  - `Home` link — active/bold, ~14px, #000.\n  - `Documentation` link — ~14px, #444.\n  - `Blog` link — ~14px, #444.\n  - GitHub icon (dark circle outline, ~20px).\n  - Game/controller icon (~18px, #555) — possibly a Discord/community icon.\n  - Moon/dark-mode toggle icon (~18px, #555).\n  - Search/magnifying glass icon (~18px, #555).\n\n## Hero Section (split layout)\n\n### Left Text Column (~45% width)\n- Padding-left: ~60px; padding-top: ~70px.\n\n**Announcement badge row**: \n- Small pill badge: \"New in v4.0\" — yellow/gold background (#fef3c7 or #facc15), dark text, font-size 12px, font-weight 600, rounded-full, padding 3px 10px.\n- Next to badge: \"Configuration file, design tokens, toast notifications and more!\" — ~14px, color #525c6a.\n\n**Main heading** (margin-top 20px):\n- \"Your next Vue.js project deserves\"\n- \"the best developer experience\"\n- Very large (~40-46px), bold (700), line-height 1.15.\n- First two lines in near-black (#171b23); \"**developer experience**\" is in **teal/cyan accent color** (#1a8fa0).\n\n**Subheading paragraph** (margin-top 16px):\n\"Inkline is the intuitive UI Components library for building high-quality, developer-friendly, configurable, and accessible Vue.js Design Systems.\"\n~16px, color #525c6a, line-height 1.65, max-width ~480px.\n\n**CTA Button Row** (margin-top 28px, gap 14px):\n- **\"Get started\"** — solid teal (#178f9a), white text, border-radius 6px, padding 13px 28px, font-size 15px, font-weight 600.\n- **\"1.3k+\"** — shows GitHub star count with a small GitHub icon (⚙️), light background or transparent, rounded 6px, same padding, gray text, font-weight 500.\n\n### Right Illustration Column (~55% width)\nThis is the visual centerpiece. Create a CSS/SVG illustration of a **night nature scene**:\n\n- **Background gradient**: Deep navy-blue sky (#1e3a5f to #2d5a87) fading lighter toward bottom, covering the full right area. Add tiny white dots as scattered stars (opacity .3-.6).\n- **Large moon/circle**: A large off-white circle (moon) in the upper-right area (~140px diameter, rgba(255,255,255,.85)), partially visible.\n- **Clouds**: 2-3 soft white/gray cloud shapes using SVG paths or border-radius blobs, opacity .2-.4, positioned in the upper-middle area.\n- **Mountains/hills**: Rolling mountain silhouettes in darker blue/navy tones (#1e3a5f to #162d47), overlapping layers creating depth, spanning the lower portion of the illustration area.\n- **Tree**: A stylized green tree with a round canopy (emerald #2dd4bf to #059669 gradient) and a brown trunk, positioned right-of-center.\n- **Cat/fox silhouette**: A dark silhouette (near-black #111827) of a cat or fox sitting and facing left, positioned at the bottom-right, looking up at the scene. Simple shape using SVG path or CSS shapes.\n- The illustration should feel whimsical, peaceful, and artistic — like a children's book night scene.\n\n## Visual Notes\n- This is an illustration-first landing page. The artwork on the right is the dominant visual element.\n- Clean, modern SaaS aesthetic with a warm, friendly vibe from the illustration.\n- Teal accent color ties together the CTA button and the \"developer experience\" highlight.\n- Generous whitespace on the left; the illustration fills the right side edge-to-edge.\n"},{"id":"awd-instrument","name":"Instrument","kind":"proj","status":"passed","attempts":1,"notes":"v1 passes — dark navy gradient bg, trophy, title, blue Awwwards pill, category, badges all match","ref":"previews/awd-instrument.png","rebuild":"re space\n- Deep navy-blue dark mode feel\n- High contrast white text on dark\n"},{"id":"ionic-ng","name":"Ionic Angular","kind":"item","status":"passed","attempts":2,"notes":"v1 built light Ionic landing; reference was dark component-demo with red/pink accent. v2 rebuilt to match dark demo theme. Visual match achieved.","ref":"previews/ionic-ng.png","rebuild":"repro/ionic-ng/build.v2.html","prompt":""},{"id":"awd-jeton","name":"Jeton","kind":"proj","status":"passed","attempts":1,"notes":"PASS on v1. Gold-themed award card with trophy, AWARD badge, Jeton title, gold Awwwards tag, fintech label — matches reference.","ref":"previews/awd-jeton.png","rebuild":"repro/awd-jeton/build.v1.html","prompt":"# Prompt: Recreate Jeton Award Card\n\nRecreate this above-the-fold UI at 1280px width.\n\n## Layout & Background\n- Dark background (#0c0b09 or similar near-black) with GOLDEN/YELLOW gradient glow at the TOP edge (from warm gold/amber #d4a520 fading down to black)\n- Content inside a rounded card (~12-16px corners), subtle border (~1px solid rgba(212,175,55,0.2))\n\n## Top Area (inside card)\n- **Left**: Golden trophy icon (🏆) — gold color (#d4af37), ~36-40px\n- **Right**: \"★ AWARD\" badge — outlined pill, gold border (#d4af37 or #c9a84c), transparent bg, gold text, rounded corners (~20px)\n\n## Main Content\n1. **Main heading**: \"Jeton\" — pure white (#fff), large bold (~38-44px), clean sans-serif\n2. **Sub-line**: \"Bürokratik · 2022\" — gray text (#888-999), ~15px, margin ~10px below heading\n3. **Award tag**: \"Awwwards\" — pill/tag with GOLD/YELLOW bg (#d4a520 or #e6b422), DARK/BLACK text inside, bold, rounded corners (~8px), padding ~7px 20px, ~14px font\n4. **Chinese label**: \"金融科技\" — gray text (~#888), ~14px, below Awwwards tag\n\n## Bottom Tag\n- \"WebGL\" — small tag pill, dark bg (~#161513), subtle border (~#2a2825), light gray text, rounded ~6px, positioned lower in card\n\n## Typography & Vibe\n- System sans-serif fonts\n- Premium fintech award feel\n- Gold accent on dark base\n- Minimalist, elegant showcase\n"},{"id":"ke-design","name":"Ke.Design","kind":"item","status":"unreachable","attempts":0,"notes":"read failed: page.goto: net::ERR_NAME_NOT_RESOLVED at https://ke.design/ (domain does not resolve from this environment)","ref":"previews/ke-design.png","rebuild":"","prompt":""},{"id":"keepreact","name":"Keep React","kind":"item","status":"passed","attempts":1,"notes":"v1 dark component-card preview matches layout, colors, and tabs","ref":"previews/keepreact.png","rebuild":"repro/keepreact/build.v1.png","prompt":"Reproduce the Keep React component preview card shown in the reference screenshot at 1280px width. The card fills the viewport like a macOS window preview of a React UI library.\n\nCanvas / global: very dark navy/black background (#0b0d14), no page scroll, content fills the 1280x820 viewport. The preview area has a 1px subtle border (#1a2035) and rounded corners (24px), with a faint outer shadow.\n\nTop bar (top-left, padding ~38px from left/top):\n- Three small circles in a row (macOS traffic lights): red (#ff5f57), amber/yellow (#ffbd2e), green (#28c840). Each ~13px with a subtle inner highlight.\n- To the right of the circles, large bold title \"Keep React\" in white (#f8fafc), font-size ~26px, font-weight 600.\n- Below the title, small gray subtitle \"React · Tailwind 组件\" in #94a3b8, font-size ~13.5px.\n\nControls row under the title (left aligned, margin-top ~28px, flex gap ~12px):\n- \"Primary\" button: teal/cyan background (#2dd4bf), black text, rounded-full pill, padding ~9px 19px, font-weight 500.\n- \"Default\" button: transparent dark background (#161b2e), white text, rounded-full pill, border 1px solid #2d3555, padding ~8px 17px.\n- \"Type here...\" input: same dark pill style (#161b2e, border #2d3555, rounded-full), placeholder gray (#64748b), padding ~8px 17px, min-width ~130px.\n\nSecond controls row (margin-top ~14px):\n- A teal/cyan toggle switch in the ON position: pill track (#2dd4bf) ~46px wide x 25px tall with a white circle knob on the right.\n- \"Badge\" label: dark pill with a thin teal border (#0d9488) and teal text (#5eead4), padding ~7px 15px, rounded-full.\n- \"Select\" dropdown: dark pill (#161b2e), white text, rounded-full, border #2d3555, padding ~8px 17px, with a small down-chevron on the right.\n\nMain card (below controls, margin-top ~30px):\n- Rounded-xl dark card (#131625) with 1px border (#252a3f), padding ~24px, max-width ~520px.\n- Inside, heading \"Card title\" in white, font-size ~18px, font-weight 600.\n- Below, body text \"This is a preview of the component look.\" in gray (#94a3b8), font-size ~14px, margin-top ~6px.\n\nBottom tabs (margin-top ~42px, flex gap ~10px):\n- Four dark rounded-full pill buttons: \"Button\", \"Input\", \"Card\", \"Table\". Each has bg #161b2e, border #2d3555, text #94a3b8, padding ~8px 16px, font-size ~13px.\n\nTypography: system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif.\nVibe: sleek dark-mode developer tool preview, minimal, rounded, teal accent.\n"},{"id":"kendo-angular","name":"Kendo UI for Angular","kind":"item","status":"passed","attempts":2,"notes":"v1 built white corporate landing; reference was dark component-demo with red/pink accent. v2 rebuilt to match dark demo theme. Visual match achieved.","ref":"previews/kendo-angular.png","rebuild":"repro/kendo-angular/build.v2.html","prompt":""},{"id":"kiboui","name":"Kibo UI","kind":"item","status":"passed","attempts":1,"notes":"v1 dark gallery card with cyan accent matches layout and components","ref":"previews/kiboui.png","rebuild":"repro/kiboui/build.v1.png","prompt":"# Kibo UI — Gallery Preview Card Prompt\n\nBuild a dark-themed component gallery preview card at 1280×820 px that looks like a macOS browser window showcasing the Kibo UI design system.\n\n## Overall Layout\n- **Canvas**: 1280px wide, 820px tall, centered dark background (#161622).\n- **Card**: centered, rounded rectangle (border-radius ~14px), background #1c1c2a, subtle border #2a2a3d, padding ~22px 28px 28px, width ~1100px.\n- **Window chrome**: top-left row of three colored dots (red #FF5F57, yellow #FEBC2E, green #28C840), each 12px circle.\n\n## Header Section (inside card)\n- **Site title**: \"Kibo UI\" — bold white, ~21px, sans-serif, margin-bottom 5px.\n- **Subtitle**: \"React · shadcn 风格区块\" — ~13.5px, gray (#9ca3af), sans-serif.\n\n## Component Showcase Area\nA dark inner panel (#222235, rounded ~10px, padding 18–20px) containing, in a single row with gaps:\n1. **Primary button**: solid cyan (#38BDF8) background, white text \"Primary\", rounded ~8px, padding 7px 18px.\n2. **Default button**: dark background (#2a2a3d), light text \"Default\", 1px border #3a3a52, rounded ~8px.\n3. **Input field**: dark background (#252535), 1px border #3a3a52, rounded ~8px, placeholder \"Type here...\" in muted gray (#9ca3af), padding 7px 14px, width ~140px.\n4. **Toggle switch**: ON state, track color #38BDF8, white knob on the right, rounded pill.\n5. **Badge**: teal/cyan background (#0d7377), white text \"Badge\", small rounded pill.\n6. **Select dropdown**: dark background (#2a2a3d), white text \"Select\" with a downward chevron, rounded ~8px, border #3a3a52.\n\n## Card Preview Box\nA bordered inner card (border 1px #2a2a3a, rounded ~10px, padding 16px) containing:\n- **Heading**: \"Card title\" — white, bold, ~16px.\n- **Body**: \"This is a preview of the component look.\" — gray (#9ca3af), ~13px.\n\n## Bottom Tag Pills Row\nSmall rounded pill buttons with dark backgrounds (#2a2a3d), light borders (#3a3a52), light text, compact padding. Arranged in a single row:\n`Accordion` `Carousel` `Command` `Calendar`\n\n## Typography & Colors\n- Font family: system-ui, -apple-system, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif.\n- Headings: white (#fff); muted text: #9ca3af; secondary text: #d1d1db.\n- Accent: cyan (#38BDF8) for Primary button and toggle switch.\n- Card inner bg slightly lighter than page background (#1c1c2a vs #161622).\n- Avoid external assets; use inline CSS and system fonts.\n"},{"id":"kobalte","name":"Kobalte","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: Captured 3-column doc layout, header nav/search, sidebar sections, main content with Key features, right TOC","ref":"previews/kobalte.png","rebuild":"repro/kobalte/build.v1.png","prompt":"# Prompt: Recreate Kobalte Landing Page (Above-the-Fold)\n\nRecreate the above-the-fold landing page of **Kobalte** (kobalte.dev) — A UI toolkit for building accessible web apps and design systems.\n\n## Header Bar\n- White background, subtle bottom border, height ~52px\n- **Left side:**\n  - \"**Kobalte.**\" brand name in bold black text (~16px), with a period/dot\n  - \"**Menu**\" dropdown button/link next to it\n- **Center area:**\n  - Search bar: \"**Search**\" placeholder + \"**⌘K**\" keyboard shortcut badge\n    - Light gray background `rgb(246, 246, 247)`, rounded ~8px border, width ~220px\n- **Right side nav:**\n  - \"**Components**\" link\n  - \"**Changelog**\" link\n- **Far right icons:**\n  - GitHub icon (outline)\n  - External link / window icon\n\n## Layout Structure\n- **Three-column layout**: Left sidebar (~230px) + Main content (center, ~55%) + Right TOC sidebar (~180px)\n- White page background\n\n## Left Sidebar Navigation\n- White background, right border separator\n- Organized in sections:\n\n  **Overview section header**:\n  - Introduction (active — blue text or highlighted)\n  - Getting started\n  - Styling\n  - Animation\n  - Polymorphism\n  - Server side rendering\n\n  **Components section header**:\n  - Accordion\n  - Alert\n  - Alert Dialog\n  - Badge\n  - Breadcrumbs\n  - Button\n  - Checkbox\n  - Collapsible\n  - Color Area\n  - Color Channel Field\n  - (more items continuing...)\n\n- Font size: ~14px for items\n- Section headers are small uppercase labels (`Overview`, `Components`) in muted color\n- Active item (\"Introduction\") is blue/underlined/highlighted\n- Text color: dark gray `#3f3f46` for normal, blue `#2563eb` for active\n\n## Right Sidebar — \"On this page\" TOC\n- Header: \"**On this page**\" in small bold text\n- List of anchor links:\n  - Introduction (blue/active)\n  - Key features\n  - Accessible\n  - Composable\n  - Unstyled\n  - Acknowledgment\n- Smaller font ~13px, lighter text color for inactive items\n- Compact vertical list\n\n## Main Content Area\n- Padding ~32px 40px\n\n### H1 Heading\n- \"**Introduction**\"\n- Large bold text (~32-36px), near-black `#18181B`\n- Top of main content area\n\n### Description paragraph(s)\n- \"*Kobalte is a UI toolkit for building accessible web apps and design systems with Solid.JS. It provides a set of low-level UI components and primitives which can be the foundation for your design system implementation.*\"\n- Gray text `#52525b`, ~15px, line-height ~1.7\n\n### \"Key features\" section heading\n- Bold ~22px heading below description\n\n### Feature subsections (each has heading + paragraph):\n\n**Accessible**\n- Subheading: \"**Accessible**\" (~18px)\n- Paragraph: \"*Components follow the WAI-ARIA Authoring Practices whenever possible. Kobalte handle accessibility implementation details like ARIA attributes, focus management, and keyboard navigation.*\"\n\n**Composable**\n- Subheading: \"**Composable**\"\n- Paragraph: \"*Kobalte provides granular access to each component parts, so you can wrap them and add your own event listeners, props, etc.*\"\n\n**Unstyled**\n- Subheading: \"**Unstyled**\"\n- Paragraph: \"*Components are shipped with zero styles, allowing you to completely customize the look and feel. Bring your preferred styling solution (vanilla CSS, Tailwind, CSS-in-JS libraries, etc...).*\"\n\n- Links within paragraphs (like \"WAI-ARIA Authoring Practices\") are blue underlined\n\n## Color Scheme\n- Page bg: white `#ffffff`\n- Primary text: `#18181B` (near-black)\n- Secondary text: `#52525b` / `#71717a` (gray)\n- Link/accent blue: `#2563eb` (for active items, links)\n- Search bg: `rgb(246, 246, 247)`\n- Border: `#e4e4e7` (light gray)\n- Sidebar active: blue highlight or blue text\n\n## Typography\n- Font family: Inter, ui-sans-serif, system-ui (Inter is the key characteristic)\n- Clean modern sans-serif similar to Vercel/design-system sites\n- Readable body text size\n\n## Visual Vibe\n- Clean documentation site aesthetic\n- Similar to Vercel/Radix/shadcn style documentation pages\n- Three-column doc layout (nav + content + TOC)\n- Professional, developer-focused\n- Accessible/unstyled/headless component library positioning\n- Minimalist, information-dense but well-spaced\n- Inter font gives it a modern tech-doc feel\n"},{"id":"kokonutui","name":"Kokonut UI","kind":"item","status":"passed","attempts":1,"notes":"v1 gallery-card reproduction visually close to reference preview.","ref":"previews/kokonutui.png","rebuild":"build.v1.html","prompt":""},{"id":"konsta","name":"Konsta","kind":"item","status":"unreachable","attempts":0,"notes":"read failed: page.goto: net::ERR_NAME_NOT_RESOLVED at https://konsta.io/","ref":"previews/konsta.png","rebuild":"","prompt":""},{"id":"kor","name":"Kor","kind":"item","status":"passed","attempts":1,"notes":"PASS on v1. Dark gallery template. Subtitle: 设计系统. Tags: Button/Card/Dialog/Toast.","ref":"previews/kor.png","rebuild":"repro/kor/build.v1.html","prompt":"# Prompt: Recreate Kor above-the-fold UI\n\nDark component showcase gallery. Bg `#0b0c10`.\n- macOS dots\n- Title: **\"Kor\"** white bold ~26px\n- Subtitle: **\"Web Components · 设计系统\"** gray\n- Demo row: Primary (purple), Default, input (\"Type here...\"), toggle ON, Badge, Select ▾\n- Card: \"Card title\" + description\n- Tags: **Button**, **Card**, **Dialog**, **Toast**\n"},{"id":"lightning-css","name":"Lightning CSS","kind":"item","status":"passed","attempts":1,"notes":"PASS at v1: gallery preview card layout, colors, typography, and footer tags match the reference closely","ref":"previews/lightning-css.png","rebuild":"repro/lightning-css/build.v1.png","prompt":"# Recreate \"Lightning CSS\" gallery preview card (above-the-fold)\n\n## Brand\n- Name: **Lightning CSS**\n- Subtitle on the card: **CSS · CSS 编译器 / 工具**\n\n## Layout\nA single centered dark gallery preview card on a dark background.\n\n- **Top bar**: three macOS-style dots (red #ff5f56, yellow #ffbd2e, green #27c93f), then the brand name \"Lightning CSS\" in bold white, and the subtitle \"CSS · CSS 编译器 / 工具\" in muted gray below it.\n- **Component row 1**: \"Primary\" button (solid #f59e0b (amber)), \"Default\" button (dark gray outline), and a \"Type here...\" input.\n- **Component row 2**: a toggle switch in the \"on\" state (same #f59e0b (amber) color), a cyan/teal gradient \"Badge\" pill, and a \"Select\" dropdown.\n- **Demo card**: rounded dark card with heading \"Card title\" and body text \"This is a preview of the component look.\".\n- **Footer tags**: small dark pill buttons: Bundler, Minify, Transform.\n\n## Colors\n- Background: #0b0d12\n- Card background: #11131c, border: #1d2130\n- Primary button: #f59e0b (amber)\n- Default/input/select: #1a1d27 background, #2c3040 border, white text\n- Toggle: #f59e0b (amber) on state\n- Badge: linear-gradient(90deg, #0ea5e9, #22d3ee)\n- Muted text: #8b92a5\n- Placeholder text: #5b6275\n- Dots: red #ff5f56, yellow #ffbd2e, green #27c93f\n\n## Typography\n- System sans-serif font (Inter, -apple-system, system-ui, \"Segoe UI\", Roboto, sans-serif).\n- Brand title: 26px bold.\n- Subtitle: 15px muted.\n- Buttons: 15px semi-bold.\n- Footer tags: 13px.\n\n## Vibe\n- Dark, modern, component-library showcase card. Clean, minimal, rounded corners (10-14px), subtle borders, macOS window dots.\n"},{"id":"lightning","name":"Lightning Design System","kind":"item","status":"passed","attempts":1,"notes":"v1 matches sidebar + hero layout, blue gradient, and abstract orange accents","ref":"previews/lightning.png","rebuild":"repro/lightning/build.v1.png","prompt":"# Lightning Design System 2 — Above-the-Fold UI Prompt\n\nBuild the Lightning Design System 2 documentation landing page above-the-fold at 1280px width using inline CSS and system fonts (no external assets).\n\n## Overall Layout\n- **Canvas**: 1280px wide, 820px tall, white page background. The layout has a left sidebar and a right main content area.\n- **Left sidebar**: fixed width ~280px, white background, right border 1px #E5E7EB, padding 20px 24px.\n  - Top: small text \"LIGHTNING DESIGN SYSTEM 2\" in uppercase, dark blue (#0A2057), font-weight 700, font-size 12px, letter-spacing 0.05em.\n  - Logo: Salesforce-style cloud icon (blue #0176D3) + \"Lightning Design System\" with \"2\" superscript in blue, font-size ~18px.\n  - Search box: light gray rounded pill (#F3F3F3), placeholder \"Search...\", with a magnifying glass icon, padding 8px 12px, margin 16px 0.\n  - Navigation items with right-facing chevrons, font-size 14px, color #292A2E, gap 4px between items. Items: Get Started, AI and SLDS 2, Foundations, Develop, Components, Patterns, Accessibility, Tools, SLDS 1 (with external-link icon).\n- **Main area**: right of sidebar, full remaining width, top portion is a hero banner.\n  - **Hero banner**: gradient background deep blue (#1B2C7E) to purple-blue (#3B4CBF), decorative abstract orange/coral circles (#FF8A65) and subtle white grid lines, rounded corners (no, it's a rectangular top banner) with padding 40px 60px.\n    - Title: \"Lightning Design System 2\" in large white bold sans-serif (~42px).\n    - Subtitle 1: \"Summer '26 v2.9\" in white, smaller (~14px), semibold.\n    - Subtitle 2: \"Styleguide updated 20 days ago\" in white, smaller (~14px).\n    - Tagline: \"Bring your brand to life.\" in white, bold (~18px), with a small orange square accent to the left.\n    - Top-right of hero: a small white rounded pill with a link/chain icon and a down arrow.\n- **Below hero**: white section with heading \"Welcome to SLDS 2\" (~28px, dark blue #0A2057) and a large image/photo placeholder below (a photo of people in a storage-room setting).\n\n## Colors\n- White #FFFFFF, dark navy #0A2057, blue #0176D3, coral/orange #FF8A65, text #292A2E, border #E5E7EB, search bg #F3F3F3.\n- Fonts: \"DM Sans\", system-ui, sans-serif.\n"},{"id":"lion","name":"Lion","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: dark gallery card with purple accent matched","ref":"previews/lion.png","rebuild":"repro/lion/build.v1.png","prompt":""},{"id":"awd-locomotive","name":"Locomotive","kind":"proj","status":"passed","attempts":1,"notes":"v1 PASS — Real site hero: black bg, serif Locomotive headline with artifacts, nav bar, OPS/DES/DEV box, Digital-first Design Agency tagline","ref":"previews/awd-locomotive.png","rebuild":"repro/awd-locomotive/build.v1.html","prompt":"# Recreate above-the-fold UI — locomotive.ca (Real Site Screenshot)\n\nGoal: single self-contained HTML file recreating the above-the-fold of https://locomotive.ca (1280x820). This is the actual live site, NOT an Awwwards card.\n\nBrand & vibe: Locomotive® — Montreal web agency. Bold, brutalist, experimental typography. Black background, white serif text with glitch/artistic effects. Minimal but striking.\n\nLayout (top to bottom at 1280x820):\n- Background: pure black `#000000`\n- Top nav bar (height ~60px): \n  - Left: \"**Locomotive®**\" wordmark in white serif, ~18px\n  - Center-left: small icon/emoji (🍺 or similar symbol)\n  - Center-right: \"Work, Agency, Careers, Store\" in white, ~13px, sans-serif\n  - Right: \"Let's talk\" in white, ~14px\n- Hero stage: massive glitch-style \"**Locomotive**\" text centered or slightly offset, in large white serif font (~140px+), with scattered artifacts around it like \"®\", \"50.\", \"→0-\", \"←\" symbols overlapping/breaking through. This is the visual centerpiece.\n- Bottom area (~80px from bottom):\n  - Left: a bordered box showing \"OPS / DES / DEV\" stacked vertically, thin border\n  - Right of box: \"**Locomotive®**\" in serif + \"**Digital-first Design Agency**\" + \"*LOCO*\" in monospace/small\n\nTypography: Serif for main brand (Georgia/Times), system-ui/sans-serif for nav.\nColors: Black bg (#000), white text (#fff).\n"},{"id":"awd-louisvuitton","name":"Louis Vuitton","kind":"proj","status":"passed","attempts":1,"notes":"Visual match close enough. Dark gradient card with trophy, AWARD pill, title, subtitle, Awwwards pill, theme and Three.js tag.","ref":"previews/awd-louisvuitton.png","rebuild":"repro/awd-louisvuitton/build.v1.html","prompt":"Create a single self-contained HTML file (HTML + inline CSS, no external assets) that renders a 1280x820 dark gallery preview card for a project called \"Louis Vuitton\".\n\nDesign specification:\n- Page background: dark radial gradient from deep black (#0a0a0a) at the top-left to the project accent color (#c9a227) towards the bottom-right. Use a 1280x820 fixed viewport with overflow hidden.\n- Font: clean sans-serif system font stack (e.g., -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Helvetica, Arial, sans-serif).\n- Top-left: a gold trophy icon (inline SVG, fill #fbbf24), size about 64px, positioned roughly 80px from left and 80px from top.\n- Top-right: a rounded pill button with transparent background, 1px solid rgba(255,255,255,0.6) white border, white text \"AWARD\", with a small white star icon to the left of the text. Padding ~12px 24px, border-radius 999px. Position roughly 80px from right and 80px from top.\n- Center-left content area, left-aligned with ~100px left padding, vertically centered (slightly above center):\n  - Large white bold title \"Louis Vuitton\", font-size ~72px, line-height 1.1, margin-bottom ~12px.\n  - Smaller light-gray/white subtitle \"Louis Vuitton · 2023\", font-size ~22px, opacity 0.75, margin-bottom ~20px.\n  - A rounded pill using the project accent color (#c9a227) with white text \"Awwwards\", font-size ~16px, padding ~10px 22px, border-radius 999px, inline-block, margin-bottom ~16px.\n  - Small gray text \"奢侈\", font-size ~16px, opacity 0.6.\n- Bottom-left: a dark rounded pill (background rgba(0,0,0,0.45)) with light text \"Three.js\", font-size ~14px, padding ~10px 20px, border-radius 999px. Position roughly 80px from left and 80px from bottom.\n- No external images, no JavaScript, no CSS animations, system fonts only. Ensure the layout is self-contained and visually matches the described card.\n"},{"id":"awd-lusion-oryzo","name":"Lusion — Oryzo AI","kind":"proj","status":"passed","attempts":1,"notes":"PASS on v1. Dark gradient card with award label, SOTM badge, large title, meta info, tech tag — matches reference well.","ref":"previews/awd-lusion-oryzo.png","rebuild":"repro/awd-lusion-oryzo/build.v1.html","prompt":"# Prompt: Recreate Lusion — Oryzo AI Gallery Card\n\nRecreate this above-the-fold UI at 1280px width.\n\n## Layout & Background\n- Full viewport with a subtle dark teal/navy gradient background (from ~#0d1419 at top-left to #1a252e at bottom-right)\n- Content sits inside a centered card-like container with:\n  - Rounded corners (~16px)\n  - Subtle border (~1px solid rgba(255,255,255,0.06))\n  - Padding ~40px horizontal, ~32px vertical\n  - Margin from edges ~40px\n\n## Top Bar (inside card)\n- Left side: \"AWARD–WINNING\" text — teal/cyan color (#4ecdc4 or #3dd9b5), uppercase, small (~11-12px), letter-spacing ~2px, monospace or sans-serif\n- Right side: \"★ Awwwards SOTM\" badge — small pill shape, teal/greenish bg (~rgba(78,205,196,0.15)), same teal text, rounded corners (~20px), padding ~6px 14px\n\n## Hero / Main Content (centered vertically within card)\n1. **Main Heading**: \"Lusion — Oryzo AI\" — pure white (#fff), very large bold (~52-58px), clean sans-serif, em-dash between words\n2. **Sub-line**: \"Lusion · 2024\" — gray text (~#888 or #999), ~15px, below heading with margin ~12px\n3. **Tech Tag**: \"Three.js\" — small pill/tag, dark background (~#1a1f28), light gray border (~#333), white/light text, rounded (~6px), padding ~5px 12px, ~13px font\n\n## Bottom Footer (inside card)\n- Bottom-left area: \"实验不可用 · 信号丢失\" — very dim gray (~#555 or #606060), ~12px, small text\n\n## Typography & Vibe\n- System fonts only (sans-serif stack)\n- Minimalist, premium award-showcase feel\n- Lots of breathing room / whitespace around content\n- Subtle gradient gives depth without being distracting\n- Clean, editorial typography\n"},{"id":"m3-svelte","name":"M3 Svelte","kind":"item","status":"passed","attempts":2,"notes":"PASS v2. GitHub 404 page. v1 was too simple; v2 added richer header nav (Platform/Solutions/etc.), 404+speech bubble hero, Sign in to GitHub card, search bar, newsletter. Matches reference 404 page structure.","ref":"previews/m3-svelte.png","rebuild":"repro/m3-svelte/build.v2.html","prompt":"# Recreate m3-svelte above-the-fold UI — v2 (GitHub 404 page)\n\n## FIXES from v1 comparison:\nThe reference IS the GitHub 404 page. Improve fidelity:\n\n### Header (fuller GitHub chrome)\n- Dark `#24292f` bar, ~64px tall.\n- Left: GitHub cat/octocat mark (white circle with cat silhouette).\n- Center-left nav dropdowns (text only): Platform ▾, Solutions ▾, Resources ▾, Open Source ▾, Enterprise ▾, Pricing.\n- Right: 🔍 search icon, \"Sign in\" button (outline, border #d0d7de, radius 6px), \"Sign up\" button (green filled `#238636`), grid icon.\n\n### Hero area (the 404 scene)\n- Light background below header (white or very light gray).\n- Left side: giant \"**404**\" (very large, ~120px+, bold, dark), speech bubble saying\n  \"**This is not the web page you are looking for.**\"\n- Right side: A \"**Sign in to GitHub**\" card (white, rounded, shadowed):\n  - Title \"Sign in to GitHub\"\n  - Input: \"Username or email address\"\n  - Input: \"Password\" + \"Forgot password?\" link\n  - Green \"Sign in\" button\n  - \"or continue with other methods\" link\n- Background: subtle desert/sand tone behind the 404 area (light tan/beige gradient).\n\n### Below hero\n- \"Find code, projects, and people on GitHub:\" label + wide search input + \"Search\" button.\n- Footer line: \"Contact Support – GitHub Status – @githubstatus\"\n- Newsletter section: \"THE DEVELOPER NEWSLETTER\" + description + green \"Subscribe\" button.\n\n## Constraints\n- Single self-contained HTML file, inline CSS, vanilla, system fonts only.\n- Use CSS shapes/colors to approximate the octocat scene (no external images).\n- Display within 1280x820.\n"},{"id":"magicui","name":"Magic UI","kind":"item","status":"passed","attempts":1,"notes":"v1 dark component-card preview matches layout, colors, and tabs","ref":"previews/magicui.png","rebuild":"repro/magicui/build.v1.png","prompt":"Reproduce the Magic UI component preview card shown in the reference screenshot at 1280px width. The card fills the viewport like a macOS window preview of a React UI library.\n\nCanvas / global: very dark navy/black background (#0b0d14), no page scroll, content fills the 1280x820 viewport. The preview area has a 1px subtle border (#1a2035) and rounded corners (24px), with a faint outer shadow.\n\nTop bar (top-left, padding ~38px from left/top):\n- Three small circles in a row (macOS traffic lights): red (#ff5f57), amber/yellow (#ffbd2e), green (#28c840). Each ~13px with a subtle inner highlight.\n- To the right of the circles, large bold title \"Magic UI\" in white (#f8fafc), font-size ~26px, font-weight 600.\n- Below the title, small gray subtitle \"React · 动画 / 落地页组件\" in #94a3b8, font-size ~13.5px.\n\nControls row under the title (left aligned, margin-top ~28px, flex gap ~12px):\n- \"Primary\" button: teal/cyan background (#2dd4bf), black text, rounded-full pill, padding ~9px 19px, font-weight 500.\n- \"Default\" button: transparent dark background (#161b2e), white text, rounded-full pill, border 1px solid #2d3555, padding ~8px 17px.\n- \"Type here...\" input: same dark pill style (#161b2e, border #2d3555, rounded-full), placeholder gray (#64748b), padding ~8px 17px, min-width ~130px.\n\nSecond controls row (margin-top ~14px):\n- A teal/cyan toggle switch in the ON position: pill track (#2dd4bf) ~46px wide x 25px tall with a white circle knob on the right.\n- \"Badge\" label: dark pill with a thin teal border (#0d9488) and teal text (#5eead4), padding ~7px 15px, rounded-full.\n- \"Select\" dropdown: dark pill (#161b2e), white text, rounded-full, border #2d3555, padding ~8px 17px, with a small down-chevron on the right.\n\nMain card (below controls, margin-top ~30px):\n- Rounded-xl dark card (#131625) with 1px border (#252a3f), padding ~24px, max-width ~520px.\n- Inside, heading \"Card title\" in white, font-size ~18px, font-weight 600.\n- Below, body text \"This is a preview of the component look.\" in gray (#94a3b8), font-size ~14px, margin-top ~6px.\n\nBottom tabs (margin-top ~42px, flex gap ~10px):\n- Four dark rounded-full pill buttons: \"Marquee\", \"Border\", \"Blur\", \"Ripple\". Each has bg #161b2e, border #2d3555, text #94a3b8, padding ~8px 16px, font-size ~13px.\n\nTypography: system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif.\nVibe: sleek dark-mode developer tool preview, minimal, rounded, teal accent.\n"},{"id":"awd-makemepulse","name":"Makemepulse","kind":"proj","status":"passed","attempts":1,"notes":"v1 PASS — Awwwards card: magenta-red gradient, Makemepulse/2022, pink badge, 创意机构, GSAP","ref":"previews/awd-makemepulse.png","rebuild":"repro/awd-makemepulse/build.v1.html","prompt":"# Recreate above-the-fold UI — makemepulse.com Awwwards Gallery Card\n\nGoal: single self-contained HTML file recreating the Awwwards gallery card for Makemepulse (1280x820). Awwwards award gallery card.\n\nLayout:\n- Full-viewport dark magenta-red-to-black gradient: `radial-gradient(ellipse at top left, #5c1a3d, #2a0a1e 55%, #0f0510)`\n- Top-right: ★ AWARD outline badge pill\n- Content left (~60px):\n  - Gold trophy 🏆 ~52px\n  - \"**Makemepulse**\" white ~38px bold\n  - \"Makemepulse · 2022\" light gray ~16px\n  - Badge pill: pink fill (#d94b8e), white \"Awwwards\", rounded-full\n  - Chinese: \"创意机构\" muted gray-white ~16px\n- Bottom-left tech pill: border+semi-bg, \"GSAP\"\nTypography: system sans-serif.\n"},{"id":"mambaui","name":"Mamba UI","kind":"item","status":"passed","attempts":1,"notes":"v1 gallery-card reproduction visually close to reference preview.","ref":"previews/mambaui.png","rebuild":"build.v1.html","prompt":""},{"id":"mand-mobile","name":"Mand Mobile","kind":"item","status":"passed","attempts":2,"notes":"v2 build visually close to reference thumbnail; dark component-demo panel with traffic lights, buttons, input, badge, card, and bottom tabs matches layout and color scheme.","ref":"previews/mand-mobile.png","rebuild":"repro/mand-mobile/build.v2.html","prompt":"Recreate the ABOVE-THE-FOLD (1280px wide) of the Mand Mobile homepage (https://didi.github.io/mand-mobile). It is a dark-themed Vue.js 2 mobile UI toolkit landing page; the hero is a component demo panel, not a marketing headline.\n\n[v1 content preserved, but override with these fixes:]\n\nBRAND / VIBE:\n- Brand: \"Mand Mobile\" — DiDi mobile UI toolkit for financial scenarios.\n- Dark background: #0d0f14 (near black), white text.\n- Clean, modern component-demo aesthetic.\n\nTOP-LEFT \"WINDOW\" TITLE BAR (above the demo panel):\n- Red, yellow, green traffic-light dots (#ff5f57, #ffbd2e, #28c840) in a row, then white text \"Mand Mobile\".\n- Below the title: small gray text \"Vue · 移动端 / 滴滴\".\n\nHERO COMPONENT DEMO PANEL (dark rounded rectangle with subtle border, ~max-width 700px, centered, padding 30px):\n- Row 1: green pill button \"Primary\" (bg #3ccf4a, text black/dark), dark pill button \"Default\" (bg #1f2937, text white, border 1px #333), dark input \"Type here...\" (bg #111418, border #333, rounded).\n- Row 2: green ON toggle switch, small blue pill badge \"Badge\" (bg #2563eb), dark \"Select\" dropdown with down arrow.\n- Row 3: card with border radius 10px, border #2a2f35, title \"Card title\" white, subtitle \"This is a preview of the component look.\" gray.\n- Row 4: four small dark outlined buttons \"Button\", \"Tab\", \"Toast\", \"Popup\".\n\nTYPOGRAPHY / SPACING:\n- Font: system sans-serif, -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, Arial.\n- Panel items use flex row, gap 14px, margin 16px between rows.\n"},{"id":"mantine","name":"Mantine","kind":"item","status":"passed","attempts":1,"notes":"v1 matches above-the-fold layout and feature cards","ref":"previews/mantine.png","rebuild":"repro/mantine/build.v1.png","prompt":"Reproduce the Mantine (https://mantine.dev) homepage above-the-fold at 1280px width.\n\nGlobal style: clean white background (#ffffff), black text (#000), system sans-serif font, accent blue #228be6 (Mantine blue), subtle gray borders (#dee2e6).\n\nTop navigation bar (height ~60px, white background with slight transparency, horizontal padding ~32px, flex justify-between align-center, border-bottom subtle):\n- Left: Mantine logo — a stylized geometric blue \"M\" mark inside a rounded square, followed by the text \"Mantine\" in bold black.\n- Right: a version pill \"v9.4.1\" with light gray border, a search input showing \"Search\" and \"Ctrl + K\" hint, a \"Documentation\" link, a theme/moon icon, and a GitHub icon.\n\nHero section (centered or left-aligned, white background, large top padding ~90px, padding-bottom ~60px, max-width ~1100px, centered or left):\n- Huge headline: \"A fully featured React components library\" in very bold black (~56px), line-height ~1.1.\n- Subcopy: \"Build fully functional accessible web applications faster than ever – Mantine includes more than 120 customizable components and hooks to cover every use case.\" in gray (~16px), max-width ~600px, margin-top ~20px.\n- Two buttons below the subcopy (gap ~16px):\n  - Primary: \"Get started\" with blue background #228be6, white text, rounded ~8px, padding ~12px 24px.\n  - Secondary: \"Documentation\" with white background, gray border, dark text, rounded ~8px, same padding.\n\nFeature cards row (four cards in a horizontal grid, gap ~24px, max-width ~1100px, centered, padding-bottom ~60px):\n- Each card white with light border, rounded ~12px, padding ~24px.\n- Card titles in bold: \"Built for the AI-assisted workflow\", \"120+ components\", \"Hooks library\", \"Flexible styling\".\n- Card body text: short gray description lines (e.g., \"LLM-optimized docs, agent skills for complex tasks, and an MCP server for direct API access\").\n\nThe overall vibe is a modern, minimal developer-components library landing page.\n"},{"id":"material-design","name":"Material Design","kind":"item","status":"passed","attempts":2,"notes":"v1 was a simplified hero/cards; v2 added left icon rail, top nav, hero with correct subcopy, and phone showcase gallery to match the real Material Design screenshot.","ref":"previews/material-design.png","rebuild":"repro/material-design/build.v2.html","prompt":"# Recreate Material Design 3 (m3.material.io) above-the-fold UI (1280px)\n\nBrand: **Material Design**. Tagline: \"Material Design 3 is Google's open-source design system for building beautiful, usable products.\"\n\n## Layout\n- **Left rail** (white/light gray, width ~84px, icons + labels): top search icon, then Home, Get started, Develop, Foundations, Styles, Components, Blog (each with a simple icon and label). Bottom: two theme icons (light/dark). Use the icon names from read.json: material_design, apps, code, book, palette, add_circle, pages.\n- **Top app bar** (white, left of rail): \"Material Design\" logo/wordmark. Right: nav links Develop, Foundations, Styles, Components, Blog, and a **Get started** pill button (purple #6442d6, white, radius 48px).\n- **Hero** (light purple/lavender bg gradient): huge heading \"Material Design\" (~56px, bold, dark). Subcopy: \"Material Design 3 is Google's open-source design system for building beautiful, usable products.\" (~20px). Purple **Get started** pill button.\n- **Showcase gallery** (below hero, purple background): a grid of phone/device mockups showing various Material UI screens (use CSS rectangles with colored/gradient screens and text). The gallery should visually suggest multiple mobile app screenshots in a collage.\n\n## Colors (real)\n- Page bg: #ffffff / light lavender #f3e8ff\n- Text: #1f1f1f\n- Primary purple: #6442d6 (buttons)\n- Hero bg: soft lavender/purple gradient (#f3e8ff to #e9d5ff)\n- Gallery bg: purple/violet tones\n- Rail: #f9f5ff\n\n## Typography\n- \"Google Sans Text\", sans-serif. Hero ~56px/700; nav ~15px; body ~20px.\n\n## Vibe\nGoogle's modern design system site: soft purple, friendly, image-heavy hero gallery. Use CSS shapes for phones, no external images. Single self-contained HTML + inline CSS.\n"},{"id":"mui","name":"Material UI (MUI)","kind":"item","status":"passed","attempts":1,"notes":"v1 matches above-the-fold layout, colors, and component showcase","ref":"previews/mui.png","rebuild":"repro/mui/build.v1.png","prompt":"Reproduce the MUI (https://mui.com) homepage above-the-fold at 1280px width.\n\nGlobal style: clean white background (#ffffff), dark near-black text (#1a1e23), primary blue #0073e6 (link blue) and banner blue #006ce5. System sans-serif font stack.\n\nTop announcement banner (full width, blue background #006ce5, white text, centered, small padding ~10px, font-size ~14px):\n- Text: \"🚀 Material UI and MUI X v9 are out! Check out the announcement blogpost →\"\n- The arrow should be a small right arrow.\n\nTop navigation bar (white background, height ~64px, padding 0 32px, flex justify-between align-center, border-bottom subtle):\n- Left: MUI logo — a stylized blue \"M\" icon made of two angled strokes (like an abstract letter M), followed by nav links: \"Products\" \"Docs\" \"Pricing\" \"About us\" \"Blog\" in dark text, small font.\n- Right: search bar with gray border, placeholder \"Search...\", and a small \"⌘K\" keyboard hint; then a GitHub icon and a moon/theme icon.\n\nHero section (two-column layout, white background, padding ~60px 32px, max-width ~1200px, gap ~40px):\n- Left column (~45%):\n  - Headline: first line \"Move faster\" in bold blue (#0073e6), second/third lines \"with intuitive\" and \"React UI tools\" in very bold black, stacked.\n  - Subcopy: \"MUI offers a comprehensive suite of free UI tools to help you ship new features faster. Start with Material UI, our fully-loaded component library, or bring your own design system to our production-ready components.\" in gray, ~15px, line-height 1.6.\n  - Button: \"Discover the Core libraries\" with a right-pointing arrow, blue background #0073e6, white text, rounded pill border-radius ~20px, padding ~10px 20px.\n- Right column (~55%):\n  - A large UI component showcase floating in a light gray (#f6f7f8) or white area with subtle shadows. Include:\n    - A prominent blue card at top-left with white text: icon/clock \"March 25th\", a code \"</>\" line, \"Customize every button and chip instance primary color\", a small circular avatar with \"Assigned to Lucas Smith\", and a thin progress bar at 60%.\n    - To the right of/above the blue card, a small numbered checklist: \"1 Install one of our products to get your next app started successfully:\" with bullet items \"Material UI\", \"MUI Base\", \"Joy UI\".\n    - Below, a row of colored tags: \"MUI\" (blue), \"React\" (yellow), \"CSS\" (green), \"TypeScript\" (pink), \"JavaScript\" (blue).\n    - A calendar widget showing \"July 2026\" with days grid, selected day 13 circled, navigation arrows.\n    - A temperature range slider showing 25°C, 50°C, 20°C, 50°C with a blue knob.\n    - A small dialog at bottom-right: \"Cookie preferences\" with text \"We use cookies to understand site usage and improve our content. This includes third-party analytics.\" and two buttons \"Allow analytics\" (blue) and \"Essential only\" (white).\n\nThe page should look like a modern developer-centric UI library landing page with a split hero + component demo.\n"},{"id":"material-web","name":"Material Web (MWC)","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: dark gallery card with purple accent matched","ref":"previews/material-web.png","rebuild":"repro/material-web/build.v1.png","prompt":"# Material Web (MWC) — Gallery Preview Card Prompt\n\nBuild a dark-themed component gallery preview card at 1280px width that looks like a macOS window or browser preview frame showing UI components.\n\n## Overall Layout\n- **Background**: Very dark navy/almost-black (#161622 or #1a1a2e) filling the entire viewport\n- **Card container**: A rounded-corner panel (border-radius ~12px) with a subtle border, centered with padding\n- **Window chrome**: Top-left has three small colored dots (red #FF5F57, yellow #FEBC2E, green #28C840) like macOS traffic lights\n\n## Header Section (inside card top)\n- **Title text**: \"Material Web (MWC)\" — bold white, ~20-22px font-size, sans-serif\n- **Subtitle line** below title: \"Web Components · Material Design\" — smaller (~13-14px), gray color (#9ca3af)\n\n## Component Showcase Area\n1. **Primary button**: Solid purple background (#9b5de5), white text \"Primary\", rounded corners (~8px), no border\n2. **Default button**: Dark background (#252535), light gray text \"Default\", subtle border (#3a3a4a)\n3. **Input field placeholder**: Dark background, rounded, placeholder \"Type here...\" in muted gray\n4. **Toggle switch**: ON position — purple track (#9b5de5) with white knob on right\n5. **Badge button**: Teal/dark cyan background (#115e59), white text \"Badge\"\n6. **Select dropdown**: Dark background, white text \"Select\" with down-chevron icon\n\n## Card Preview Section\nBordered box containing:\n- Heading \"Card title\" — white bold ~16px\n- Body text \"This is a preview of the component look.\" — gray ~13px\n\n## Bottom Tag Pills Row\nSmall pill/tag buttons: Button | Input | Select | Checkbox | Radio | Switch | Slider | Form | List\n\n## Typography & Colors\n- Font family: system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif (\"Google Sans\", Roboto preferred)\n- Text colors: White headings, gray (#9ca3a  of the showcase area: a row of small colored circles (theme color swatches) in pink, red, orange, yellow, green, cyan, blue, purple.\n\nThe overall vibe is a modern, colorful, mobile-friendly UI library landing page with lots of rounded component demos.\n"},{"id":"ng-bootstrap","name":"NG Bootstrap","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: Captured blue header, stacked hexagon B logo hero, two-column layout, code block, CTA buttons, feature cards","ref":"previews/ng-bootstrap.png","rebuild":"repro/ng-bootstrap/build.v1.png","prompt":"# Prompt: Recreate ng-bootstrap Landing Page (Above-the-Fold)\n\nRecreate the above-the-fold landing page of **ng-bootstrap** (ng-bootstrap.github.io) — Angular-powered Bootstrap widgets.\n\n## Header Bar\n- **Full-width Bootstrap blue background**: `#0d6efd` (the classic Bootstrap primary blue)\n- Height: ~52px\n- **Left side** (white text, horizontal):\n  - White circle with bold \"**B**\" letter inside (~28px diameter, white bg on blue or just a white B icon) — the Bootstrap logo\n  - Nav links in white text: **Home**, **Getting Started**, **Guides**, **Components**\n  - Font size ~14px, no underline\n- **Right side** (white/light text):\n  - Theme toggle group: \"**Auto**\" (active/blue highlight), \"Light\", \"Dark\" — small pill-style toggle\n  - Version dropdown: \"**ng-bootstrap v21.0.0**\" — white text with dropdown arrow\n  - NPM download count badge: \"**2,786,268**\" (with small npm icon)\n  - GitHub icon (white outline)\n  - Twitter icon (white)\n\n## Hero Section (Two-column layout)\n- Background: white `#ffffff`\n- Padding ~50-60px top/bottom\n\n### Left Column — Logo Visual\n- Large **3D stacked blue hexagon cards** graphic:\n  - Three hexagonal shapes stacked at slight offsets (like a deck of thick cards)\n  - All in rich Bootstrap blue (`#0d6efd` to darker blue gradient)\n  - Each hexagon is large (~280px wide)\n  - A large white bold \"**B**\" letter centered on the top hexagon\n  - Gives a 3D layered/stacked effect\n  - This is the main visual hero element\n\n### Right Column — Content\n- **H1 Headline**: \"**Bootstrap widgets**\" — very large bold black text (~40px)\n- **Subtitle**: \"*The angular way*\" — medium-large gray text (`#6c757d`), italic style, below h1\n\n- **Description paragraph**:\n  > Angular widgets built from the ground up using Bootstrap 5 CSS with APIs designed for the Angular ecosystem.\n  - Color: dark gray `#212529`, ~15px, line-height ~1.7\n\n- **Dependency line**: \"*The only dependencies are* [Angular](link), [Bootstrap 5](link) *CSS and*[ Popper](link)*\"\n  - Blue links, inline text\n\n- **Install command label**: \"Install with Angular CLI:\" — small gray text above code block\n- **Code block**:\n  ```\n  ng add @ng-bootstrap/ng-bootstrap\n  ```\n  - Light gray background `#f8f9fa`, monospace font, padding ~10px 16px, rounded corners, copy icon on right\n\n- **CTA Buttons** (horizontal row):\n  - \"**Demo**\" — outlined button, blue border `#0d6efd`, blue text, rounded ~8px\n  - \"**Get started now**\" — same outlined style\n\n- **Version note**: \"*Currently at v21.0.0*\" — small muted text below buttons\n\n## Feature Cards Row (bottom of viewport)\n- Three equal-width cards below hero, light gray background area\n- Each card has:\n  - **Icon** (large, ~48px, in a colored container):\n    - Native: Angular \"A\" logo shield (dark gray)\n    - Widgets: Toggle switch / UI component icon\n    - Quality: Checklist/verified icon\n  - **Title**: Bold ~20px (\"Native\", \"Widgets\", \"Quality\")\n  - **Description**: Short text about the feature\n  - **Link**: Blue underlined link at bottom\n\n## Color Scheme\n- Header blue: `#0d6efd` (Bootstrap primary)\n- Page bg: `#ffffff`\n- Text primary: `#212529`\n- Text secondary: `#6c757d`\n- Code bg: `#f8f9fa`\n- Link blue: `#0d6efd`\n- Card section bg: very light gray `#f8f9fa`\n\n## Typography\n- Font family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif\n- Clean Bootstrap aesthetic\n\n## Visual Vibe\n- Classic Bootstrap design language\n- Strong brand identity with the blue hexagon B logo\n- Developer documentation feel\n- Clean, professional, trustworthy\n- The stacked hexagon logo is the dominant visual element\n"},{"id":"ng-aquila","name":"ng-aquila","kind":"item","status":"unreachable","attempts":0,"notes":"read failed: page.goto: net::ERR_NAME_NOT_RESOLVED at https://designsystem.nationwide.com/","ref":"previews/ng-aquila.png","rebuild":"","prompt":""},{"id":"ng-zorro","name":"NG-ZORRO","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: Three-column doc-layout with header, left nav sidebar, main hero with dual logos and feature bullets, right TOC sidebar captured accurately","ref":"previews/ng-zorro.png","rebuild":"repro/ng-zorro/build.v1.png","prompt":"# Prompt: Recreate NG-ZORRO Landing Page (Above-the-Fold)\n\nRecreate the above-the-fold landing page of **NG-ZORRO** (ng.ant.design) — an enterprise Angular UI component library following Ant Design specs.\n\n## Layout Structure\n**Three-column layout** within a 1280px-wide viewport:\n- **Left sidebar** (~220px): Navigation menu with vertical link items\n- **Main content center** (~65%): Hero headline, description, dual logos, feature bullets\n- **Right sidebar** (~180px): Quick links / TOC\n\n## Header Bar (Top)\n- Full-width white background (`#ffffff`) header\n- **Left:** Red/orange Ant Design shield logo (hexagonal shape) + **\"NG-ZORRO\"** brand name in bold black text\n- **Center-left:** Search input field with placeholder \"在 ng.ant.design 中搜索\", light gray border, magnifying glass icon inside\n- **Nav links** (horizontal, to the right of search): 文档, 组件, 实验性功能 — in dark gray/black text, no underline, ~14px\n- **Version badge**: \"21.3.1\" with dropdown arrow\n- **Far right icons**: GitHub icon (outline), language toggle icon, \"9163\" star count\n\n## Left Sidebar (below header)\n- White background, subtle right border\n- Section title: **\"Ant Design of Angular etween align-center, px ~48px):\n- Left: Preline logo — a blue circle (#2563eb) with a white stylized \"P\" inside, then \"preline\" in bold dark text.\n- Center-left: search input \"Search\" with \"⌘K\" hint, light gray bg, rounded-lg.\n- Nav links: \"Docs\", \"Blocks\", \"Templates\", \"Plugins\", \"Figma\", \"Pro\", \"Pricing\".\n- Right: user icon + \"Sign in\" text, then \"Get all access →\" blue button (#2563eb) with white text, rounded-lg.\n\nHero (two-column, px ~48px, pt ~64px, gap ~40px):\nLeft column (~50%):\n- Headline: \"Preline UI, crafted with Tailwind CSS\" with \"Preline UI,\" in blue (#2563eb), rest dark. Font-size ~52px, font-weight 700, line-height 1.1.\n- \"BUILT WITH:\" label in small uppercase gray, followed by three framework badges: \"HTML\" (with HTML5 icon), \"JAVASCRIPT\" (with JS icon), \"TYPESCRIPT\" (with TS icon). Badges have light gray bg, rounded, small text.\n- Subcopy: \"Preline UI is an open-source Tailwind CSS UI component library for building modern websites and apps. It includes UI blocks, templates, plugins, a Figma design system, and more.\" Gray (#4b5563), ~17px, max-width ~520px, mt ~18px.\n- Buttons (mt ~28px, gap ~12px):\n  - \"Get started\" blue button (#2563eb), white text, rounded-lg.\n  - \" $ npm i preline \" code-style button with a copy icon, white bg, gray border, rounded-lg, monospace text.\n\nRight column (~50%):\n- Floating collage of dashboard/component preview cards with soft shadows. Include:\n  - A stats card with numbers \"45,410\" and \"19\" and \"Leads Acquired\" label.\n  - A profile/settings card with dark blue header, list items \"Profile\", \"Settings\", \"Newsletter\" and a \"New\" badge.\n  - A team list card with avatars and names.\n  - A pricing card showing \"$39\".\n  - Overlap them at slight angles.\n\nBelow hero: three feature cards in a row (full width, px ~48px, mt ~40px):\n- \"1584+ Components & Examples\" with document icon, body text \"Hundreds of component examples for all your website needs that meet...\"\n- \"Universal Framework Compatibility\" with icon, body text \"Preline UI is fully compatible wherever Tailwind CSS is in action, from React to...\"\n- \"Unlimited Custom Themes\" with icon, body text \"Create consistent branded visuals with flexible themes across your project.\"\n\nVibe: professional Tailwind UI library landing page, blue primary, clean white, lots of UI preview cards.\n"},{"id":"primeng","name":"PrimeNG","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: Captured top banner, header, centered hero with .p-title headline, CTA pills, faded logos, portfolio section","ref":"previews/primeng.png","rebuild":"repro/primeng/build.v1.png","prompt":"# Prompt: Recreate PrimeNG Landing Page (Above-the-Fold)\n\nRecreate the above-the-fold landing page of **PrimeNG** (primeng.org) — a premium Angular UI component library.\n\n## Top Announcement Banner\n- Full-width **dark charcoal** background bar (`#1a1d21` or similar very dark gray)\n- Text centered: \"**Next Chapter Begins 🚀 Read the full story**\" — white/light gray text\n- Close button (×) on the right side\n- Height ~36px\n\n## Header Bar\n- White background (`#ffffff`), subtle bottom border\n- **Left:** PRIMENG logo — a black shield/helmet icon + \"**PRIMENG**\" wordmark in bold black uppercase letters (~18px, letter-spacing)\n- **Right side items** (horizontal row):\n  - Search icon (magnifying glass outline)\n  - Theme toggle icon (sun/moon)\n  - GitHub icon (outline)\n  - Edit/pencil icon\n  - \"**Get PrimeUI**\" button — dark background (`#334155` or near-black), white text, rounded-full (pill shape), ~14px font\n\n## Hero Section (Centered)\n- Background: very light blue-gray (`#f8fafc` or similar off-white)\n- Padding top/bottom ~60px\n\n### Version Badge (above headline)\n- Small inline badge: red dot prefix + \"**primeng@22.0.0-rc.1**\" — small monospace-style text, subtle gray\n\n### Headline\n- Very large bold centered text (~48-52px): \"**Premium UI .p-title Suite for Angular**\"\n- The word \"**Suite**\" has a distinctive `.p-title` class styling — it appears as a slightly highlighted/differentiated element (light gray background or subtle border treatment around it)\n- Color: near-black `#1e293b`\n- Font weight: 700-800\n\n### Subtitle\n- Centered below headline, max-width ~680px: \"*Enhance your web applications with PrimeNG's comprehensive suite of customizable, feature-rich UI components.*\"\n- Color: medium-dark gray `#475569`, ~17px, line-height 1.6\n\n### CTA Buttons (centered, horizontal gap ~12px)\n- \"**Get Started**\" — Dark/charcoal background (`#1e293b`), white text, rounded-pill shape, padding ~12px 28px, no border\n- \"**View Components**\" — White background, dark text, rounded-pill shape, same padding, thin border (`#e2e8f0`)\n\n### Company Logo Row (below buttons)\n- Centered row of grayscale company logos (faded/light opacity ~0.35):\n  - \"bus\" (text logo)\n  - Mercedes-Benz three-point star (circle logo)\n  - \"ebay\" (wordmark)\n  - Ford oval logo\n- Spacing ~40px between logos, vertically centered\n\n## Lower Section (Portfolio Preview)\n- Light background continues or transitions to white\n- Left side: small icon (shield-like) + \"**Overview**\" label + green \"● Live\" status badge\n- Heading: \"**Portfolio command**\" (medium-large, ~24px)\n- Description text about monitoring unlist exposure...\n- Right: search input field \"Search assets\" with bell/notification icon\n\n## Color Scheme\n- Page bg: `#f8fafc` (very light slate/gray-blue)\n- Header: white `#ffffff`\n- Dark elements: `#1e293b` (slate-800)\n- Muted text: `#64748b` (slate-500)\n- Accent: The PrimeNG brand uses emerald/green tones for some accents\n- Border: `#e2e8f0`\n\n## Typography\n- Font: \"Inter var\", system-ui fallback stack (-apple-system, 'Segoe UI', Roboto, sans-serif)\n- Clean modern look, Inter is key characteristic\n- Headlines are heavy/bold (700+)\n\n## Visual Vibe\n- Modern, clean, premium feel\n- Centered hero with btle shadow, flex:1):\n  - Heading \"Build UI at GitHub\" on first line, \"with Primer Product UI\" on second line (~28px, bold dark).\n  - Below, a blue link \"Get started with Product UI\" with a right-pointing chevron.\n  - At the bottom of the card, add simple UI component illustrations: a light gray browser window/chrome bar, a small green success toast with checkmark and text \"Success!\", a small purple button labeled \"Button\", and a few faint gray connected circles/line drawing to the left to suggest component diagrams.\n- Right card (white, rounded 16px, padding 32px, subtle shadow, flex:1):\n  - A grid of 6 stylized GitHub Octocat/brand icon variations (3 columns x 2 rows): top row outline cat, solid blue cat, solid teal/blue cat; bottom row outline side profile cat, solid blue side profile cat, solid blue/teal gradient side profile cat. Keep them simple SVG-style icons with rounded shapes.\n  - Below the icons, heading \"Create for GitHub\" on first line and \"using the Brand toolkit\" on second line (~28px, bold dark).\n\nOverall look: clean, modern GitHub design system landing page, light and airy with white cards and colorful abstract accents.\n"},{"id":"primereact","name":"PrimeReact","kind":"item","status":"passed","attempts":1,"notes":"v1 matches announcement bar, header, centered hero, and CTA buttons","ref":"previews/primereact.png","rebuild":"repro/primereact/build.v1.png","prompt":"# PrimeReact — Above-the-Fold UI Prompt\n\nBuild the PrimeReact homepage above-the-fold at 1280px width using inline CSS and system fonts (no external assets).\n\n## Overall Layout\n- **Canvas**: 1280px wide, 820px tall, very light gray background (#F8FAFC). Single-column centered content.\n- **Top announcement banner**: full-width dark navy/blue bar (#0F172A), height ~36px, centered text \"Next Chapter Begins 🚀 Read the full story\" in white/light text, small font-size (~13px), close \"×\" on the far right.\n- **Header**: below banner, white background, height ~64p es\", \"Icons\", \"Colors\", \"Documentation\", \"Playground\", \"Blog\", then a GitHub icon and a theme/sun icon.\n\nHero section (two-column layout, padding ~80px 32px, gap ~40px, max-width ~1200px):\n- Left column (~45%):\n  - A small blue pill badge: \"Read about Radix Themes 3.0 →\".\n  - Large elegant serif headline: \"Start building your app now\" (~56px), line-height ~1.1, dark.\n  - Subcopy: \"An open source component library optimized for fast development, easy maintenance, and accessibility. Just import and go—no configuration required.\" in gray sans-serif (~16px).\n  - A code block with light background, rounded ~12px, showing:\n    import \"@radix-ui/themes/styles.css\";\n    import { Theme, Button } from \"@radix-ui/themes\";\n    export default () => (\n      <Theme>\n        <Button>Hey 👋</Button>\n      </Theme>\n    );\n    Use syntax highlighting colors: purple import keywords, red strings, blue tags, dark text.\n  - Two buttons below the code block:\n    - Black rounded button \"Get started →\".\n    - Light purple/lavender rounded button with a small grid icon and \"Playground\" in dark text.\n  - Below buttons: \"Live examples\" label with a row of small horizontal tabs/lines indicating examples.\n- Right column (~55%):\n  - A large component showcase floating on the soft gradient background. Include:\n    - Top card: \"Your team\" with subtitle \"Invite and manage your team members.\", an input field \"Email address\" with blue \"Invite\" button, and a list of team members with circular avatars, names (Emmeline Labrie, Zac Wight, etc.), email addresses, and three-dot menus.\n    - Below card: \"Notifications\" with subtitle \"Manage your notification settings.\", sections \"Comments\", \"Favorites\", \"New documents\", each with toggles for Push (blue on), Email (blue on), Slack (gray off).\n    - Far right partial card: \"Sign in\" form with Email and Password fields and a blue \"Sign in\" button, and a \"Your...\" card below it.\n\nThe over d\"\n  - \"Components\"\n- Below the buttons, centered text \"Current version: 3.0.0-beta.5\" in gray (#adb5bd).\n- Below that, a small advertisement card (dark gray/black background, rounded 4px, border 1px solid #333, max-width ~400px, margin auto, padding 12px, display flex):\n  - Left: a small square ad image (black background with a hand icon and colorful text).\n  - Right: ad text \"Spike forgiveness. Zero overages. Zero surprise bills. Free for 30 days, no card required.\" in small white/light gray text, and a tiny \"ADS VIA CARBON\" label at the bottom.\n\nFeatures section (dark background, three-column layout, max-width ~1100px, margin auto, padding 40px 32px, gap 32px):\n- Column 1: heading \"Rebuilt with React\" white bold, body paragraphs in gray #adb5bd about replacing Bootstrap JavaScript with true React components and jQuery-free.\n- Column 2: heading \"Bootstrap at its core\", body paragraphs about compatibility and Bootstrap stylesheet.\n- Column 3: heading \"Accessible by default\", body paragraphs about accessibility and component control.\n\nOverall vibe: dark, developer-focused React library landing page with Bootstrap branding and purple accents.\n"},{"id":"paper-rn","name":"React Native Paper","kind":"item","status":"passed","attempts":1,"notes":"v1 gallery-card reproduction visually close to reference preview.","ref":"previews/paper-rn.png","rebuild":"build.v1.html","prompt":""},{"id":"react-spectrum","name":"React Spectrum","kind":"item","status":"passed","attempts":1,"notes":"v1 matches purple gradient hero, nav, CTA buttons, and app preview card","ref":"previews/react-spectrum.png","rebuild":"repro/react-spectrum/build.v1.png","prompt":"Reproduce the React Spectrum homepage above-the-fold section at 1280px width.\n\nGlobal: full-bleed purple-to-pink-to-orange gradient background (linear-gradient roughly 135deg, #7c3aed via #db2777 to #f97316). White text. Font-family Adobe Clean, Source Sans Pro, ui-sans-serif, system-ui, sans-serif. No pa
