nd \"Message\" with rounded light gray backgrounds.\n  - A row with black \"Save\" button, \"Secondary\" link, radio/checkbox/toggle controls.\n  - Bottom row: \"Alert Dialog\" button and \"Button Group\" dropdown.\n  - Two bottom tabs: \"Planning\" and \"Support\".\n- Center card: a \"Contribution History\" bar chart card with title \"Contribution History\", subtitle \"Last 6 months of activity\", five vertical bars in varying shades of gray labeled Dec, Jan, Feb, Mar, Apr. Below the chart a two-column summary: \"UPCOMING May 2024 Scheduled\" and \"SAVINGS PLAN Accelerated Recurring\".\n- Right card: a QR-code card with a large black QR code illustration, title \"Scan to connect your mobile device\", subtext \"Open the Ledger mobile app and scan this code to link your device.\", and a small bottom action.\n\nThe overall look is the signature shadcn/ui black-and-white, rounded, modern component gallery landing page.\n"},{"id":"shoelace","name":"Shoelace (Web Awesome)","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: dark gallery card layout matched closely","ref":"previews/shoelace.png","rebuild":"repro/shoelace/build.v1.png","prompt":"# Shoelace (Web Awesome) — Gallery Preview Card Prompt\n\nBuild a dark-themed component gallery preview card at 1280px width that looks like a macOS window or browser preview frame showing UI components.\n\n## Overall Layout\n- **Background**: Very dark navy/almost-black (#161622 or #1a1a2e) filling the entire viewport\n- **Card container**: A rounded-corner panel (border-radius ~12px) with a subtle border, centered with padding\n- **Window chrome**: Top-left has three small colored dots (red #FF5F57, yellow #FEBC2E, green #28C840) like macOS traffic lights\n- Below the dots is a title bar area\n\n## Header Section (inside card top)\n- **Title text**: \"Shoelace (Web Awesome)\" — bold white, ~20-22px font-size, sans-serif\n- **Subtitle line** below title: \"Web Components · 框架无关 / 标准化\" — smaller (~13-14px), gray color (#9ca3af or similar)\n\n## Component Showcase Area (below header, inside card)\nThis section shows example components in a dark container:\n\n1. **Primary button**: Solid purple background (#9b5de5 / #a78bfa), white text \"Primary\", rounded corners (~8px), no border\n2. **Default button**: Dark background (#252535), light gray/white text \"Default\", subtle border (#3a3a4a), same size as Primary\n3. **Input field placeholder**: Dark background (#252535), rounded, placeholder text \"Type here...\" in muted gray, thin border\n4. **Toggle switch**: A toggle switch in ON position — purple track (#9b5de5) with a white circular knob on right side\n5. **Badge button**: Teal/dark cyan background (#0d7377 or #115e59), white text \"Badge\", small, rounded\n6. **Select dropdown**: Dark background, white text \"Select\" with a down-chevron/triangle icon on right\n\n## Card Preview Section\n- A bordered box (subtle border #2a2a3a) containing:\n  - Heading \"Card title\" — white, bold, ~16px\n  - Body text \"This is a preview of the component look.\" — gray (#9ca3af), ~13px\n\n## Bottom Tag Pills Row\nA row of small pill/tag buttons with dark backgrounds and light borders:\n- First row: Button | Input | Select | Checkbox | Radio | Switch | Range | Form\n- Second row: FileUpload\nEach tag is a small rounded rectangle with thin border, light text, compact padding.\n\n## Typography & Colors\n- Font family: system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif\n- Text colors: White (#fff) for headings, gray (#9ca3af or #a0a0b0) for secondary/muted text\n- Accent color: Purple (#9b5de5) used for Primary button and toggle switch\n- Background layers: Card inner bg slightly lighter than page bg (~#1e1e30 vs #161622)\n- Borders: Subtle dark (#2e2e42 or #33334a)\n"},{"id":"skeleton","name":"Skeleton","kind":"item","status":"passed","attempts":1,"notes":"PASS v1: Captured header with skull logo/search, hero with mascot+headline+CTAs, Live Demos framework badges","ref":"previews/skeleton.png","rebuild":"repro/skeleton/build.v1.png","prompt":"# Prompt: Recreate Skeleton Landing Page (Above-the-Fold)\n\nRecreate the above-the-fold landing page of **Skeleton** (skeleton.dev) — an adaptive design system for Tailwind CSS.\n\n## Header Bar\n- White background (`oklch(0.99 0 0)` or near-white), subtle bottom border/shadow, sticky top\n- Height: ~56px\n- **Left side:**\n  - **Skull logo**: A distinctive black skull/cranium icon with a small crown on top and large round blue eyes (this is the Skeleton brand mascot)\n  - Nav links: \"**Docs**\", \"**Showcase**\", \"**More ▾**\" (dropdown)\n- **Center:**\n  - Search input bar: placeholder \"**Search...**\" with a \"×\" clear button inside, light gray background `oklch(0.97 0 0)`, rounded ~10px border, width ~200px\n- **Right side** (horizontal icons/controls):\n  - Theme toggle icon (sun/moon circle)\n  - Version dropdown: \"**v4.15.2 ▾**\"\n  - Heart/favorite icon with dropdown\n  - GitHub icon (outline)\n  - Discord icon\n  - Butterfly icon (Skeleton brand element)\n\n## Hero Section\n- Background: very subtle light blue radial gradient (center-left glow), transitioning to white at edges\n- Padding: ~50px top/bottom\n- Layout: two-column within the hero — mascot left, text right\n\n### Left Column — Skull Mascot\n- Large black skull illustration:\n  - Black filled silhouette of a skull shape (rounded cranium)\n  - Small crown/tiara on top of the head\n  - Two large prominent round blue eyes (cyan/blue circles)\n  - This is a cute/stylized skull character, not scary\n  - Size: roughly 220x220px area\n\n### Right Column — Hero Text\n- **H1 Headline**: \"**The adaptive design system for Tailwind CSS.**\"\n  - Very large bold text (~40-44px), near-black color `oklch(0.18 0 0)`\n  - Heavy font-weight\n\n- **Subtitle paragraph**: \n  > *Skeleton uses* Tailwind *as the foundation for building adaptive design systems. Including turnkey components for your favorite web frameworks.*\n  - Medium size ~16px, gray color, line-height ~1.7\n  - \"Tailwind\" is bold/emphasized\n\n- **CTA Buttons** (horizontal row):\n  - \"**Get Started ›**\" — Dark/black background (`#18181B`), white text, rounded ~8px, padding ~10px 24px, has right-arrow\n  - \"**Learn More**\" — White background, dark border, dark text, same padding, rounded ~8px\n\n## Live Demos Section (below hero)\n- Light gray background section `#f4f4f5` or similar neutral gray\n- **Heading**: \"**Live Demos**\" — bold ~24px, left-aligned\n- **Description**: \"*Test drive Skeleton directly in your browser for supported frameworks.*\" — smaller gray text\n- Note: \"*Functional components limited to React and Svelte.*\" — tiny muted text\n\n### Framework Icons Row\n- Horizontal row of circular framework badges:\n  - Each badge: colored solid circle (~52px diameter) + white/light icon inside + label below\n  - **React**: cyan/turquoise circle (`#22d3ee`) with atom/react icon, label \"React\"\n  - **Svelte**: orange/red-orange circle (`#ff6b35` / `#FF3E00`) with Svelte \"S\" logo, label \"Svelte\"\n  - **Vue**: green circle (`#42b883`) with Vue \"V\" triangle, label \"Vue *\" (asterisk note)\n  - **Solid**: blue/purple circle (`#446b9e`) with Solid logo, label \"Solid *\"\n  - **Astro**: purple/violet circle (`#8B5CF6` / `#D11B5A`) with Astro \"A\" icon, label \"Astro *\"\n  - **More**: \"... More\" text/badge (ellipsis)\n\n## Color Scheme\n- Page bg: near-white `#fafafa` / `oklch(0.99 0 0)`\n- Primary text: near-black `oklch(0.18 0 0)` ≈ `#1a1a2e`\n- Secondary/muted text: `oklch(0.55 0 0)` ≈ `#71717a`\n- Hero gradient bg: subtle blue radial from center `rgba(56,189,248,0.08)` to transparent\n- Demo section bg: `#f4f4f5`\n- Accent/skeleton brand: uses Tailwind's palette\n- CTA dark: `#18181B`\n\n## Typography\n- Font family: system-ui (use system font stack)\n- Clean modern look\n- Headlines are extra-bold\n\n## Visual Vibe\n- Playful yet professional developer tool aesthetic\n- The skull mascot gives it personality\n- Tailwind-first design utility feel\n- Modern, clean, developer-friendly\n- Framework-agnostic positioning (supports React, Svelte, Vue, Solid, Astro)\n"},{"id":"smelte","name":"Smelte","kind":"item","status":"passed","attempts":1,"notes":"PASS v1. Dark Material Design hero with SMELTE header, nav links, Hi greeting, Tailwind CSS heading, Get Started/GitHub buttons, code card. Visually close match.","ref":"previews/smelte.png","rebuild":"repro/smelte/build.v1.html","prompt":"# Recreate Smelte above-the-fold UI (smeltejs.com)\n\nBuild a single-file HTML/CSS recreation of the Smelte homepage above-the-fold (1280x820).\nSmelte = \"Material design using Tailwind CSS for Svelte\", a UI framework with a very small footprint.\n\n## Brand / layout\n- Sticky top navigation bar, dark background `#1d1d1d`, full width, ~64px tall, white text.\n- Left: brand wordmark \"SMELTE\" in bold white, letter-spacing, with a small circular logo mark.\n- Center/right: horizontal nav links in white, ~14px: Components, Typography, Color, Breakpoints, Dark mode, Text fields, Buttons, Selection controls, Lists, Selects.\n- Far right: two round icon buttons (transparent, circular) — a sun icon (\"wb_sunny\", dark-mode toggle) and a menu icon.\n\n## Hero (above the fold)\n- Dark page background (continue #1d1d1d or a subtle vertical gradient to near-black).\n- Large greeting \"Hi\" (big, friendly) and a prominent heading:\n  \"Material design using Tailwind CSS for Svelte\"\n- Subcopy: \"UI framework with very small footprint\"\n- Accent color: Material blue `#1976d2` (used for links/buttons/highlights).\n- Optionally a rounded card / code-ish panel and a primary button \"Get Started\".\n\n## Typography / vibe\n- Font: Roboto, sans-serif (system fallback).\n- Material Design feel: clean, generous spacing, subtle elevation, rounded corners (~8px), soft shadows.\n- Overall dark, modern, developer-focused.\n\n## Constraints\n- Single self-contained HTML file, inline CSS, vanilla, system fonts only, no external assets/images.\n- Fixed to display nicely within 1280x820 viewport.\n"},{"id":"solid-headless","name":"Solid Bootstrap","kind":"item","status":"unreachable","attempts":0,"notes":"read failed: net::ERR_NAME_NOT_RESOLVED for both www and non-www domain","ref":"previews/solid-headless.png","rebuild":null,"prompt":""},{"id":"solid-headless-ui","name":"Solid Headless","kind":"item","status":"passed","attempts":2,"notes":"PASS v2. v1 built GitHub 404 (read captured 404). Reference shows actual dark component showcase site. v2 rebuilt as dark theme with Solid Headless brand, Primary/Default/toggle/Badge/Select/Card/Disclosure-Dialog-Listbox-Menu pills. Good match.","ref":"previews/solid-headless-ui.png","rebuild":"repro/solid-headless-ui/build.v2.html","prompt":"# Recreate Solid Headless UI above-the-fold UI — v2\n\n## NOTE: The read.json captured a GitHub 404 page (repo URL returned 404). However the reference\npreview shows the actual site content — a **dark-themed component showcase**. Rebuild to match\nthe reference visual.\n\n## Layout (dark theme)\n- **Page background**: Very dark navy (~`#0b1120` or `#0d1117`), light text.\n- **Header bar** (dark): Brand \"**Solid Headless**\" (bold white) + subtitle/tagline \"**Solid · 无样式原语**\" (smaller gray).\n- **Component demo area** (below header):\n  - A row of components:\n    - \"**Primary**\" button — filled bright blue (`#3b82f6`), rounded 8px, white text\n    - \"**Default**\" button — outlined (light border), on slightly lighter dark bg\n    - Text input: placeholder \"Type here...\", rounded, dark bg, light border\n    - Toggle switch: ON state (blue track, round knob)\n    - \"**Badge**\" badge pill (blue/dark)\n    - Select dropdown: \"Select\" with down arrow\n- **Card component**: Below demo row, rounded card:\n  - Title: \"**Card title**\"\n  - Body: \"This is a preview of the component look.\"\n  - Light card bg, subtle border/shadow.\n- **Bottom row**: Category pills: **Disclosure**, **Dialog**, **Listbox**, tem","status":"passed","attempts":1,"notes":"PASS v1: Captured bold 50/50 split layout, typographic hero, Angular branding, orange CTA, green topo pattern","ref":"previews/taiga-ui.png","rebuild":"repro/taiga-ui/build.v1.png","prompt":"# Prompt: Recreate Taiga UI Landing Page (Above-the-Fold)\n\nRecreate the above-the-fold landing page of **Taiga UI** (taiga-ui.dev) — an open source Angular component library.\n\n## Layout Structure\n- **Full-screen split layout** (50/50): Left half white, Right half vibrant green\n- No visible header/navigation bar in the above-the-fold area\n- The page is essentially one large hero section filling the full viewport\n\n## Left Half (White background `#ffffff`)\n- Large bold typography, left-aligned with generous padding (~60px)\n- Text content (very large, ~52-60px font size, bold/black `#000`):\n\n  **Line 1:** \"Taiga UI —— [red triangular A logo]\"\n  - \"Taiga UI\" in black, very bold\n  - Long dash \"——\"\n  - Red/orange triangular logo (looks like an upward-pointing triangle/A shape in red-orange `#FF5722` or similar)\n\n  **Line 2:** \"powerful set of\"\n\n  **Line 3:** \"open source\"\n\n  **Line 4:** \"components for\"\n\n  - All lines are the same huge bold sans-serif font, black color\n\n- **Angular Logo** below the text:\n  - The Angular shield/logo: magenta-pink-to-red gradient shield shape with white \"**A**\" letter inside\n  - Next to it: word \"**Angular**\" in the same magenta/pink gradient color (`#DD0031` to `#C3002F` range)\n  - This is prominently displayed as a brand association element\n\n- **CTA Button**: Orange/coral pill button:\n  - Text: \"**Browse components**\" with a right-arrow (→) symbol\n  - Background: warm orange/coral `#FF6B35` or similar\n  - White text, fully rounded/pill shape (border-radius ~20px+)\n  - Padding ~12px 28px, positioned below the Angular logo\n\n- Small decorative element: double-chevron down icon (vv) at bottom-right of the left section, light gray, suggesting scroll-down\n\n## Right Half (Green background)\n- **Vibrant lime/green background**: bright green like `#4ade80` or `#22c55e` (a lively, saturated green)\n- **Topographic contour line pattern**: Black or dark green wavy/curved lines that look like a topographic map elevation pattern\n  - Multiple curved parallel lines creating organic flowing shapes\n  - Lines vary in curvature and density\n  - Creates an abstract natural/terrain-like visual texture\n  - Lines should be thin (~1-1.5px), dark green or black at low opacity\n\n## Color Scheme\n- Left bg: pure white `#ffffff`\n- Right bg: vibrant green `#4ade80` (or similar bright lime-green)\n- Primary text: black `#000000`\n- Accent orange (button): `#FF6B35` / `#F26522`\n- Taiga logo red/orange: `#FF5722` / `#EF4444`\n- Angular gradient: magenta-red to pink `#DD0031 → #FF0080`\n- Topo lines: dark green `#166534` at varying opacity\n\n## Typography\n- Font family: Manrope, system-ui, sans-serif\n- Very large, bold headlines (heroic scale)\n- Clean geometric sans-serif feel\n- Tight line-height for the stacked text\n\n## Visual Vibe\n- Bold, modern, striking split design\n- High contrast between clean white text area and vibrant green illustration area\n- Typographic-first hero (text IS the main visual)\n- Minimalist but impactful\n- Fresh, energetic, open-source project feel\n- The topographic pattern adds organic/creative contrast to the technical content\n"},{"id":"tailark","name":"Tailark","kind":"item","status":"passed","attempts":1,"notes":"v1 matches homepage nav, hero badge/headline, style tabs, and bento grid layout","ref":"previews/tailark.png","rebuild":"repro/tailark/build.v1.png","prompt":"Reproduce the Tailark homepage above-the-fold section at 1280px width.\n\nGlobal: white background (#ffffff), text near-black (#0f172a), font-family ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif.\n\nTop nav (height ~72px, white, flex justify-between align-center, px ~48px):\n- Left: brand log let cur=null;
const tb=document.getElementById("tb"),q=document.getElementById("q"),f=document.getElementById("f"),k=document.getElementById("k"),cnt=document.getElementById("cnt");
function tag(s){return s==="passed"?'<span class="tag passed">成功</span>':s==="failed"?'<span class="tag failed">失败</span>':'<span class="tag unreachable">不可达</span>';}
function render(){
  const Q=q.value.toLowerCase(),F=f.value,K=k.value;
  let list=ROWS.filter(r=>(!Q||r.name.toLowerCase().includes(Q)||r.id.includes(Q))&&(F==="all"||r.status===F)&&(K==="all"||r.kind===K));
  cnt.textContent=list.length+" / "+ROWS.length;
  tb.innerHTML=list.map(r=>'<tr><td>'+r.name+'<br><span class="sub">'+r.id+'</span></td><td>'+(r.kind==="proj"?"获奖":"组件库")+'</td><td>'+tag(r.status)+'</td><td>'+(r.attempts||"-")+'</td><td><button class="copy" onclick="openPrompt(''+r.id+'')">查看提示词</button> '+(r.ref?'<a class="lk" href="'+r.ref+'" target="_blank">原图</a>':'')+' '+(r.rebuild?'<a class="lk" href="'+r.rebuild+'" target="_blank">重建</a>':'')+'</td></tr>').join("");
}
function openPrompt(id){const r=ROWS.find(x=>x.id===id);cur=r;document.getElementById("mh").textContent=r.name;document.getElementById("ms").textContent=r.id+" · "+tag(r.status)+" · 尝试 "+(r.attempts||0);document.getElementById("mp").textContent=r.prompt||"(无提示词)";document.getElementById("m").classList.add("open");}
function copyPrompt(){if(cur&&cur.prompt)navigator.clipboard.writeText(cur.prompt);}
