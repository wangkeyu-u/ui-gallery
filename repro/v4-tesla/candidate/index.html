<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>Tesla — Candidate</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1280px;height:820px;overflow:hidden;background:#fff;color:#171a20;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
  .nav{display:flex;align-items:center;height:52px;padding:0 36px;border-bottom:1px solid #e8eaed}
  .nav-logo{font-weight:700;font-size:16px;letter-spacing:3.5px;margin-right:44px;text-transform:uppercase}
  .nav-links{display:flex;gap:28px;font-size:14.5px;flex:1}
  .nav-links a{color:#393c41;text-decoration:none;font-weight:500}
  .nav-links a:hover{color:#000}
  .nav-icons{display:flex;gap:18px;margin-left:auto;font-size:16px}

  /* Background bands sampled from reference.png: upper rgb(130,135,146), mid rgb(165,166,168), lower rgb(211,211,212). */
  .hero{height:560px;position:relative;display:flex;align-items:center;justify-content:center;
    background:
      linear-gradient(180deg, rgb(130,135,146) 0%, rgb(150,152,158) 30%, rgb(165,166,168) 55%, rgb(200,201,203) 85%, rgb(211,211,212) 100%)}
  .hero::before{
    /* simulate car interior silhouette with layered shapes */
    content:'';position:absolute;top:0;left:0;width:100%;height:100%;
    background:
      radial-gradient(ellipse 600px 400px at 50% 55%, transparent 50%, rgba(180,185,192,.35) 100%);
  }
  .hero-content{text-align:center;z-index:1;position:relative}
  .hero-title{font-size:42px;font-weight:500;letter-spacing:-.02em;line-height:1.12;margin-bottom:10px}
  .hero-subtitle{font-size:17px;color:#5c5e62;margin-bottom:26px;letter-spacing:.01em}
  .hero-buttons{display:flex;gap:14px;justify-content:center}
  .btn-primary{background:#3e63dd;color:#fff;border:none;padding:11px 34px;border-radius:999px;font-size:14.5px;cursor:pointer;font-weight:500}
  .btn-outline{background:#fff;color:#171a20;border:1px solid #ccc;padding:11px 34px;border-radius:999px;font-size:14.5px;cursor:pointer;font-weight:500}

  .arrow{position:absolute;top:50%;transform:translateY(-50%);width:38px;height:38px;background:rgba(255,255,255,.75);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:#333;border:none}
  .arrow-left{left:14px}.arrow-right{right:14px}
  .dots{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:9px}
  .dot{width:9px;height:9px;border-radius:50%;background:#999}
  .dot.active{background:#393c41;width:10px;height:10px;border-radius:5px}

  .sub-section{padding:32px 36px;display:flex;justify-content:space-between;align-items:center}
  .sub-title{font-size:27px;font-weight:400;letter-spacing:-.01em}
  .btn-sm{background:#fff;border:1px solid #ccc;padding:9px 22px;border-radius:4px;font-size:13.5px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
</style>
</head>
<body>
<nav class="nav">
  <span class="nav-logo">TESLA</span>
  <div class="nav-links">
    <a href="#">Vehicles</a><a href="#">Energy</a><a href="#">Charging</a><a href="#">Discover</a><a href="#">Shop</a>
  </div>
  <div class="nav-icons">
    <span>&#10067;</span><span>&#127758;</span><span>&#128100;</span>
  </div>
</nav>

<section class="hero">
  <button class="arrow arrow-left">&#8249;</button>
  <button class="arrow arrow-right">&#8250;</button>
  <div class="dots">
    <span class="dot active"></span><span class="dot"></span><span class="dot"></span>
  </div>
  <div class="hero-content">
    <h1 class="hero-title">Introducing Model Y L Premium</h1>
    <p class="hero-subtitle">Three Rows, Six Seats</p>
    <div class="hero-buttons">
      <button class="btn-primary">Order Now</button>
      <button class="btn-outline">Learn More</button>
    </div>
  </div>
</section>

<div class="sub-section">
  <h2 class="sub-title">Full Self-Driving</h2>
  <button class="btn-sm"><span>&#9733;</span> Schedule a Drive Today</button>
</div>
</body>
</html>
